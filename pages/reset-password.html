<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where's Jeff? — Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/components.css">
    <script type="module" src="../app.js"></script>
</head>
<body>

    <div class="page-loader" id="page-loader"><span class="loader"></span></div>

    <section class="hero" id="hero">
        <img class="hero__logo" src="../assets/logo.png" alt="Where's Jeff?">
        <img class="hero__jeff" src="../assets/jeff.png" alt="Jeff the camel">
    </section>

    <section class="page-center" id="reset-section">
        <div class="login-step active" id="step-reset">
            <wheff-card aspect="2.66">
                <wheff-banner position="top" from="left">New Password</wheff-banner>
                <wheff-field label="New" type="password" placeholder="••••••••"></wheff-field>
                <wheff-field label="Confirm" type="password" placeholder="••••••••"></wheff-field>
                <wheff-banner position="bottom" from="left" size="small" action="back" variant="secondary">Back</wheff-banner>
                <wheff-banner position="bottom" from="right" action="save">Go!</wheff-banner>
            </wheff-card>
        </div>
    </section>

    <script type="module">
        import { updatePassword, friendlyError } from '../lib/auth.js';
        import { supabase } from '../lib/supabase.js';
        import { showToast } from '../lib/toast.js';

        await Promise.all([
            document.fonts.load('700 1em Jost'),
            document.fonts.load('900 1em Jost'),
            document.fonts.load('italic 700 1em Jost'),
            document.fonts.load('italic 900 1em Jost'),
        ]);

        let recoveryReady = false;

        supabase.auth.onAuthStateChange((event) => {
            if (event === 'PASSWORD_RECOVERY') recoveryReady = true;
        });

        setTimeout(async () => {
            document.getElementById('page-loader')?.remove();
            document.getElementById('reset-section')?.scrollIntoView({ behavior: 'smooth' });
            if (!recoveryReady) {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    showToast('Invalid or expired reset link', { type: 'error' });
                    setTimeout(() => { window.location.href = '/pages/login.html'; }, 2000);
                }
            }
        }, 2500);

        function setBannerLoading(el, loading) {
            if (loading) {
                el.classList.add('banner--disabled', 'banner--loading');
                el.style.animationName = 'none';
                if (!el.querySelector('.loader')) {
                    el.insertAdjacentHTML('beforeend', '<span class="loader loader--btn"></span>');
                }
            } else {
                el.classList.remove('banner--disabled', 'banner--loading');
                el.style.animationName = '';
                el.querySelector('.loader')?.remove();
            }
        }

        function watchSaveButton() {
            const step = document.getElementById('step-reset');
            const saveBtn = step?.querySelector('wheff-banner[action="save"]');
            const inputs = step?.querySelectorAll('.field__input');
            if (!saveBtn || !inputs?.length) { setTimeout(watchSaveButton, 200); return; }

            saveBtn.classList.add('banner--disabled');
            const check = () => {
                const allFilled = [...inputs].every(i => i.value.length >= 6);
                saveBtn.classList.toggle('banner--pulse', allFilled);
                saveBtn.classList.toggle('banner--disabled', !allFilled);
            };
            inputs.forEach(i => i.addEventListener('input', check));
            check();
        }
        watchSaveButton();

        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            const saveBtn = document.querySelector('wheff-banner[action="save"]');
            if (saveBtn && !saveBtn.classList.contains('banner--disabled')) saveBtn.click();
        });

        document.addEventListener('wheff-action', async (e) => {
            if (e.detail.action === 'back') {
                window.location.href = '/pages/login.html';
                return;
            }
            if (e.detail.action !== 'save') return;

            const card = e.target.closest('wheff-card');
            const data = card.getFormData();
            const pw = data['new'];
            const confirm = data['confirm'];

            if (!pw || pw.length < 6) {
                showToast('Password must be at least 6 characters', { type: 'error' });
                return;
            }
            if (pw !== confirm) {
                showToast('Passwords do not match', { type: 'error' });
                return;
            }

            const saveBtn = document.querySelector('wheff-banner[action="save"]');
            setBannerLoading(saveBtn, true);

            try {
                await updatePassword(pw);
                showToast('Password updated');
                setTimeout(() => { window.location.href = '/pages/game.html'; }, 1000);
            } catch (err) {
                setBannerLoading(saveBtn, false);
                showToast(friendlyError(err), { type: 'error' });
            }
        });
    </script>

</body>
</html>

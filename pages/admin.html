<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Where's Jeff?</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css">

<body>

<div class="admin-shell">

    <!-- ═══ SIDEBAR ═══ -->
    <nav class="sidebar">
        <div class="sidebar__logo">

        </div>

            <ul class="sidebar__nav">
                <li class="sidebar__item active" data-tab="seasons">

                                        <option value="5">May</option><option value="6">June</option>
                                        <option value="7">July</option><option value="8">August</option>
                                        <option value="9">September</option><option value="10">October</option>
                                        <option value="11">November</option><option value="12">December</option>

                                    </div>
                                    <div id="period-start-hm-wrap" style="display:none;align-items:center;gap:6px">
                                        <label class="form-label" style="margin:0">Time</label>
                                        <input class="form-input" type="number" id="period-start-hour" style="width:60px" min="0" max="23" placeholder="0">
                                        <span style="font-weight:700">:</span>
                                        <input class="form-input" type="number" id="period-start-minute" style="width:60px" min="0" max="59" placeholder="0">

                                </div>
                                <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:4px;font-size:12px;color:var(--admin-text-secondary);padding-left:2px">to</div>
                                <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                                    <div style="display:flex;align-items:center;gap:6px">

                                    </div>
                                    <div id="period-end-month-wrap" style="display:none;align-items:center;gap:6px">
                                        <label class="form-label" style="margin:0">Month</label>
                                        <select class="form-input" id="period-end-month" style="width:130px">
                                            <option value="1">January</option><option value="2">February</option>
                                            <option value="3">March</option><option value="4">April</option>
                                            <option value="5">May</option><option value="6">June</option>
                                            <option value="7">July</option><option value="8">August</option>
                                            <option value="9">September</option><option value="10">October</option>

<!-- ═══ MODAL ═══ -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">

        <div class="modal__actions" id="modal-actions"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/exifreader@4.37.0/dist/exif-reader.js"></script>
<script type="module">
import { requireAuth, getProfile, validateName } from '../lib/auth.js';
import * as api from '../lib/admin.js';
import { checkSeasonAutoEnd, formatTimeTitle, timeToDecimal, decimalToTime, computeTimePeriod } from '../lib/game.js';
import { showToast } from '../lib/toast.js';

function setButtonLoading(btn, loading) {
    if (loading) {
        const textColor = getComputedStyle(btn).color;
        btn.classList.add('btn--loading');
        btn.style.color = 'transparent';
        if (!btn.querySelector('.loader')) {
            btn.insertAdjacentHTML('beforeend', `<span class="loader loader--admin" style="color:${textColor}"></span>`);
        }
    } else {
        btn.classList.remove('btn--loading');
        btn.style.color = '';
        btn.querySelector('.loader')?.remove();
    }
}

// ── Auth guard ──
const session = await requireAuth();
if (!session) throw new Error('Not authenticated');
const profile = await getProfile();
if (!profile?.is_admin) {
    window.location.href = '/pages/game.html';
    throw new Error('Not admin');
}

// ── Sidebar nav ──
const navItems = document.querySelectorAll('.sidebar__item[data-tab]');
const panels = document.querySelectorAll('.panel');
const pageTitle = document.getElementById('page-title');
const pageActions = document.getElementById('page-actions');
const titles = { seasons: 'Games', mysteries: 'Mysteries', users: 'Users' };

function wireDragDrop(zone, input, handler) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); if (e.dataTransfer.files.length) handler(e.dataTransfer.files[0]); });
    input?.addEventListener('change', () => { if (input.files.length) handler(input.files[0]); });
}

function switchTab(tab) {
    navItems.forEach(n => n.classList.toggle('active', n.dataset.tab === tab));
    panels.forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`));
    pageTitle.textContent = titles[tab] || tab;
    pageActions.innerHTML = '';
    if (tab === 'seasons') {
        pageActions.innerHTML = '<button class="btn btn--primary" id="btn-new-season-header">New game</button>';
        document.getElementById('btn-new-season-header').addEventListener('click', promptNewSeason);
    }
    if (tab === 'mysteries') {
        setTimeout(() => { answerMap?.invalidateSize(); }, 200);
    }
}

navItems.forEach(item => {
    item.addEventListener('click', () => switchTab(item.dataset.tab));
});

// ── Modal helpers ──
const modalOverlay = document.getElementById('modal-overlay');
function showModal(title, bodyHtml, actions) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = bodyHtml;
    const actionsEl = document.getElementById('modal-actions');
    actionsEl.innerHTML = '';
    actions.forEach(a => {
        const btn = document.createElement('button');
        btn.className = `btn ${a.cls || 'btn--plain'}`;
        btn.textContent = a.label;
        btn.addEventListener('click', () => { closeModal(); a.fn?.(); });
        actionsEl.appendChild(btn);
    });
    modalOverlay.classList.add('active');
}
function closeModal() { modalOverlay.classList.remove('active'); }
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

// ══════════════════════════════════════════
// ═══ GAMES ══════════════════════════════
// ══════════════════════════════════════════

const seasonsList = document.getElementById('seasons-list');
const seasonDetail = document.getElementById('season-detail');

function promptNewSeason() {
    showModal('New game', `
        <div class="form-group">
            <label class="form-label">Game name</label>
            <input class="form-input" id="modal-season-name" placeholder="e.g. Familiefeide, Sesong 2..." maxlength="20">
        </div>`, [
        { label: 'Cancel' },
        { label: 'Create', cls: 'btn--primary', fn: async () => {
            const name = document.getElementById('modal-season-name').value.trim();
            if (name) { await api.createSeason(name); showToast('Game created'); renderSeasons(); }
        }}
    ]);
    setTimeout(() => document.getElementById('modal-season-name')?.focus(), 100);
}

let cachedWaitingImages = {};
const MYSTERY_TYPES = [
    { key: 'location', label: 'Location' },
    { key: 'time', label: 'Time' },
    { key: 'film', label: 'Film / TV' },
    { key: 'cyber', label: 'Cyberspace' }
];

async function renderSeasons() {
    seasonDetail.style.display = 'none';
    seasonsList.style.display = 'block';
    try {
        const imgKeys = MYSTERY_TYPES.map(t => `waiting_image_${t.key}`);
        const [seasons, ...imgValues] = await Promise.all([
            api.getSeasons(),
            ...imgKeys.map(k => api.getSetting(k))
        ]);
        const waitingImages = {};
        MYSTERY_TYPES.forEach((t, i) => { waitingImages[t.key] = imgValues[i]; });

        let html = `<div class="card">
            <div class="card__header">
                <span class="card__title">Waiting images</span>
            </div>
            <div class="card__body">
                <div class="form-group" style="margin-bottom:18px">
                    <label class="form-label">Type</label>
                    <select class="form-input" id="waiting-type-select" style="max-width:200px">
                        ${MYSTERY_TYPES.map(t => `<option value="${t.key}">${t.label}</option>`).join('')}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Image</label>
                    <div class="upload-zone" id="waiting-upload-zone">
                        <input type="file" accept="image/*" id="waiting-image-file">
                        <div class="upload-zone__text">Drop image here or click to browse</div>
                        <div class="upload-zone__hint">JPG, PNG, WebP</div>
                    </div>
                    <div class="upload-preview" id="waiting-upload-preview" ${waitingImages.location ? 'style="display:block"' : ''}>
                        <img id="waiting-preview-img" alt="Preview" ${waitingImages.location ? `src="${esc(waitingImages.location)}"` : ''}>
                    </div>
                </div>
            </div>
        </div>`;
        cachedWaitingImages = waitingImages;

        let gamesHtml = '';
        if (!seasons.length) {
            gamesHtml = '<div class="empty-state">No games yet. Click "New game" to create one.</div>';
        } else {
            gamesHtml = `<div class="card"><table class="admin-table">
            <thead><tr>
                <th>Name</th><th>Created</th><th>Status</th><th>Members</th><th>Mysteries</th><th></th>
            </tr></thead>
            <tbody>${seasons.map(s => `
                <tr class="clickable-row" data-season-id="${s.id}">
                    <td style="font-weight:500">${esc(s.name)}</td>
                    <td>${formatAdminDate(s.created_at)}</td>
                    <td>${s.active ? '<span class="badge badge--active">Active</span>' : '<span class="badge badge--ended">Ended</span>'}</td>
                    <td>${s.season_members?.length || 0}</td>
                    <td>${s.mysteries?.length || 0}</td>
                    <td class="actions">
                        <button class="btn btn--danger btn--small btn-del-season" data-id="${s.id}">Delete</button>
                    </td>
                </tr>`).join('')}
            </tbody></table></div>`;
        }
        seasonsList.innerHTML = gamesHtml + html;
        seasonsList.querySelectorAll('.clickable-row').forEach(row => {
            row.addEventListener('click', e => {
                if (e.target.closest('.btn')) return;
                openSeasonDetail(row.dataset.seasonId);
            });
        });
        seasonsList.querySelectorAll('.btn-del-season').forEach(btn => {
            btn.addEventListener('click', () => {
                showModal('Delete game?', '<p style="color:#616161">This permanently deletes the game, its members, and all mysteries.</p>', [
                    { label: 'Cancel' },
                    { label: 'Delete', cls: 'btn--danger', fn: async () => { await api.deleteSeason(btn.dataset.id); showToast('Game deleted'); renderSeasons(); } }
                ]);
            });
        });
        wireWaitingImageUploads();
    } catch (err) {
        seasonsList.innerHTML = `<div class="empty-state">Error: ${esc(err.message)}</div>`;
    }
}

function wireWaitingImageUploads() {
    const select = document.getElementById('waiting-type-select');
    const zone = document.getElementById('waiting-upload-zone');
    const input = document.getElementById('waiting-image-file');
    const preview = document.getElementById('waiting-upload-preview');
    const img = document.getElementById('waiting-preview-img');
    if (!select || !zone) return;

    function showPreviewForType(type) {
        const url = cachedWaitingImages[type];
        if (url) { img.src = url; preview.style.display = 'block'; }
        else { img.src = ''; preview.style.display = 'none'; }
    }

    select.addEventListener('change', () => showPreviewForType(select.value));

    wireDragDrop(zone, input, doUpload);

    async function doUpload(file) {
        const type = select.value;
        const { blob } = await processImage(file);
        if (img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
        img.src = URL.createObjectURL(blob);
        preview.style.display = 'block';
        try {
            const url = await api.uploadWaitingImage(type, blob);
            cachedWaitingImages[type] = url;
            showToast('Image uploaded');
        } catch (err) { showToast('Upload failed: ' + err.message, { type: 'error' }); }
    }
}

function renderSeasonMysteriesTable(mysteries) {
    if (!mysteries.length) return '<div class="card__body"><div class="empty-state" style="padding:16px 0">No mysteries in this game. Click "+ Add mystery" above.</div></div>';
    return `<table class="admin-table">
        <thead><tr><th style="width:30px"></th><th>Location</th><th>Status</th><th>Publish</th><th>Reveal</th><th></th></tr></thead>
        <tbody>${mysteries.map(m => {
            const st = api.mysteryStatus(m);
            const locked = st === 'live' || st === 'revealed';
            return `<tr ${locked ? '' : 'draggable="true"'} data-id="${m.id}" data-pub="${m.published_at || ''}" data-rev="${m.reveals_at || ''}" data-status="${st}">
                <td style="${locked ? 'color:#ddd' : 'cursor:grab;color:#999'};text-align:center" title="${locked ? 'Cannot reorder (already active/revealed)' : 'Drag to reorder'}">${locked ? '—' : '⠿'}</td>
                <td style="font-weight:500">${esc(m.title || '(untitled)')}${m.override ? ' <span style="color:var(--admin-accent);font-size:11px" title="Manual override">✎</span>' : ''}</td>
                <td><span class="badge badge--${st}">${st}</span></td>
                <td class="td-publish">${api.formatDate(m.published_at)}</td>
                <td class="td-reveal">${api.formatDate(m.reveals_at)}</td>
                <td class="actions">
                    ${locked ? '' : `<button class="btn btn--plain btn--small btn-edit-timing" data-id="${m.id}">Edit</button>`}
                    ${m.override && !locked ? `<button class="btn btn--plain btn--small btn-reset-timing" data-id="${m.id}">Reset</button>` : ''}
                    ${locked ? '' : `<button class="btn btn--danger btn--small btn-remove-mystery" data-id="${m.id}">Remove</button>`}
                </td>
            </tr>`;
        }).join('')}</tbody></table>`;
}

let schedStartInterval = null;

async function openSeasonDetail(id) {
    if (schedStartInterval) { clearInterval(schedStartInterval); schedStartInterval = null; }
    seasonsList.style.display = 'none';
    seasonDetail.style.display = 'block';

                    </div>
                    ${pendingMembers.length ? `<table class="admin-table" style="margin-bottom:12px">
                        <thead><tr><th>Pending invites</th><th></th></tr></thead>
                        <tbody>${pendingMembers.map(p => `<tr>
                            <td style="color:var(--admin-text-secondary)">${esc(p.email)}</td>
                            <td class="actions"><button class="btn btn--danger btn--small btn-rm-pending" data-email="${esc(p.email)}">Remove</button></td>
                        </tr>`).join('')}</tbody></table>` : ''}
                    ${members.length ? `<table class="admin-table" style="margin-top:4px">
                        <thead><tr><th>Name</th><th>Score</th><th>Wins</th><th>Karma</th><th></th></tr></thead>
                        <tbody>${members.map(m => {

                                <td>${s.score}</td>

                                <td>${(k > 0 ? '+' : '') + k.toLocaleString()}</td>
                                <td class="actions"><button class="btn btn--danger btn--small btn-rm-member" data-uid="${m.user_id}">Remove</button></td>
                            </tr>`;
                        }).join('')}</tbody></table>` : '<div class="empty-state" style="padding:16px 0">No members yet</div>'}
                </div>
            </div>
            <div class="card" id="schedule-card" ${isEnded || !mysteries.length || hasLocked ? 'style="opacity:0.45;pointer-events:none"' : ''}>
                <div class="card__header">
                    <span class="card__title">Schedule</span>
                    ${!mysteries.length ? '<span style="font-size:12px;color:var(--admin-text-secondary)">Add a mystery first</span>' : ''}
                    ${hasLocked ? '<span style="font-size:12px;color:var(--admin-text-secondary)">Locked — game has active or completed mysteries</span>' : ''}
                </div>
                <div class="card__body">
                    <div class="form-row">
                        <div class="form-group" style="flex:1">
                            <label class="form-label">Start time</label>
                            <input class="form-input" type="datetime-local" id="sched-start" value="${mysteries.length ? api.toDatetimeLocal(season.starts_at) : (() => { const n = new Date(); n.setSeconds(0,0); n.setMinutes(n.getMinutes()+1); return api.toDatetimeLocal(n.toISOString()); })()}" min="${(() => { const n = new Date(); n.setSeconds(0,0); n.setMinutes(n.getMinutes()+1); return api.toDatetimeLocal(n.toISOString()); })()}">
                        </div>
                        <div class="form-group" style="flex:0.6">
                            <label class="form-label">Frequency</label>
                            <div style="display:flex;gap:6px">
                                <input class="form-input" type="number" id="sched-freq-val" min="1" value="${season.frequency_value || ''}" placeholder="30" style="width:70px">
                                <select class="form-input" id="sched-freq-unit">
                                    ${['seconds','minutes','hours','days','weeks'].map(u => `<option value="${u}" ${(season.frequency_unit || 'minutes') === u ? 'selected' : ''}>${u}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="form-group" style="flex:0.6">
                            <label class="form-label">Gap</label>
                            <div style="display:flex;gap:6px">
                                <input class="form-input" type="number" id="sched-gap-val" min="0" value="${season.gap_value ?? ''}" placeholder="5" style="width:70px">
                                <select class="form-input" id="sched-gap-unit">
                                    ${['seconds','minutes','hours','days','weeks'].map(u => `<option value="${u}" ${(season.gap_unit || 'minutes') === u ? 'selected' : ''}>${u}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <button class="btn btn--primary" id="btn-save-schedule" style="align-self:flex-end">${season.frequency_value ? 'Update' : 'Save'}</button>
                    </div>
                </div>
            </div>
            <div class="card" ${ghostStyle}>
                <div class="card__header">
                    <span class="card__title">Mysteries (${mysteries.length})</span>
                    <button class="btn btn--primary btn--small" id="btn-add-mystery">+ Add mystery</button>
                </div>
                <div id="season-mysteries-table">
                    ${renderSeasonMysteriesTable(mysteries)}
                </div>
            </div>`;

        function getScheduleConfig() {
            const freqRaw = document.getElementById('sched-freq-val')?.value;
            const gapRaw = document.getElementById('sched-gap-val')?.value;
            return {
                starts_at: document.getElementById('sched-start')?.value ? new Date(document.getElementById('sched-start').value).toISOString() : season.starts_at,
                frequency_value: freqRaw !== '' ? parseInt(freqRaw) : null,
                frequency_unit: document.getElementById('sched-freq-unit')?.value || 'minutes',
                gap_value: gapRaw !== '' ? parseInt(gapRaw) : null,
                gap_unit: document.getElementById('sched-gap-unit')?.value || 'minutes'
            };
        }

        async function saveScheduleConfig() {
            const config = getScheduleConfig();
            await api.updateSeason(id, {
                starts_at: config.starts_at,
                frequency_value: config.frequency_value,
                frequency_unit: config.frequency_unit,
                gap_value: config.gap_value,
                gap_unit: config.gap_unit
            });
            season.frequency_value = config.frequency_value;
            season.frequency_unit = config.frequency_unit;
        }

        async function recalcAndSave() {
            const config = getScheduleConfig();
            if (!config.frequency_value || !season.frequency_value) return;
            const fresh = await api.getMysteriesBySeason(id);
            const scheduled = api.computeSchedule(fresh, config);
            await api.batchUpdateTimings(scheduled.map(m => ({
                id: m.id, published_at: m.published_at, reveals_at: m.reveals_at, override: m.override ?? false
            })));
            const updated = await api.getMysteriesBySeason(id);
            document.getElementById('season-mysteries-table').innerHTML = renderSeasonMysteriesTable(updated);
            const titleEl = seasonDetail.querySelector('#season-mysteries-table')?.closest('.card')?.querySelector('.card__title');
            if (titleEl) titleEl.textContent = `Mysteries (${updated.length})`;
            wireMysteriesTable(id, season);
        }

        seasonDetail.querySelector('#btn-save-schedule')?.addEventListener('click', async () => {
            const config = getScheduleConfig();
            if (!config.starts_at || !document.getElementById('sched-start').value) {
                return showToast('Set a start time', { type: 'error' });
            }
            if (!config.frequency_value || config.frequency_value <= 0) {
                return showToast('Set a valid frequency', { type: 'error' });
            }
            if (config.gap_value == null || config.gap_value < 0) {
                return showToast('Set a valid gap (0 or more)', { type: 'error' });
            }
            const freqMs = config.frequency_value * ({ seconds: 1000, minutes: 60000, hours: 3600000, days: 86400000, weeks: 604800000 }[config.frequency_unit] || 60000);
            const gapMs = config.gap_value * ({ seconds: 1000, minutes: 60000, hours: 3600000, days: 86400000, weeks: 604800000 }[config.gap_unit] || 60000);
            if (gapMs >= freqMs) {
                return showToast('Gap must be shorter than frequency', { type: 'error' });
            }
            const minStart = new Date();
            minStart.setSeconds(0, 0);
            minStart.setMinutes(minStart.getMinutes() + 1);
            if (new Date(config.starts_at) < minStart) {
                return showToast('Start time must be at least 1 minute from now', { type: 'error' });
            }
            await saveScheduleConfig();
            await recalcAndSave();
            document.getElementById('btn-save-schedule').textContent = 'Update';
            showToast('Schedule saved');
        });

        let schedStartUserEdited = !!season.frequency_value;
        const schedStartInput = document.getElementById('sched-start');
        if (schedStartInput) {
            schedStartInput.addEventListener('input', () => { schedStartUserEdited = true; });
            schedStartInterval = setInterval(() => {
                if (schedStartUserEdited) return;
                const next = new Date();
                next.setSeconds(0, 0);
                next.setMinutes(next.getMinutes() + 1);
                schedStartInput.value = api.toDatetimeLocal(next.toISOString());
                schedStartInput.min = api.toDatetimeLocal(next.toISOString());
            }, 10000);
        }

        seasonDetail.querySelector('#btn-add-mystery')?.addEventListener('click', async () => {
            const [allMysteries, currentMysteries] = await Promise.all([api.getMysteries(), api.getMysteriesBySeason(id)]);
            const library = api.getLibraryMysteries(allMysteries);
            const existingTemplateIds = new Set(currentMysteries.map(m => m.template_id));
            const available = library.filter(m => !existingTemplateIds.has(m.template_id || m.id));
            if (!available.length) return showToast('No mysteries available. Create some in the Mysteries tab first.');
            showModal('Add mystery', `
                <div style="max-height:400px;overflow-y:auto">
                    ${available.map(m => `
                        <div class="mystery-picker-item" data-tid="${m.template_id || m.id}" style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0;cursor:pointer">
                            ${m.image_url ? `<img src="${esc(m.image_url)}" style="width:48px;height:36px;object-fit:cover;border-radius:4px">` : '<div style="width:48px;height:36px;background:#f0f0f0;border-radius:4px"></div>'}
                            <span style="font-weight:500">${esc(m.title || '(untitled)')}</span>
                        </div>
                    `).join('')}
                </div>`, [{ label: 'Cancel' }]);
            document.querySelectorAll('.mystery-picker-item').forEach(item => {
                item.addEventListener('click', async () => {
                    closeModal();
                    const schedCard = document.getElementById('schedule-card');
                    const currentMysteries = await api.getMysteriesBySeason(id);
                    const hasExistingTimings = currentMysteries.some(m => m.published_at);
                    if (schedCard?.style.opacity === '0.45' && !hasExistingTimings) {
                        schedCard.style.opacity = '';
                        schedCard.style.pointerEvents = '';
                        schedCard.querySelector('.card__header span:last-child')?.remove();
                        const startInput = document.getElementById('sched-start');
                        if (startInput) startInput.value = api.toDatetimeLocal(new Date().toISOString());
                    }
                    await api.addMysteryToSeason(id, item.dataset.tid);
                    const updated = await api.getMysteriesBySeason(id);
                    document.getElementById('season-mysteries-table').innerHTML = renderSeasonMysteriesTable(updated);
                    const titleEl = seasonDetail.querySelector('#season-mysteries-table')?.closest('.card')?.querySelector('.card__title');
                    if (titleEl) titleEl.textContent = `Mysteries (${updated.length})`;
                    wireMysteriesTable(id, season);
                    showToast('Mystery added');
                });
            });
        });

        function wireMysteriesTable(seasonId, seasonObj) {
            const tbody = seasonDetail.querySelector('#season-mysteries-table tbody');
            if (!tbody) return;

            tbody.querySelectorAll('tr[draggable]').forEach(row => {
                row.addEventListener('dragstart', e => {
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', row.dataset.id);
                    row.classList.add('dragging');
                });
                row.addEventListener('dragend', () => row.classList.remove('dragging'));
                row.addEventListener('dragover', e => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    const dragging = tbody.querySelector('.dragging');
                    if (dragging && dragging !== row) {
                        const rect = row.getBoundingClientRect();
                        const mid = rect.top + rect.height / 2;
                        if (e.clientY < mid) tbody.insertBefore(dragging, row);
                        else tbody.insertBefore(dragging, row.nextSibling);
                    }
                });
                row.addEventListener('drop', async e => {
                    e.preventDefault();
                    const draggedRow = tbody.querySelector('.dragging');
                    const draggedId = draggedRow?.dataset.id;
                    if (!draggedId) return;
                    const wasOverride = draggedRow.querySelector('.btn-reset-timing') !== null;

                    const orderedIds = [...tbody.querySelectorAll('tr')].map(r => r.dataset.id);

                    if (wasOverride) {
                        const dragPub = draggedRow.dataset.pub;
                        const dragRev = draggedRow.dataset.rev;
                        let hasConflict = false;
                        if (dragPub && dragRev) {
                            const dPubMs = new Date(dragPub).getTime();
                            const dRevMs = new Date(dragRev).getTime();
                            const allRows = [...tbody.querySelectorAll('tr')];
                            for (const otherRow of allRows) {
                                if (otherRow.dataset.id === draggedId) continue;
                                const oPub = otherRow.dataset.pub;
                                const oRev = otherRow.dataset.rev;
                                if (!oPub || !oRev) continue;
                                if (dPubMs < new Date(oRev).getTime() && dRevMs > new Date(oPub).getTime()) {
                                    hasConflict = true;
                                    break;
                                }
                            }
                        } else {
                            hasConflict = true;
                        }

                        await api.reorderSeasonMysteries(seasonId, orderedIds);
                        if (!hasConflict) {
                            await recalcAndSave();
                            showToast('Order updated');
                            return;
                        }
                        const fresh = await api.getMysteriesBySeason(seasonId);
                        document.getElementById('season-mysteries-table').innerHTML = renderSeasonMysteriesTable(fresh);
                        const titleEl = seasonDetail.querySelector('#season-mysteries-table')?.closest('.card')?.querySelector('.card__title');
                        if (titleEl) titleEl.textContent = `Mysteries (${fresh.length})`;
                        wireMysteriesTable(seasonId, seasonObj);
                        const newTbody = seasonDetail.querySelector('#season-mysteries-table tbody');
                        const editBtn = newTbody?.querySelector(`tr[data-id="${draggedId}"] .btn-edit-timing`);
                        if (editBtn) editBtn.click();
                        return;
                    }

                    const config = getScheduleConfig();
                    if (config.frequency_value && config.gap_value != null) {
                        const freqMs = config.frequency_value * ({ seconds: 1000, minutes: 60000, hours: 3600000, days: 86400000, weeks: 604800000 }[config.frequency_unit] || 60000);
                        const gapMs = config.gap_value * ({ seconds: 1000, minutes: 60000, hours: 3600000, days: 86400000, weeks: 604800000 }[config.gap_unit] || 60000);
                        const durationMs = freqMs - gapMs;
                        const allRows = [...tbody.querySelectorAll('tr')];
                        const dragIdx = allRows.findIndex(r => r.dataset.id === draggedId);
                        const prevRow = dragIdx > 0 ? allRows[dragIdx - 1] : null;
                        const nextRow = dragIdx < allRows.length - 1 ? allRows[dragIdx + 1] : null;
                        const nextIsOverride = nextRow?.querySelector('.btn-reset-timing') !== null;

                        if (nextIsOverride && nextRow.dataset.pub) {
                            const nextPubMs = new Date(nextRow.dataset.pub).getTime();
                            let windowStart;
                            if (prevRow && prevRow.dataset.rev) {
                                windowStart = new Date(prevRow.dataset.rev).getTime() + gapMs;
                            } else if (config.starts_at) {
                                windowStart = new Date(config.starts_at).getTime();
                            } else {
                                windowStart = nextPubMs - freqMs;
                            }
                            const availableMs = nextPubMs - windowStart - gapMs;
                            const MIN_DURATION = 10000;
                            if (availableMs < MIN_DURATION) {
                                await recalcAndSave();
                                showToast('Not enough room — mystery cannot fit here', { type: 'error' });
                                return;
                            }
                        }
                    }

                    await api.updateMysteryTiming(draggedId, { override: false });
                    await api.reorderSeasonMysteries(seasonId, orderedIds);
                    await recalcAndSave();
                    showToast('Order updated');
                });
            });

            tbody.querySelectorAll('.btn-edit-timing').forEach(btn => {
                btn.addEventListener('click', () => {
                    const row = btn.closest('tr');
                    const mid = row.dataset.id;
                    const pubTd = row.querySelector('.td-publish');
                    const revTd = row.querySelector('.td-reveal');
                    const pubVal = row.dataset.pub || '';
                    const revVal = row.dataset.rev || '';
                    pubTd.innerHTML = `<input class="form-input" type="datetime-local" value="${api.toDatetimeLocal(pubVal)}" style="font-size:12px;padding:4px 6px" id="edit-pub-${mid}">`;
                    revTd.innerHTML = `<input class="form-input" type="datetime-local" value="${api.toDatetimeLocal(revVal)}" style="font-size:12px;padding:4px 6px" id="edit-rev-${mid}">`;
                    const saveBtn = document.createElement('button');
                    saveBtn.className = 'btn btn--primary btn--small';
                    saveBtn.textContent = 'Save';
                    btn.replaceWith(saveBtn);
                    saveBtn.addEventListener('click', async () => {
                        const newPub = document.getElementById(`edit-pub-${mid}`).value;
                        const newRev = document.getElementById(`edit-rev-${mid}`).value;
                        if (!newPub || !newRev) {
                            return showToast('Both publish and reveal times are required', { type: 'error' });
                        }
                        const pubMs = new Date(newPub).getTime();
                        const revMs = new Date(newRev).getTime();
                        if (revMs <= pubMs) {
                            return showToast('Reveal must be after publish', { type: 'error' });
                        }
                        const allRows = [...tbody.querySelectorAll('tr')];
                        for (const otherRow of allRows) {
                            if (otherRow.dataset.id === mid) continue;
                            const oPub = otherRow.dataset.pub;
                            const oRev = otherRow.dataset.rev;
                            if (!oPub || !oRev) continue;
                            const oPubMs = new Date(oPub).getTime();
                            const oRevMs = new Date(oRev).getTime();
                            if (pubMs < oRevMs && revMs > oPubMs) {
                                return showToast('Time interval overlaps with another mystery', { type: 'error' });
                            }
                        }
                        await api.updateMysteryTiming(mid, {
                            published_at: new Date(newPub).toISOString(),
                            reveals_at: new Date(newRev).toISOString(),
                            override: true
                        });
                        const fresh = await api.getMysteriesBySeason(seasonId);
                        const correctOrder = [...fresh].sort((a, b) => {
                            const aTime = a.published_at ? new Date(a.published_at).getTime() : Infinity;
                            const bTime = b.published_at ? new Date(b.published_at).getTime() : Infinity;
                            return aTime - bTime;
                        });
                        const needsReorder = correctOrder.some((m, i) => m.sort_order !== i);
                        if (needsReorder) {
                            await api.reorderSeasonMysteries(seasonId, correctOrder.map(m => m.id));
                        }
                        await recalcAndSave();
                        if (needsReorder) {
                            const movedRow = seasonDetail.querySelector(`#season-mysteries-table tr[data-id="${mid}"]`);
                            if (movedRow) {
                                movedRow.style.transition = 'background 0.6s';
                                movedRow.style.background = '#fff8e1';
                                setTimeout(() => { movedRow.style.background = ''; }, 800);
                            }
                        }
                        showToast('Timing updated');
                    });
                });
            });

            tbody.querySelectorAll('.btn-reset-timing').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await api.updateMysteryTiming(btn.dataset.id, { override: false });
                    await recalcAndSave();
                    showToast('Override cleared');
                });
            });

            tbody.querySelectorAll('.btn-remove-mystery').forEach(btn => {
                btn.addEventListener('click', () => {
                    showModal('Remove mystery?', '<p style="color:#616161">Remove this mystery from the game? Associated guesses will be deleted.</p>', [
                        { label: 'Cancel' },
                        { label: 'Remove', cls: 'btn--danger', fn: async () => {
                            await api.removeMysteryInstance(btn.dataset.id);
                            await recalcAndSave();
                            showToast('Mystery removed');
                        }}
                    ]);
                });
            });
        }

        wireMysteriesTable(id, season);
        seasonDetail.querySelector('#btn-season-back').addEventListener('click', renderSeasons);
        seasonDetail.querySelector('#btn-save-settings')?.addEventListener('click', async () => {
            const name = document.getElementById('season-rename').value.trim();
            const displayTitle = document.getElementById('season-display-title').value.trim();
            const maxPlayers = parseInt(document.getElementById('season-max-players').value, 10);
            if (!name) return showToast('Label cannot be empty', { type: 'error' });
            if (maxPlayers < 1) return showToast('Max players must be at least 1', { type: 'error' });
            await api.updateSeason(id, { name, display_title: displayTitle || null, max_players: maxPlayers });
            showToast('Settings saved');

let reverseGeoTimer = null;
function updateCoordsLabel(latlng) {
    const coordsEl = document.getElementById('answer-coords');
    coordsEl.textContent = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)} — loading...`;
    resolvedLocationName = 'Unknown';
    resolvedLocationLevels = [];
    clearTimeout(reverseGeoTimer);
    reverseGeoTimer = setTimeout(() => {
        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latlng.lat}&lon=${latlng.lng}&format=json&addressdetails=1&zoom=18&accept-language=en`, {
            headers: { 'Accept': 'application/json' }
        })
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => {
            if (!data || data.error) return;
            const a = data.address || {};
            const levels = [
                a.road || a.pedestrian || a.path || '',
                a.neighbourhood || a.suburb || a.quarter || a.borough || '',
                a.city || a.town || a.village || a.hamlet || a.municipality || '',
                a.state || a.region || a.county || '',
                a.country || ''
            ].filter(Boolean);
            resolvedLocationLevels = levels;
            resolvedLocationName = levels.length >= 3 ? levels[levels.length - 3] : (levels[0] || 'Unknown');
            coordsEl.textContent = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)} — ${levels.join(', ')}`;
        })
        .catch(() => {
            coordsEl.textContent = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
        });
    }, 600);
}

function autoFillPeriod() {
    if (periodManuallyEdited) return;
    const ans = getTimeAnswerFromForm();
    if (!ans) return;
    const ansDec = timeToDecimal(ans);
    const period = computeTimePeriod(ansDec);
    const BIG_BANG = -13_800_000_000;
    const now = new Date();
    const y = now.getFullYear();
    const soy = new Date(y, 0, 1);
    const eoy = new Date(y + 1, 0, 1);
    const nowDec = y + (now - soy) / (eoy - soy);
    const earliestStart = Math.max(BIG_BANG, ansDec - period);
    const latestStart = Math.min(nowDec - period, ansDec);
    const frac = Math.random();
    const startDec = Math.max(BIG_BANG, earliestStart + frac * (latestStart - earliestStart));
    const endDec = Math.min(nowDec, startDec + period);
    fillPeriodFields('period-start', decimalToTime(startDec), ans.detail_level);
    fillPeriodFields('period-end', decimalToTime(endDec), ans.detail_level);
}

function fillPeriodFields(prefix, t, dl) {
    document.getElementById(`${prefix}-year`).value = Math.abs(t.year);
    document.getElementById(`${prefix}-bc`).checked = t.bc || t.year < 0;
    if (dl === 'month' || dl === 'day' || dl === 'minute') document.getElementById(`${prefix}-month`).value = t.month || 1;
    if (dl === 'day' || dl === 'minute') document.getElementById(`${prefix}-day`).value = t.day || 1;
    if (dl === 'minute') {
        document.getElementById(`${prefix}-hour`).value = t.hour || 0;
        document.getElementById(`${prefix}-minute`).value = t.minute || 0;
    }
}

function readPeriodFields(prefix, dl) {
    const yearVal = document.getElementById(`${prefix}-year`).value;
    if (!yearVal && yearVal !== '0') return null;
    const bc = document.getElementById(`${prefix}-bc`).checked;
    const obj = { year: Number(yearVal), bc };
    if (bc && obj.year > 0) obj.year = -obj.year;
    if (dl === 'month' || dl === 'day' || dl === 'minute') obj.month = Number(document.getElementById(`${prefix}-month`).value) || 1;
    if (dl === 'day' || dl === 'minute') obj.day = Number(document.getElementById(`${prefix}-day`).value) || 1;
    if (dl === 'minute') {
        obj.hour = Number(document.getElementById(`${prefix}-hour`).value) || 0;
        obj.minute = Number(document.getElementById(`${prefix}-minute`).value) || 0;
    }
    return obj;
}

function clearPeriodFields(prefix) {
    document.getElementById(`${prefix}-year`).value = '';
    document.getElementById(`${prefix}-bc`).checked = false;
    document.getElementById(`${prefix}-month`).value = '1';
    document.getElementById(`${prefix}-day`).value = '';
    document.getElementById(`${prefix}-hour`).value = '';
    document.getElementById(`${prefix}-minute`).value = '';
}

function getTimeAnswerFromForm() {
    const dl = document.getElementById('time-detail-level').value;
    const yearVal = document.getElementById('time-year').value;
    if (!yearVal && yearVal !== '0') return null;
    const bc = document.getElementById('time-bc').checked;
    const ans = { year: Number(yearVal), bc, detail_level: dl };
    if (bc && ans.year > 0) ans.year = -ans.year;
    if (dl === 'month' || dl === 'day' || dl === 'minute') ans.month = Number(document.getElementById('time-month').value) || 1;
    if (dl === 'day' || dl === 'minute') ans.day = Number(document.getElementById('time-day').value) || 1;
    if (dl === 'minute') {
        ans.hour = Number(document.getElementById('time-hour').value) || 0;
        ans.minute = Number(document.getElementById('time-minute').value) || 0;
    }
    const rangeVal = Number(document.getElementById('time-range').value);
    if (rangeVal > 0) {
        ans.range = rangeVal;
        ans.range_unit = document.getElementById('time-range-unit-select').value;
    }
    const ps = readPeriodFields('period-start', dl);
    const pe = readPeriodFields('period-end', dl);
    if (ps) ans.period_start = ps;
    if (pe) ans.period_end = pe;
    return ans;
}

function formatRangeValue(n) {
    if (n >= 1_000_000_000) return `${parseFloat((n / 1_000_000_000).toFixed(1))}B`;
    if (n >= 1_000_000) return `${parseFloat((n / 1_000_000).toFixed(1))}M`;
    if (n >= 10_000) return `${parseFloat((n / 1_000).toFixed(1))}K`;
    return String(n);
}

function updateTimePreview() {
    const ans = getTimeAnswerFromForm();
    const el = document.getElementById('time-preview');
    if (!ans) { el.textContent = 'No time selected'; return; }
    let text = formatTimeTitle(ans);
    if (ans.range > 0) {
        const rangeUnitVal = document.getElementById('time-range-unit-select').value;
        const unitMap = { year: 'years', month: 'months', day: 'days', hour: 'hours', minute: 'minutes' };
        text += ` (± ${formatRangeValue(ans.range)} ${unitMap[rangeUnitVal] || 'years'})`;
    }
    if (ans.period_start && ans.period_end) {
        text += ` | Period: ${formatTimeTitle(ans.period_start)} → ${formatTimeTitle(ans.period_end)}`;
    }
    el.textContent = text;
}

let pendingFile = null;
let periodManuallyEdited = false;
let pendingDimensions = null;
const MAX_IMAGE_DIM = 1920;

function processImage(file) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            URL.revokeObjectURL(img.src);
            let { width, height } = img;
            if (width > MAX_IMAGE_DIM || height > MAX_IMAGE_DIM) {
                const ratio = Math.min(MAX_IMAGE_DIM / width, MAX_IMAGE_DIM / height);
                width = Math.round(width * ratio);
                height = Math.round(height * ratio);
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            canvas.toBlob(blob => {
                blob.name = file.name.replace(/\.[^.]+$/, '.webp');
                resolve({ blob, width, height });
            }, 'image/webp', 0.85);
        };
        img.src = URL.createObjectURL(file);
    });
}

async function handleFile(file) {
    const { blob, width, height } = await processImage(file);
    pendingFile = blob;
    pendingDimensions = { width, height };
    if (previewImg.src.startsWith('blob:')) URL.revokeObjectURL(previewImg.src);
    previewImg.src = URL.createObjectURL(blob);
    uploadPreview.style.display = 'block';

    try {
        const buf = await file.arrayBuffer();
        const tags = ExifReader.load(buf, { expanded: true });
        const gps = tags.gps;
        if (gps?.Latitude != null && gps?.Longitude != null) {
            const latlng = L.latLng(gps.Latitude, gps.Longitude);
            if (answerMarker) answerMap.removeLayer(answerMarker);
            answerMarker = L.marker(latlng).addTo(answerMap);
            answerMap.setView(latlng, 13);
            updateCoordsLabel(latlng);
        }
    } catch (e) { /* no EXIF data — that's fine */ }
}

function editTemplate(template) {
    const m = template;
    pendingFile = null;
    document.getElementById('mystery-edit-template-id').value = m.template_id;
    document.getElementById('mystery-image-url').value = m.image_url || '';
    resolvedLocationName = m.title || 'Unknown';
    resolvedLocationLevels = m.answer?.location || [];
    document.getElementById('mystery-type').value = m.type || 'location';
    document.getElementById('mystery-form-title').textContent = 'Edit mystery';
    document.getElementById('btn-cancel-mystery').style.display = 'inline-flex';
    document.getElementById('btn-save-mystery').textContent = 'Update mystery';
    if (m.image_url) {
        previewImg.src = m.image_url;
        uploadPreview.style.display = 'block';
    } else {
        previewImg.src = '';
        uploadPreview.style.display = 'none';
    }
    if (answerMarker) { answerMap.removeLayer(answerMarker); answerMarker = null; }
    if (m.type === 'time' && m.answer?.year != null) {
        const a = m.answer;
        document.getElementById('time-detail-level').value = a.detail_level || 'year';
        document.getElementById('time-year').value = Math.abs(a.year);
        document.getElementById('time-bc').checked = a.bc || a.year < 0;
        if (a.month) document.getElementById('time-month').value = a.month;
        if (a.day) document.getElementById('time-day').value = a.day;
        if (a.hour != null) document.getElementById('time-hour').value = a.hour;
        if (a.minute != null) document.getElementById('time-minute').value = a.minute;
        document.getElementById('time-range').value = a.range || '';
        document.getElementById('time-range-unit-select').value = a.range_unit || a.detail_level || 'year';
        if (a.period_start) fillPeriodFields('period-start', a.period_start, a.detail_level);
        else clearPeriodFields('period-start');
        if (a.period_end) fillPeriodFields('period-end', a.period_end, a.detail_level);
        else clearPeriodFields('period-end');
        periodManuallyEdited = !!(a.period_start || a.period_end);
    } else if (m.answer?.lat != null) {
        const latlng = L.latLng(m.answer.lat, m.answer.lng);
        answerMarker = L.marker(latlng).addTo(answerMap);
        answerMap.setView(latlng, 8);
        updateCoordsLabel(latlng);
    } else {
        document.getElementById('answer-coords').textContent = 'No location selected';
    }
    updateMysteryTypeUI();
    document.getElementById('mystery-form-card').scrollIntoView({ behavior: 'smooth' });
}

document.getElementById('btn-save-mystery').addEventListener('click', async () => {
    const saveBtn = document.getElementById('btn-save-mystery');
    const editTemplateId = document.getElementById('mystery-edit-template-id').value;
    const type = document.getElementById('mystery-type').value;

    setButtonLoading(saveBtn, true);

    let imageUrl = document.getElementById('mystery-image-url').value;
    if (pendingFile) {
        try { imageUrl = await api.uploadMysteryImage(pendingFile); }
        catch (err) { setButtonLoading(saveBtn, false); return showToast('Image upload failed: ' + err.message, { type: 'error' }); }
    }

    let answer, title;
    if (type === 'time') {
        answer = getTimeAnswerFromForm();
        if (!answer) { setButtonLoading(saveBtn, false); return showToast('Please enter a year', { type: 'error' }); }
        const now = new Date();
        const currentYear = now.getFullYear();
        const absYear = Math.abs(answer.year);
        if (absYear > 13_800_000_000) { setButtonLoading(saveBtn, false); return showToast('Year cannot exceed 13.8 billion', { type: 'error' }); }
        if (!answer.bc && answer.year > currentYear) { setButtonLoading(saveBtn, false); return showToast('Year cannot be in the future', { type: 'error' }); }
        if (answer.period_start && answer.period_end) {
            const psDec = timeToDecimal(answer.period_start);
            const peDec = timeToDecimal(answer.period_end);
            const ansDec = timeToDecimal(answer);
            if (psDec >= peDec) { setButtonLoading(saveBtn, false); return showToast('Period start must be before period end', { type: 'error' }); }
            if (ansDec < psDec || ansDec > peDec) { setButtonLoading(saveBtn, false); return showToast('Answer must be within the period', { type: 'error' }); }
        } else if (answer.period_start || answer.period_end) {
            setButtonLoading(saveBtn, false); return showToast('Both period start and end must be set', { type: 'error' });
        }
        title = formatTimeTitle(answer);
    } else {
        title = resolvedLocationName || 'Unknown';
        answer = answerMarker
            ? { lat: answerMarker.getLatLng().lat, lng: answerMarker.getLatLng().lng, location: resolvedLocationLevels }
            : {};
    }

    const content = { title, type, image_url: imageUrl || null, answer };
    if (pendingDimensions) {
        content.image_width = pendingDimensions.width;
        content.image_height = pendingDimensions.height;
    }

    try {
        if (editTemplateId) {
            await api.updateMysteryContent(editTemplateId, content);
        } else {
            await api.createMystery(content);
        }
        setButtonLoading(saveBtn, false);
        resetMysteryForm();
        renderMysteries();
        showToast('Mystery saved');
    } catch (err) { setButtonLoading(saveBtn, false); showToast('Save failed: ' + err.message, { type: 'error' }); }
});

async function renderMysteries() {
    try {
        const mysteries = await api.getMysteries();
        if (!mysteries.length) {
            mysteriesList.innerHTML = '<div class="empty-state">No mysteries yet. Create one above.</div>';
            return;
        }
        const templates = api.groupByTemplate(mysteries);
        mysteriesList.innerHTML = `<div class="card"><table class="admin-table">
            <thead><tr>
                <th>Location</th><th>Games</th><th></th>
            </tr></thead>
            <tbody>${templates.map(t => {
                const gameInstances = t.instances.filter(i => i.season_id);
                const gameNames = gameInstances.map(i => i.seasons?.name || '—');
                const gamesLabel = gameNames.length ? esc(gameNames.join(', ')) : '<span style="color:var(--admin-text-secondary)">Not assigned</span>';
                return `<tr class="clickable-row" data-template-id="${t.template_id}">
                    <td style="font-weight:500">${esc(t.title || '(untitled)')}</td>
                    <td>${gamesLabel}</td>
                    <td class="actions">
                        <button class="btn btn--plain btn--small btn-edit-template" data-tid="${t.template_id}">Edit</button>
                        <button class="btn btn--danger btn--small btn-del-template" data-tid="${t.template_id}">Delete</button>
                    </td>
                </tr>`;
            }).join('')}</tbody></table></div>`;

        mysteriesList.querySelectorAll('.btn-edit-template').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const t = templates.find(x => x.template_id === btn.dataset.tid);
                if (t) editTemplate(t);
            });
        });
        mysteriesList.querySelectorAll('.btn-del-template').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const t = templates.find(x => x.template_id === btn.dataset.tid);
                const count = t?.instances?.length || 0;
                showModal('Delete mystery?', `<p style="color:#616161">This deletes the mystery and all ${count} game instance${count !== 1 ? 's' : ''}, including guesses.</p>`, [
                    { label: 'Cancel' },
                    { label: 'Delete', cls: 'btn--danger', fn: async () => { await api.deleteMysteryTemplate(btn.dataset.tid); showToast('Mystery deleted'); renderMysteries(); } }
                ]);
            });
        });
        mysteriesList.querySelectorAll('.clickable-row').forEach(row => {
            row.addEventListener('click', (e) => {
                if (e.target.closest('.btn')) return;
                const t = templates.find(x => x.template_id === row.dataset.templateId);
                if (t) editTemplate(t);
            });
        });
    } catch (err) {
        mysteriesList.innerHTML = `<div class="empty-state">Error: ${esc(err.message)}</div>`;
    }
}

const usersList = document.getElementById('users-list');

async function renderUsers() {
    try {
        const users = await api.getUsers();
        if (!users.length) {
            usersList.innerHTML = '<div class="empty-state">No users found.</div>';
            return;
        }
        usersList.innerHTML = `<div class="card"><table class="admin-table">
            <thead><tr>
                <th>Name</th><th>Email</th><th>Score</th><th>Wins</th><th>Karma</th><th>Role</th><th></th>
            </tr></thead>
            <tbody>${users.map(u => `<tr>
                <td style="font-weight:500">${esc(u.name || '—')}</td>
                <td style="color:var(--admin-text-secondary)">${esc(u.email)}</td>
                <td>${u.total_score}</td>
                <td>${u.wins}</td>
                <td>${(u.jeff_karma > 0 ? '+' : '') + u.jeff_karma.toLocaleString()}</td>
                <td>${u.is_admin ? '<span class="badge badge--admin">Admin</span>' : ''}</td>
                <td class="actions">
                    <button class="btn btn--plain btn--small btn-rename-user" data-id="${u.id}" data-name="${esc(u.name || '')}">Rename</button>
                    <button class="btn btn--danger btn--small btn-del-user" data-id="${u.id}" data-name="${esc(u.name || u.email)}">Delete</button>
                    <button class="btn btn--plain btn--small btn--disabled" title="Coming later">Reset PW</button>
                </td>
            </tr>`).join('')}</tbody></table></div>`;
        usersList.querySelectorAll('.btn-rename-user').forEach(btn => {
            btn.addEventListener('click', () => {
                showModal('Rename user', `
                    <div class="form-group">
                        <label class="form-label">New name</label>
                        <input class="form-input" id="modal-rename-input" value="${esc(btn.dataset.name)}" maxlength="40">
                    </div>`, [
                    { label: 'Cancel' },
                    { label: 'Save', cls: 'btn--primary', fn: async () => {
                        const newName = document.getElementById('modal-rename-input').value.trim();
                        const nameErr = validateName(newName);
                        if (nameErr) return showToast(nameErr, { type: 'error' });
                        await api.updateUserName(btn.dataset.id, newName); showToast('User renamed'); renderUsers();
                    }}
                ]);
                setTimeout(() => document.getElementById('modal-rename-input')?.focus(), 100);
            });
        });
        usersList.querySelectorAll('.btn-del-user').forEach(btn => {
            btn.addEventListener('click', () => {
                showModal('Delete user?', `<p style="color:var(--admin-text-secondary)">Delete <strong>${esc(btn.dataset.name)}</strong>? This removes their profile and all game data.</p>`, [
                    { label: 'Cancel' },
                    { label: 'Delete', cls: 'btn--danger', fn: async () => { await api.deleteUser(btn.dataset.id); showToast('User deleted'); renderUsers(); } }
                ]);
            });
        });
    } catch (err) {
        usersList.innerHTML = `<div class="empty-state">Error: ${esc(err.message)}</div>`;
    }
}

renderUsers();

// ── Util ──
function formatAdminDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(str) {
    const el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="no" style="background:#000540">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where's Jeff?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/components.css">
    <script type="module" src="../app.js"></script>
</head>
<body>

    <div class="page-loader" id="page-loader"><span class="loader"></span></div>

    <!-- Hero: logo + Jeff + scroll arrow -->
    <section class="hero" id="hero">
        <img class="hero__logo" src="../assets/logo.png" alt="Where's Jeff?">
        <img class="hero__jeff" src="../assets/jeff.png" alt="Jeff the camel">
        <button class="hero__arrow" id="scroll-down" aria-label="Scroll down"></button>
    </section>

    <!-- Login card area -->
    <section class="page-center" id="login-section">

        <!-- Step 1: Welcome -->
        <div class="login-step active" id="step-welcome">
            <wheff-card>
                <wheff-banner position="top" from="left">Welcome!</wheff-banner>
                <wheff-field label="Email" type="email" placeholder="your@email.com"></wheff-field>
                <wheff-banner position="bottom" from="right" action="next">Go!</wheff-banner>
            </wheff-card>
        </div>

        <!-- Step 2: Create account -->
        <div class="login-step" id="step-create">
            <wheff-card aspect="2.31">
                <wheff-banner position="top" from="left">Create Account</wheff-banner>
                <wheff-field label="Name" placeholder="Your name" maxlength="40"></wheff-field>
                <wheff-field label="Email" type="email" placeholder="your@email.com"></wheff-field>
                <wheff-field label="Password" type="password" placeholder="••••••••"></wheff-field>
                <wheff-banner position="bottom" from="left" size="small" action="back" variant="secondary">Back</wheff-banner>
                <wheff-banner position="bottom" from="right" action="next">Go!</wheff-banner>
            </wheff-card>
        </div>

        <!-- Step 3: Log in -->
        <div class="login-step" id="step-login">
            <wheff-card aspect="2.66">
                <wheff-banner position="top" from="left">Log In</wheff-banner>
                <wheff-field label="Email" type="email" placeholder="your@email.com"></wheff-field>
                <wheff-field label="Password" type="password" placeholder="••••••••"></wheff-field>
                <wheff-banner position="bottom" from="left" size="small" action="back" variant="secondary">Back</wheff-banner>
                <wheff-banner position="bottom" from="right" action="next">Go!</wheff-banner>
            </wheff-card>
        </div>

    </section>

    <script type="module">
        import { signUp, signIn, resetPassword, redirectIfLoggedIn, validateName, friendlyError } from '../lib/auth.js';
        import { supabase } from '../lib/supabase.js';
        import { showModal, hideModal } from '../lib/modal.js';
        import { showToast } from '../lib/toast.js';

        await redirectIfLoggedIn();
        await Promise.all([
            document.fonts.load('700 1em Jost'),
            document.fonts.load('900 1em Jost'),
            document.fonts.load('italic 700 1em Jost'),
            document.fonts.load('italic 900 1em Jost'),
        ]);
        document.getElementById('page-loader')?.remove();

        // Focus the first input once the login section is actually visible
        // (i.e. user has scrolled down or tapped the arrow). Doing it on load
        // caused Safari to auto-scroll past the logo screen.
        const loginSection = document.getElementById('login-section');
        const focusObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                focusObserver.disconnect();
                const activeStep = document.querySelector('.login-step.active');
                if (activeStep) {
                    const inputs = activeStep.querySelectorAll('.field__input');
                    const target = [...inputs].find(i => !i.value) || inputs[0];
                    if (target) target.focus({ preventScroll: true });
                }
            }
        }, { threshold: 0.5 });
        if (loginSection) focusObserver.observe(loginSection);

        function setBannerLoading(el, loading) {
            if (loading) {
                el.classList.add('banner--disabled', 'banner--loading');
                el.style.animationName = 'none';
                if (!el.querySelector('.loader')) {
                    el.insertAdjacentHTML('beforeend', '<span class="loader loader--btn"></span>');
                }
            } else {
                el.classList.remove('banner--disabled', 'banner--loading');
                el.style.animationName = '';
                el.querySelector('.loader')?.remove();
            }
        }

        const steps = {
            welcome: document.getElementById('step-welcome'),
            create:  document.getElementById('step-create'),
            login:   document.getElementById('step-login'),
        };

        let emailFromStep1 = '';
        let loginFailCount = 0;

        function focusFirstEmpty(step) {
            const inputs = step.querySelectorAll('.field__input');
            const target = [...inputs].find(i => !i.value) || inputs[0];
            if (target) target.focus({ preventScroll: true });
        }

        function showStep(name) {
            Object.values(steps).forEach(s => s.classList.remove('active'));
            steps[name].classList.add('active');
            if (name === 'welcome') loginFailCount = 0;
            // Defer until layout settles and the value setter from any previous
            // step (e.g. emailField.value = emailFromStep1) has populated.
            requestAnimationFrame(() => focusFirstEmpty(steps[name]));
        }

        document.getElementById('scroll-down').addEventListener('click', () => {
            document.getElementById('login-section').scrollIntoView({ behavior: 'smooth' });
        });

        function isFieldValid(input) {
            // Email fields render as type="text" internally (so our custom
            // caret can track selection — type="email" returns null for
            // selectionStart in Chrome/Safari) and carry a data-type marker.
            if (input.dataset.type === 'email') return input.value.includes('@') && input.value.includes('.');
            return input.value.trim().length > 0;
        }

        function watchGoButtons() {
            const allSteps = document.querySelectorAll('.login-step');
            let pending = false;

            allSteps.forEach(step => {
                const goBanner = step.querySelector('wheff-banner[action="next"]');
                const inputs = step.querySelectorAll('.field__input');
                if (!goBanner || !inputs.length) { pending = true; return; }

                goBanner.classList.add('banner--disabled');

                const check = () => {
                    const allValid = [...inputs].every(isFieldValid);
                    goBanner.classList.toggle('banner--pulse', allValid);
                    goBanner.classList.toggle('banner--disabled', !allValid);
                };

                inputs.forEach(input => input.addEventListener('input', check));
                check();
            });

            if (pending) setTimeout(watchGoButtons, 200);
        }
        watchGoButtons();

        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            const activeStep = document.querySelector('.login-step.active');
            if (!activeStep) return;
            const goBanner = activeStep.querySelector('wheff-banner[action="next"]');
            if (goBanner && !goBanner.classList.contains('banner--disabled')) {
                goBanner.click();
            }
        });

        document.addEventListener('wheff-action', async (e) => {
            const { action } = e.detail;
            const card = e.target.closest('wheff-card');
            const step = e.target.closest('.login-step');

            if (action === 'back') {
                showStep('welcome');
                return;
            }

            if (action !== 'next') return;

            const goBtn = step.querySelector('wheff-banner[action="next"]');

            // Step 1: Welcome → check if email exists → route accordingly
            if (step.id === 'step-welcome') {
                const data = card.getFormData();
                emailFromStep1 = data.email || '';
                if (!emailFromStep1) return;

                setBannerLoading(goBtn, true);
                const { data: exists } = await supabase.rpc('email_exists', {
                    check_email: emailFromStep1
                });
                setBannerLoading(goBtn, false);

                const nextStep = exists ? 'login' : 'create';
                showStep(nextStep);

                const target = exists ? steps.login : steps.create;
                const emailField = target.querySelector('wheff-field[label="Email"]');
                if (emailField) emailField.value = emailFromStep1;
                return;
            }

            // Step 2: Create account → try sign up
            if (step.id === 'step-create') {
                const data = card.getFormData();
                setBannerLoading(goBtn, true);

                const { data: alreadyExists } = await supabase.rpc('email_exists', { check_email: data.email });
                if (alreadyExists) {
                    setBannerLoading(goBtn, false);
                    showToast('Email already registered');
                    showStep('login');
                    const emailField = steps.login.querySelector('wheff-field[label="Email"]');
                    if (emailField) emailField.value = data.email;
                    return;
                }

                const nameError = validateName(data.name);
                if (nameError) {
                    setBannerLoading(goBtn, false);
                    showToast(nameError, { type: 'error' });
                    return;
                }

                try {
                    await signUp(data.email, data.password, data.name.trim());
                    setBannerLoading(goBtn, false);

                    showModal({
                        label: 'Jeff says',
                        text: 'Check your email and click the link'
                    });

                    let verifyResendTimer;
                    function showResendButton() {
                        const modal = document.querySelector('.modal');
                        if (!modal) return;
                        modal.classList.add('modal--has-buttons');
                        const wrap = document.createElement('div');
                        wrap.className = 'modal__buttons';
                        wrap.innerHTML = '<button class="modal__btn"><span class="modal__btn-text">Resend</span></button>';
                        modal.appendChild(wrap);
                        wrap.querySelector('.modal__btn').addEventListener('click', async () => {
                            const textEl = modal.querySelector('.modal__text');
                            const { error } = await supabase.auth.resend({ type: 'signup', email: data.email });
                            textEl.textContent = error ? 'Please wait a moment' : 'Email sent';
                            modal.classList.remove('modal--has-buttons');
                            wrap.remove();
                            setTimeout(() => textEl.textContent = 'Check your email and click the link', 2000);
                            verifyResendTimer = setTimeout(showResendButton, 60000);
                        });
                    }
                    verifyResendTimer = setTimeout(showResendButton, 60000);

                    function onVerifyDone() {
                        clearInterval(pollInterval);
                        clearTimeout(verifyResendTimer);
                        const modal = document.querySelector('.modal');
                        if (!modal) return;
                        const btnWrap = modal.querySelector('.modal__buttons');
                        if (btnWrap) { modal.classList.remove('modal--has-buttons'); btnWrap.remove(); }
                        const textEl = modal.querySelector('.modal__text');
                        if (textEl) textEl.textContent = 'You can close this window';
                        try { localStorage.removeItem('wheff-verify-done'); } catch {};
                    }

                    window.addEventListener('storage', (ev) => {
                        if (ev.key === 'wheff-verify-done') onVerifyDone();
                    });

                    const pollInterval = setInterval(async () => {
                        try { if (localStorage.getItem('wheff-verify-done')) { onVerifyDone(); return; } } catch {};
                        const { data: confirmed } = await supabase.rpc('is_email_confirmed', { p_email: data.email });
                        if (confirmed) onVerifyDone();
                    }, 3000);
                } catch (err) {
                    setBannerLoading(goBtn, false);
                    const msg = friendlyError(err);
                    if (/already registered/i.test(err.message)) {
                        showToast(msg);
                        showStep('login');
                        const emailField = steps.login.querySelector('wheff-field[label="Email"]');
                        if (emailField) emailField.value = data.email;
                    } else {
                        showToast(msg, { type: 'error' });
                    }
                }
                return;
            }

            // Step 3: Log in → try sign in
            if (step.id === 'step-login') {
                const data = card.getFormData();
                setBannerLoading(goBtn, true);
                try {
                    await signIn(data.email, data.password);
                    loginFailCount = 0;
                    window.location.href = '/pages/game.html';
                } catch (err) {
                    setBannerLoading(goBtn, false);
                    loginFailCount++;

                    if (loginFailCount >= 2) {
                        loginFailCount = 0;
                        showModal({
                            label: 'Jeff says',
                            text: 'Having trouble remembering your password?',
                            buttons: [
                                { text: 'No', action: 'no', dismiss: true },
                                { text: 'Yes', action: 'yes', dismiss: false }
                            ],
                            onAction: async (act, { setText }) => {
                                if (act !== 'yes') return;
                                const modal = document.querySelector('.modal');
                                const btnWrap = modal?.querySelector('.modal__buttons');
                                if (btnWrap) { modal.classList.remove('modal--has-buttons'); btnWrap.remove(); }

                                try {
                                    try { localStorage.removeItem('wheff-reset-ready'); } catch {};
                                    await resetPassword(data.email);
                                    setText('Check your email and click the link');

                                    let resendTimer;
                                    function showResendButton() {
                                        const m = document.querySelector('.modal');
                                        if (!m) return;
                                        m.classList.add('modal--has-buttons');
                                        const wrap = document.createElement('div');
                                        wrap.className = 'modal__buttons';
                                        wrap.innerHTML = '<button class="modal__btn"><span class="modal__btn-text">Resend</span></button>';
                                        m.appendChild(wrap);
                                        wrap.querySelector('.modal__btn').addEventListener('click', async () => {
                                            const textEl = m.querySelector('.modal__text');
                                            try {
                                                await resetPassword(data.email);
                                                textEl.textContent = 'Email sent';
                                            } catch { textEl.textContent = 'Please wait a moment'; }
                                            m.classList.remove('modal--has-buttons');
                                            wrap.remove();
                                            setTimeout(() => { textEl.textContent = 'Check your email and click the link'; }, 2000);
                                            resendTimer = setTimeout(showResendButton, 60000);
                                        });
                                    }
                                    resendTimer = setTimeout(showResendButton, 60000);

                                    function onResetReady() {
                                        clearTimeout(resendTimer);
                                        const m = document.querySelector('.modal');
                                        if (!m) return;
                                        const btnWrap = m.querySelector('.modal__buttons');
                                        if (btnWrap) { m.classList.remove('modal--has-buttons'); btnWrap.remove(); }
                                        setText('You can close this window');
                                        try { localStorage.removeItem('wheff-reset-ready'); } catch {};
                                    }

                                    window.addEventListener('storage', (ev) => {
                                        if (ev.key === 'wheff-reset-ready') onResetReady();
                                    });
                                    const resetPoll = setInterval(() => {
                                        try {
                                            if (localStorage.getItem('wheff-reset-ready')) {
                                                clearInterval(resetPoll);
                                                onResetReady();
                                            }
                                        } catch {};
                                    }, 2000);
                                } catch (resetErr) {
                                    setText(friendlyError(resetErr));
                                    setTimeout(hideModal, 3000);
                                }
                            }
                        });
                    } else {
                        showToast(friendlyError(err), { type: 'error' });
                    }
                }
                return;
            }
        });

    </script>

</body>
</html>

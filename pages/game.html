<!DOCTYPE html>
<html lang="no" style="background:#000540">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where's Jeff?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script type="module" src="../app.js"></script>
</head>
<body>

    <div class="page-loader" id="page-loader"><span class="loader"></span></div>

    <!-- Game chooser (shown if user has multiple games) -->
    <section class="page-center" id="chooser-section" style="display:none;">
        <div class="chooser">
            <div class="banner banner--top banner--from-left">
                <span class="banner__text">Choose Game</span>
            </div>
            <div class="chooser__body">
                <div class="strip strip--from-right strip--chooser">
                    <button class="strip__arrow strip__arrow--left" id="chooser-prev"></button>
                    <span class="strip__text" id="chooser-name"></span>
                    <button class="strip__arrow strip__arrow--right" id="chooser-next"></button>
                </div>
            </div>
            <div class="banner banner--bottom banner--from-right banner--action banner--pulse" id="btn-go" role="button" tabindex="0">
                <span class="banner__text">GO!</span>
            </div>
        </div>
    </section>

    <!-- Game content (hidden until game is selected) -->
    <div id="game-content" style="display:none;">

        <!-- Hero: logo + Jeff (click for admin) + scroll arrow -->
        <section class="hero" id="hero">
            <img class="hero__logo" src="../assets/logo.png" alt="Where's Jeff?">
            <img class="hero__jeff" src="../assets/jeff.png" alt="Jeff the camel" id="jeff-img">
            <button class="hero__arrow" id="scroll-down" aria-label="Scroll down"></button>
        </section>

        <!-- Winners (shown when game is ended) -->
        <section class="page-section" id="winners-section" style="display:none">
            <div id="winners-content"></div>
        </section>

        <!-- Your Stats -->
        <section class="page-section" id="stats-section">
            <wheff-card aspect="2.77">
                <wheff-banner position="top" from="left">Your Stats</wheff-banner>
                <wheff-field label="Total Score" type="text" placeholder="0" name="total_score" variant="display"></wheff-field>
                <wheff-field label="Wins" type="text" placeholder="0" name="wins" variant="display"></wheff-field>
                <wheff-field label="Jeff Karma" type="text" placeholder="0" name="jeff_karma" variant="display"></wheff-field>
            </wheff-card>
        </section>

        <!-- Mystery section (current/latest/past — rendered by JS) -->
        <section class="page-section" id="mystery-section">
            <div id="mystery-content"></div>
        </section>

        <!-- Leaderboard -->
        <section class="page-section" id="leaderboard-section">
            <div id="leaderboard-content"></div>
        </section>

        <!-- Past Mysteries world map -->
        <section class="page-section" id="past-section">
            <div id="past-content"></div>
        </section>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { requireAuth, getProfile } from '../lib/auth.js';
        import {
            getUserSeasons, getAllSeasons, getSeasonMysteries, getCurrentMystery, getRevealedMysteries,
            getNextMysteryInfo, getAppSetting,
            getGuesses, getUserGuess, submitGuess, submitTimeGuess, subscribeGuesses,
            getMysteryLeaderboard, getSeasonLeaderboard,
            checkSeasonAutoEnd, getSeasonWinners,
            formatTimeAgo, formatDistance, formatDistanceShort, formatCountdown, formatCountdownIn, formatMysteryDate,
            firstName, formatNumber, formatLocationLabel, reverseGeocode,
            timeToDecimal, decimalToTime, timeYearsDiff, formatTimeDifference, formatTimeDifferenceShort,
            formatTimeDisplay
        } from '../lib/game.js';
        import { showToast } from '../lib/toast.js';

        // ── Auth ──

        const session = await requireAuth();
        if (!session) throw new Error('Not authenticated');
        const userId = session.user.id;
        const profile = await getProfile();
        await Promise.all([
            document.fonts.load('700 1em Jost'),
            document.fonts.load('900 1em Jost'),
            document.fonts.load('italic 700 1em Jost'),
            document.fonts.load('italic 900 1em Jost'),
        ]);
        document.getElementById('page-loader')?.remove();

        document.getElementById('scroll-down').addEventListener('click', () => {
            const winnersEl = document.getElementById('winners-section');
            if (winnersEl && winnersEl.style.display !== 'none') {
                winnersEl.scrollIntoView({ behavior: 'smooth' });
            } else {
                document.getElementById('stats-section').scrollIntoView({ behavior: 'smooth' });
            }
        });

        function setBannerLoading(el, loading) {
            if (loading) {
                el.classList.add('banner--disabled', 'banner--loading');
                el.style.animationName = 'none';
                if (!el.querySelector('.loader')) {
                    el.insertAdjacentHTML('beforeend', '<span class="loader loader--btn"></span>');
                }
            } else {
                el.classList.remove('banner--disabled', 'banner--loading');
                el.style.animationName = '';
                el.querySelector('.loader')?.remove();
            }
        }

        function esc(s) { const el = document.createElement('span'); el.textContent = s ?? ''; return el.innerHTML; }
        function gameDisplayName(s) { return s.display_title || s.name; }
        function px(vwVal) { return vwVal * window.innerWidth / 100; }
        const PIN_VW = 3.3;
        const LINE_WEIGHT_VW = 0.39;
        const LINE_DASH_VW = 0.7;
        const LINE_GAP_VW = 0.63;
        const DICE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="0.85em" height="0.85em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.08em"><rect width="12" height="12" x="2" y="10" rx="2" ry="2"/><path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-4.92a2.24 2.24 0 0 0-3 0L10 6"/><path d="M6 18h.01"/><path d="M10 14h.01"/><path d="M15 6h.01"/><path d="M18 9h.01"/></svg>`;
        let lastResultData = null;
        let cachedLeaderboard = null;
        let leaderboardSort = 'score';
        let confettiInterval = null;
        let pendingRevealConfetti = false;

        function addTileLayer(map) {
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OSM', maxNativeZoom: 19, maxZoom: 22
            }).addTo(map);
        }

        function enforceMinZoom(map) {
            const h = map.getContainer().clientHeight;
            const minZ = Math.ceil(Math.log2(h / 256));
            map.setMinZoom(minZ);
            if (map.getZoom() < minZ) map.setZoom(minZ);
        }

        function rescaleMapLayers(map) {
            const p = Math.round(px(PIN_VW)), h = p / 2;
            const w = px(LINE_WEIGHT_VW);
            const dash = `${px(LINE_DASH_VW)},${px(LINE_GAP_VW)}`;
            map.eachLayer(l => {
                if (l instanceof L.Polyline && !(l instanceof L.Polygon)) l.setStyle({ weight: w, dashArray: dash });
                if (l instanceof L.Marker) {
                    try {
                        const icon = l.getIcon();
                        if (icon?.options?.className === '') l.setIcon(L.divIcon({ ...icon.options, iconSize: [p, p], iconAnchor: [h, h] }));
                    } catch {}
                }
            });
        }

        function refreshMapSizes() {
            if (curveCanvas) resizeCurveCanvas();

            if (guessMap) {
                guessMap.invalidateSize();
                enforceMinZoom(guessMap);
                rescaleMapLayers(guessMap);
            }

            if (resultMap) {
                rescaleMapLayers(resultMap);
                enforceMinZoom(resultMap);
                fitResultMap();
            }

            if (worldMap) {
                rescaleMapLayers(worldMap);
                worldMap.invalidateSize();
                enforceMinZoom(worldMap);
                if (lastWorldFit) {
                    const vwU = window.innerWidth / 100;
                    const headerOverlap = (8.2 / 2 + 6.5 * 0.84) * vwU;
                    const stripHeight = 6.5 * 0.84 * vwU;
                    worldMap.fitBounds(lastWorldFit, {
                        paddingTopLeft: [30, headerOverlap + 45],
                        paddingBottomRight: [30, stripHeight + 45]
                    });
                }
            }
            if (worldTimeCanvas) {
                drawWorldTimeCurve();
            }
        }

        window.addEventListener('resize', refreshMapSizes);

        if (profile?.is_admin) {
            const jeff = document.getElementById('jeff-img');
            jeff.style.cursor = 'pointer';
            jeff.addEventListener('click', () => { window.location.href = '/pages/admin.html'; });
        }

        // ── State ──

        let season = null;
        let isAdminViewer = false;
        let memberSeasonIds = new Set();
        let mysteries = [];
        let currentMystery = null;
        let revealedMysteries = [];
        let navItems = [];
        let navPos = 0;
        let activeChannel = null;
        let countdownInterval = null;
        let bgPollInterval = null;
        let isReloading = false;
        let guessMap = null;
        let resultMap = null;
        let worldMap = null;
        let worldTimeCanvas = null;
        let worldTimeCtx = null;
        let guessMarker = null;
        let lastResultFit = null;
        let lastWorldFit = null;
        let waitingInterval = null;
        let sabMarker = null;
        let sabMode = 'distance';
        let sabResetTimer = null;
        let revealRefreshTimer = null;
        let pinLabelMarker = null;
        let pinLabelTimer = null;
        let waitingImages = {};
        const imageCache = new Map();

        function pinStorageKey(mysteryId) { return `wheff_pin_${mysteryId}`; }

        function savePinToStorage(mysteryId, data) {
            if (isAdminViewer) return;
            try { localStorage.setItem(pinStorageKey(mysteryId), JSON.stringify(data)); } catch {}
        }

        function loadPinFromStorage(mysteryId) {
            try {
                const raw = localStorage.getItem(pinStorageKey(mysteryId));
                return raw ? JSON.parse(raw) : null;
            } catch { return null; }
        }

        function clearPinStorage(mysteryId) {
            try { localStorage.removeItem(pinStorageKey(mysteryId)); } catch {}
        }

        // Infinity curve state (time mysteries)
        let curveCanvas = null, curveCtx = null;
        let curveZoom = 1;
        let curvePinAlpha = null;
        let curveDragging = false;
        let curvePanning = false;
        let curveContainer = null;
        let curvePinEl = null;
        let curveFieldsEl = null;
        let curveResizeHandler = null;
        let curveDetailLevel = 'year';
        let curveReadonly = false;
        let curveAnswerAlpha = null;
        let curveViewX = 0, curveViewY = 0;
        let curvePanLastX = null, curvePanLastY = null;
        let curveDragScreenX = 0, curveDragScreenY = 0;
        let curveAutoPanRAF = null;
        let curveUserInteracted = false;

        let curveTimeStart = -13_800_000_000;
        let curveTimeEnd = 2026;
        let curveMaxZoom = 5e10;
        let curveNowInterval = null;

        let curveResultMode = 'distance';
        let curveResultEntry = null;
        let curveResultAnswer = null;
        let curveResultTimer = null;

        function preloadImage(url) {
            if (!url) return;
            if (imageCache.has(url)) return;
            const img = new Image();
            img.src = url;
            imageCache.set(url, img);
        }

        function preloadAllMysteryImages() {
            mysteries.forEach(m => preloadImage(m.image_url));
            Object.values(waitingImages).forEach(url => preloadImage(url));
        }

        const mapDefaults = {
            zoomControl: false,
            attributionControl: false,
            scrollWheelZoom: false,
            maxZoom: 22,
            minZoom: 0,
            maxBounds: [[-85, -360], [85, 360]],
            maxBoundsViscosity: 1.0
        };

        // ── Init ──

        try {
            const types = ['location', 'time', 'film', 'cyber'];
            const imgs = await Promise.all(types.map(t => getAppSetting(`waiting_image_${t}`)));
            types.forEach((t, i) => { if (imgs[i]) waitingImages[t] = imgs[i]; });
        } catch {}
        const userSeasons = await getUserSeasons(userId);
        memberSeasonIds = new Set(userSeasons.map(s => s.id));
        let allSeasons;
        if (profile?.is_admin) {
            const every = await getAllSeasons();
            const seen = new Set(userSeasons.map(s => s.id));
            allSeasons = [...userSeasons, ...every.filter(s => !seen.has(s.id))];
        } else {
            allSeasons = userSeasons;
        }
        let chooserIdx = 0;
        const hasMultipleGames = allSeasons.length > 1;

        if (hasMultipleGames) {
            setupChooser(allSeasons);
            openChooser();
        } else {
            season = allSeasons[0] || null;
            isAdminViewer = profile?.is_admin && season && !memberSeasonIds.has(season.id);
            await initGame();
        }

        function setupChooser(seasons) {
            function updateChooser() {
                document.getElementById('chooser-name').textContent = gameDisplayName(seasons[chooserIdx]);
                document.getElementById('chooser-prev').style.display = chooserIdx > 0 ? '' : 'none';
                document.getElementById('chooser-next').style.display = chooserIdx < seasons.length - 1 ? '' : 'none';
            }

            document.getElementById('chooser-prev').addEventListener('click', () => {
                if (chooserIdx > 0) { chooserIdx--; updateChooser(); }
            });

            document.getElementById('chooser-next').addEventListener('click', () => {
                if (chooserIdx < seasons.length - 1) { chooserIdx++; updateChooser(); }
            });

            document.getElementById('btn-go').addEventListener('click', async () => {
                const goBtn = document.getElementById('btn-go');
                setBannerLoading(goBtn, true);
                season = seasons[chooserIdx];
                isAdminViewer = profile?.is_admin && !memberSeasonIds.has(season.id);
                await initGame();
            });

            document.querySelector('.hero__logo').style.cursor = 'pointer';
            document.querySelector('.hero__logo').addEventListener('click', openChooser);

            updateChooser();
        }

        function openChooser() {
            cleanupMystery();
            if (bgPollInterval) { clearInterval(bgPollInterval); bgPollInterval = null; }
            if (confettiInterval) { clearInterval(confettiInterval); confettiInterval = null; }
            if (worldMap) { worldMap.remove(); worldMap = null; }
            worldTimeCanvas = null; worldTimeCtx = null;
            document.getElementById('game-content').style.display = 'none';
            document.getElementById('chooser-section').style.display = '';
            const goBtn = document.getElementById('btn-go');
            setBannerLoading(goBtn, false);
            window.scrollTo(0, 0);
        }

        function updateBottomPadding() {
            const dynamicSections = ['mystery-section', 'leaderboard-section', 'past-section'];
            const winnersEl = document.getElementById('winners-section');
            let lastVisible = winnersEl && winnersEl.style.display !== 'none' ? winnersEl : document.getElementById('stats-section');
            for (const id of dynamicSections) {
                const el = document.getElementById(id);
                const content = el.querySelector('div');
                const hasContent = content && content.innerHTML.trim();
                el.style.display = hasContent ? '' : 'none';
                el.style.paddingBottom = '';
                if (hasContent) lastVisible = el;
            }
            if (lastVisible) lastVisible.style.paddingBottom = 'var(--section-gap)';
        }

        async function initGame() {
            document.getElementById('chooser-section').style.display = 'none';
            document.getElementById('game-content').style.display = '';

            if (bgPollInterval) { clearInterval(bgPollInterval); bgPollInterval = null; }

            if (season) {
                mysteries = await getSeasonMysteries(season.id);
                currentMystery = getCurrentMystery(mysteries);
                revealedMysteries = getRevealedMysteries(mysteries);

                const shouldCheckEnd = (season.active || season.ending) && !currentMystery && revealedMysteries.length;
                if (shouldCheckEnd) {
                    const ended = await checkSeasonAutoEnd(season.id);
                    if (ended) {
                        season.active = false;
                        season.ending = false;
                    }
                }
            }

            checkReturnToasts();
            preloadAllMysteryImages();

            await buildNavItems();
            await renderMysteryAtPosition();
            renderWinners();
            await renderLeaderboard();
            await renderPastMysteries();
            populateStats();
            updateBottomPadding();

            startBgPoll();
        }

        function startBgPoll() {
            if (bgPollInterval) clearInterval(bgPollInterval);
            if (!season || (!season.active && !season.ending)) return;
            let bgPolling = false;
            bgPollInterval = setInterval(async () => {
                if (bgPolling || !season || isReloading) return;
                if (countdownInterval) return;
                bgPolling = true;
                try {
                    const now = new Date();
                    let stateChanged = false;
                    let newRevealDetected = false;
                    let newMysteryDetected = false;

                    const newRevealed = mysteries.filter(m => m.reveals_at && new Date(m.reveals_at) <= now).length;
                    if (newRevealed > revealedMysteries.length) {
                        stateChanged = true;
                        newRevealDetected = true;
                    }

                    if (!stateChanged && !currentMystery && (season.active || season.ending)) {
                        try {
                            const fresh = await getSeasonMysteries(season.id);
                            if (fresh.length !== mysteries.length) { stateChanged = true; newMysteryDetected = true; }
                            if (!stateChanged) {
                                const freshCurrent = getCurrentMystery(fresh);
                                if (freshCurrent) { stateChanged = true; newMysteryDetected = true; }
                            }
                        } catch {}
                    }

                    if (stateChanged) {
                        if (newRevealDetected) {
                            pendingRevealConfetti = true;
                            showToast('Mystery revealed');
                            await reloadMysteries({ navigateTo: 'latest', scrollToMystery: true });
                        } else if (newMysteryDetected) {
                            showToast('New mystery available');
                            await reloadMysteries({ scrollToMystery: true });
                        } else {
                            await reloadMysteries({ preserveNav: true });
                        }
                    }
                } finally {
                    bgPolling = false;
                }
            }, 3000);
        }

        function checkReturnToasts() {
            const key = `wheff_last_visit_${season?.id || ''}`;
            const lastVisit = localStorage.getItem(key);
            const now = new Date().toISOString();
            localStorage.setItem(key, now);
            if (!lastVisit) return;

            const lastDate = new Date(lastVisit);

            if (season && !season.active) {
                if (!currentMystery) {
                    if (!season.ends_at || new Date(season.ends_at) > lastDate) {
                        showToast('Winners ready!');
                    }
                }
                return;
            }

            if (currentMystery && new Date(currentMystery.published_at) > lastDate) {
                setTimeout(() => showToast('New mystery available'), 1500);
            }

            const newlyRevealed = revealedMysteries.filter(m =>
                new Date(m.reveals_at) > lastDate
            );
            if (newlyRevealed.length >= 1) {
                pendingRevealConfetti = true;
                if (newlyRevealed.length === 1) {
                    setTimeout(() => showToast('Mystery revealed'), 1500);
                } else {
                    setTimeout(() => showToast(`${newlyRevealed.length} mysteries revealed`), 1500);
                }
            }
        }

        function enablePinchZoom(map) {
            map.getContainer().addEventListener('wheel', function(e) {
                if (e.ctrlKey || e.metaKey) {
                    map.scrollWheelZoom.enable();
                } else {
                    map.scrollWheelZoom.disable();
                }
            }, true);
        }

        // ── Infinity Curve (Time Mysteries) ──

        const CURVE_Y_CENTER = 0.5;
        const CURVE_DRAW_PTS = 800;
        const NUM_STRANDS = 40;
        const STREAM_COLORS = [
            '#9E2848', '#B83058', '#C84060', '#A83555',
            '#1A5C20', '#0D4A15', '#2D8A38', '#1E7030', '#3A9E48',
            '#5A4A70', '#7850A0', '#6A5A88', '#8860B0', '#784898',
            '#1A3FA0', '#0020B8', '#3060C0', '#2050D0', '#1848A8',
            '#D0A030', '#E8C040', '#C89828', '#B88820',
        ];
        const DETAIL_MIN_VISIBLE = { year: 1, month: 1/12, day: 1/365.25, minute: 1/8766 };

        function nowDecimal() {
            const n = new Date();
            const y = n.getFullYear();
            const soy = new Date(y, 0, 1);
            const eoy = new Date(y + 1, 0, 1);
            return y + (n - soy) / (eoy - soy);
        }

        function computeCurvePeriod(answerDec) {
            const d = Math.max(1, Math.abs(nowDecimal() - answerDec));
            return Math.min(13_800_000_000, Math.max(100, d * (1 + 0.5 * Math.log(d))));
        }

        function effectiveAlpha(a) { return a <= 1 ? a : 2 - a; }
        function alphaToYear(a) { const ea = effectiveAlpha(a); return curveTimeStart + ea * (curveTimeEnd - curveTimeStart); }
        function yearToAlpha(y) { return Math.max(0, Math.min(1, (y - curveTimeStart) / (curveTimeEnd - curveTimeStart))); }
        function curvePinPoint(a) { return a <= 1 ? curvePointFromAlpha(a) : leftLobePoint(a - 1); }

        function curvePointFromAlpha(alpha) {
            const t = ((3 * Math.PI / 2) + alpha * Math.PI) % (2 * Math.PI);
            const sin2 = Math.sin(t) ** 2;
            return {
                x: Math.cos(t) / (1 + sin2),
                y: Math.sin(t) * Math.cos(t) / (1 + sin2)
            };
        }

        function leftLobePoint(u) {
            const t = ((Math.PI / 2) + u * Math.PI) % (2 * Math.PI);
            const sin2 = Math.sin(t) ** 2;
            return {
                x: Math.cos(t) / (1 + sin2),
                y: Math.sin(t) * Math.cos(t) / (1 + sin2)
            };
        }

        function curveToScreen(cx, cy, w, h, zoom, centerX, centerY) {
            const pad = Math.min(w, h) * 0.08;
            const baseScale = Math.min((w - 2 * pad) / 2, (h - 2 * pad));
            const scale = baseScale * zoom;
            return {
                sx: w / 2 + (cx - centerX) * scale,
                sy: h * CURVE_Y_CENTER - (cy - centerY) * scale
            };
        }

        function offsetCurveScreen(points, seed, spreadPx, w, h, zoom, cpx, cpy, pinPosPx) {
            const drift = Math.sin(seed * 3.17) * 0.6 + Math.sin(seed * 0.73) * 0.4;
            const zfNorm = Math.min(1, Math.log(zoom) / Math.log(200));
            const pinchScreenPx = spreadPx * 2.2;
            const pinchMin = 0.012;
            const pinchPow = 1.2 + zfNorm * 0.4;
            const zoomBlend = Math.min(1, Math.log(zoom) / Math.log(50));
            const waveScale = 1 + zoomBlend * 1.5;

            const screen = [];
            for (const pt of points) {
                const s = curveToScreen(pt.x, pt.y, w, h, zoom, cpx, cpy);
                screen.push({ sx: s.sx, sy: s.sy, t: pt.t != null ? pt.t : 0 });
            }

            const result = [];
            for (let i = 0; i < screen.length; i++) {
                const cur = screen[i];
                const prev = screen[Math.max(0, i - 1)];
                const next = screen[Math.min(screen.length - 1, i + 1)];
                const dx = next.sx - prev.sx;
                const dy = next.sy - prev.sy;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                const nx = -dy / len;
                const ny = dx / len;
                const t = cur.t || i / screen.length;
                const baseWave = Math.sin(seed + t * 31) * 0.3
                               + Math.sin(seed * 1.7 + t * 83) * 0.25
                               + Math.sin(seed * 0.3 + t * 197) * 0.2
                               + Math.sin(seed * 2.3 + t * 419) * 0.15
                               + Math.sin(seed * 0.7 + t * 11) * 0.1;
                const zt = t * zoom;
                const zoomWave = Math.sin(seed * 0.9 + zt * 3.7) * 0.25
                               + Math.sin(seed * 2.1 + zt * 9.3) * 0.2
                               + Math.sin(seed * 0.4 + zt * 23) * 0.15
                               + Math.sin(seed * 1.3 + zt * 61) * 0.1;
                const wave = (baseWave * (1 - zoomBlend * 0.6) + zoomWave * zoomBlend) * waveScale;
                let pinch = 1;
                if (pinPosPx) {
                    for (const pin of pinPosPx) {
                        const pdx = cur.sx - pin.sx;
                        const pdy = cur.sy - pin.sy;
                        const pDist = Math.sqrt(pdx * pdx + pdy * pdy);
                        if (pDist < pinchScreenPx) {
                            const f = pDist / pinchScreenPx;
                            const factor = pinchMin + (1 - pinchMin) * Math.pow(f, pinchPow);
                            pinch = Math.min(pinch, factor);
                        }
                    }
                }
                const offset = (wave + drift * 0.5) * spreadPx * pinch;
                result.push({ sx: cur.sx + nx * offset, sy: cur.sy + ny * offset });
            }
            return result;
        }

        function drawScreenStroke(ctx, screenPts, w) {
            ctx.beginPath();
            if (screenPts.length < 2) return;
            ctx.moveTo(screenPts[0].sx, screenPts[0].sy);
            for (let i = 1; i < screenPts.length - 1; i++) {
                const cur = screenPts[i], next = screenPts[i + 1];
                const inBounds = cur.sx > -500 && cur.sx < w + 500;
                if (inBounds) {
                    const mx = (cur.sx + next.sx) / 2;
                    const my = (cur.sy + next.sy) / 2;
                    ctx.quadraticCurveTo(cur.sx, cur.sy, mx, my);
                } else {
                    ctx.moveTo(cur.sx, cur.sy);
                }
            }
            const last = screenPts[screenPts.length - 1];
            ctx.lineTo(last.sx, last.sy);
            ctx.stroke();
        }

        function drawCurve() {
            if (!curveCanvas || !curveCtx) return;
            const dpr = window.devicePixelRatio || 1;
            const w = curveCanvas.width / dpr;
            const h = curveCanvas.height / dpr;
            const ctx = curveCtx;
            ctx.clearRect(0, 0, w, h);

            const vx = curveViewX, vy = curveViewY;

            const pad = Math.min(w, h) * 0.08;
            const baseScale = Math.min((w - 2 * pad) / 2, (h - 2 * pad));
            const scale = baseScale * curveZoom;
            const tileSize = 256 / scale;
            const tileStartX = Math.floor((vx - w / 2 / scale) / tileSize) * tileSize;
            const tileStartY = Math.floor((vy - h / 2 / scale) / tileSize) * tileSize;
            const tileEndX = Math.ceil((vx + w / 2 / scale) / tileSize) * tileSize;
            const tileEndY = Math.ceil((vy + h / 2 / scale) / tileSize) * tileSize;

            function tileHash(ix, iy) {
                let h = (ix * 374761393 + iy * 668265263) | 0;
                h = ((h ^ (h >> 13)) * 1274126177) | 0;
                return ((h ^ (h >> 16)) & 0x7fffffff) / 0x7fffffff;
            }

            for (let gx = tileStartX; gx <= tileEndX; gx += tileSize) {
                for (let gy = tileStartY; gy <= tileEndY; gy += tileSize) {
                    const sx = w / 2 + (gx - vx) * scale;
                    const sy = h * CURVE_Y_CENTER - (gy - vy) * scale;
                    const tw = tileSize * scale;
                    const th = tileSize * scale;
                    const v = tileHash(Math.round(gx / tileSize), Math.round(gy / tileSize));
                    const lum = (v - 0.5) * 0.02;
                    if (lum > 0) {
                        ctx.fillStyle = `rgba(120,180,230,${lum})`;
                    } else {
                        ctx.fillStyle = `rgba(0,10,40,${-lum})`;
                    }
                    ctx.fillRect(sx, sy - th, tw, th);
                }
            }

            for (let gx = tileStartX; ; gx += tileSize) {
                const sx = w / 2 + (gx - vx) * scale;
                if (sx > w + 1) break;
                if (sx < -1) continue;
                const lineHash = tileHash(Math.round(gx / tileSize), 99999);
                const op = 0.13 + lineHash * 0.09;
                ctx.strokeStyle = `rgba(80, 150, 210, ${op})`;
                ctx.lineWidth = 0.6 + lineHash * 0.4;
                ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, h); ctx.stroke();
            }
            for (let gy = tileStartY; ; gy += tileSize) {
                const sy = h * CURVE_Y_CENTER - (gy - vy) * scale;
                if (sy < -1) break;
                if (sy > h + 1) continue;
                const lineHash = tileHash(99999, Math.round(gy / tileSize));
                const op = 0.13 + lineHash * 0.09;
                ctx.strokeStyle = `rgba(80, 150, 210, ${op})`;
                ctx.lineWidth = 0.6 + lineHash * 0.4;
                ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(w, sy); ctx.stroke();
            }

            const zoomFrac = curveMaxZoom > 1 ? Math.log(curveZoom) / Math.log(curveMaxZoom) : 0;
            const vwScale = w / 800;
            const spreadPx = (14 + Math.pow(zoomFrac, 0.8) * 284) * vwScale;

            const fullPts = [];
            for (let i = 0; i <= CURVE_DRAW_PTS; i++) {
                const frac = i / CURVE_DRAW_PTS;
                const t = frac * 2 * Math.PI;
                const sin2 = Math.sin(t) ** 2;
                fullPts.push({ x: Math.cos(t) / (1 + sin2), y: Math.sin(t) * Math.cos(t) / (1 + sin2), t: frac });
            }

            const pinPosPx = [];
            if (curvePinAlpha != null) {
                const pp = curvePinPoint(curvePinAlpha);
                pinPosPx.push(curveToScreen(pp.x, pp.y, w, h, curveZoom, vx, vy));
            }
            if (curveAnswerAlpha != null) {
                const onLeft = curvePinAlpha != null && curvePinAlpha > 1;
                const ap = onLeft ? leftLobePoint(1 - curveAnswerAlpha) : curvePointFromAlpha(curveAnswerAlpha);
                pinPosPx.push(curveToScreen(ap.x, ap.y, w, h, curveZoom, vx, vy));
            }
            const pinPosArg = pinPosPx.length ? pinPosPx : null;

            let dashPath = null;
            let dashClipW = 0;
            if (curveAnswerAlpha != null && curvePinAlpha != null) {
                const onLeft = curvePinAlpha > 1;
                const lobePointFn = onLeft ? leftLobePoint : curvePointFromAlpha;
                let lobeParamPin, lobeParamAns;
                if (onLeft) {
                    lobeParamPin = curvePinAlpha - 1;
                    lobeParamAns = 1 - curveAnswerAlpha;
                } else {
                    lobeParamPin = curvePinAlpha;
                    lobeParamAns = curveAnswerAlpha;
                }
                const dMin = Math.min(lobeParamPin, lobeParamAns);
                const dMax = Math.max(lobeParamPin, lobeParamAns);
                const DASH_PTS = 300;
                dashPath = [];
                for (let i = 0; i <= DASH_PTS; i++) {
                    const a = dMin + (dMax - dMin) * (i / DASH_PTS);
                    const pt = lobePointFn(a);
                    dashPath.push(curveToScreen(pt.x, pt.y, w, h, curveZoom, vx, vy));
                }
                dashClipW = spreadPx * 3 + 16;
            }

            if (dashPath) {
                ctx.save();
                ctx.beginPath();
                ctx.rect(0, 0, w, h);
                const halfW = dashClipW / 2;
                for (let i = 0; i < dashPath.length - 1; i++) {
                    const p0 = dashPath[i], p1 = dashPath[i + 1];
                    const dx = p1.sx - p0.sx, dy = p1.sy - p0.sy;
                    const len = Math.sqrt(dx * dx + dy * dy) || 1;
                    const nx = -dy / len * halfW, ny = dx / len * halfW;
                    if (i === 0) ctx.moveTo(p0.sx + nx, p0.sy + ny);
                    ctx.lineTo(p1.sx + nx, p1.sy + ny);
                }
                for (let i = dashPath.length - 1; i > 0; i--) {
                    const p0 = dashPath[i], p1 = dashPath[i - 1];
                    const dx = p1.sx - p0.sx, dy = p1.sy - p0.sy;
                    const len = Math.sqrt(dx * dx + dy * dy) || 1;
                    const nx = -dy / len * halfW, ny = dx / len * halfW;
                    if (i === dashPath.length - 1) ctx.lineTo(p0.sx + nx, p0.sy + ny);
                    ctx.lineTo(p1.sx + nx, p1.sy + ny);
                }
                ctx.closePath();
                ctx.clip('evenodd');
            }

            if (curveZoom <= 2) {
                for (let s = 0; s < NUM_STRANDS; s++) {
                    const seed = s * 137.5;
                    const screenPts = offsetCurveScreen(fullPts, seed, spreadPx, w, h, curveZoom, vx, vy, pinPosArg);
                    ctx.strokeStyle = STREAM_COLORS[s % STREAM_COLORS.length];
                    const thick = (0.15 + (Math.sin(seed * 1.13) * 0.5 + 0.5) * 1.6 + zoomFrac * 0.7) * vwScale;
                    ctx.lineWidth = thick;
                    drawScreenStroke(ctx, screenPts, w);
                }
            } else {
                let viewA = 0, viewD = Infinity, viewOnLeft = false;
                const SCAN_PTS = 400;
                for (let i = 0; i <= SCAN_PTS; i++) {
                    const a = i / SCAN_PTS;
                    const ptR = curvePointFromAlpha(a);
                    const dR = (ptR.x - vx) ** 2 + (ptR.y - vy) ** 2;
                    if (dR < viewD) { viewD = dR; viewA = a; viewOnLeft = false; }
                    const ptL = leftLobePoint(a);
                    const dL = (ptL.x - vx) ** 2 + (ptL.y - vy) ** 2;
                    if (dL < viewD) { viewD = dL; viewA = a; viewOnLeft = true; }
                }
                let refMin = Math.max(0, viewA - 1 / SCAN_PTS);
                let refMax = Math.min(1, viewA + 1 / SCAN_PTS);
                for (let r = 0; r < 4; r++) {
                    const step = (refMax - refMin) / 50;
                    let bestA = viewA, bestD = viewD, bestLeft = viewOnLeft;
                    for (let i = 0; i <= 50; i++) {
                        const a = refMin + step * i;
                        const ptR = curvePointFromAlpha(a);
                        const dR = (ptR.x - vx) ** 2 + (ptR.y - vy) ** 2;
                        if (dR < bestD) { bestD = dR; bestA = a; bestLeft = false; }
                        const ptL = leftLobePoint(a);
                        const dL = (ptL.x - vx) ** 2 + (ptL.y - vy) ** 2;
                        if (dL < bestD) { bestD = dL; bestA = a; bestLeft = true; }
                    }
                    viewA = bestA; viewD = bestD; viewOnLeft = bestLeft;
                    refMin = Math.max(0, viewA - step);
                    refMax = Math.min(1, viewA + step);
                }

                const visAlphaHalf = Math.min(1.0, 5 / curveZoom);
                const aMin = Math.max(0, viewA - visAlphaHalf);
                const aMax = Math.min(1, viewA + visAlphaHalf);

                const primaryFn = viewOnLeft ? leftLobePoint : curvePointFromAlpha;
                const mirrorFn = viewOnLeft ? curvePointFromAlpha : leftLobePoint;
                const primaryTBase = viewOnLeft ? 0.5 : 0;
                const mirrorTBase = viewOnLeft ? 0 : 0.5;

                const detailPrimary = [];
                for (let i = 0; i <= CURVE_DRAW_PTS; i++) {
                    const alpha = aMin + (aMax - aMin) * i / CURVE_DRAW_PTS;
                    const pt = primaryFn(alpha);
                    pt.t = primaryTBase + alpha * 0.5;
                    detailPrimary.push(pt);
                }
                const mMin = 1 - aMax, mMax = 1 - aMin;
                const detailMirror = [];
                for (let i = 0; i <= CURVE_DRAW_PTS; i++) {
                    const alpha = mMin + (mMax - mMin) * i / CURVE_DRAW_PTS;
                    const pt = mirrorFn(alpha);
                    pt.t = mirrorTBase + alpha * 0.5;
                    detailMirror.push(pt);
                }

                for (let s = 0; s < NUM_STRANDS; s++) {
                    const seed = s * 137.5;
                    ctx.strokeStyle = STREAM_COLORS[s % STREAM_COLORS.length];
                    const thick = (0.15 + (Math.sin(seed * 1.13) * 0.5 + 0.5) * 1.6 + zoomFrac * 0.7) * vwScale;
                    ctx.lineWidth = thick;
                    const sP = offsetCurveScreen(detailPrimary, seed, spreadPx, w, h, curveZoom, vx, vy, pinPosArg);
                    drawScreenStroke(ctx, sP, w);
                    const sM = offsetCurveScreen(detailMirror, seed, spreadPx, w, h, curveZoom, vx, vy, pinPosArg);
                    drawScreenStroke(ctx, sM, w);
                }
            }

            if (dashPath) {
                ctx.restore();
                ctx.save();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = px(LINE_WEIGHT_VW);
                ctx.setLineDash([px(LINE_DASH_VW), px(LINE_GAP_VW)]);
                ctx.lineCap = 'butt';
                ctx.beginPath();
                dashPath.forEach((p, i) => i === 0 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy));
                ctx.stroke();
                ctx.restore();
            }

            if (curvePinAlpha != null) {
                const pp = curvePinPoint(curvePinAlpha);
                const { sx, sy } = curveToScreen(pp.x, pp.y, w, h, curveZoom, vx, vy);
                if (curvePinEl) {
                    curvePinEl.style.left = sx + 'px';
                    curvePinEl.style.top = sy + 'px';
                    curvePinEl.style.display = '';
                }
            }

            if (curveAnswerAlpha != null) {
                const onLeftLobe = curvePinAlpha != null && curvePinAlpha > 1;
                const ap = onLeftLobe ? leftLobePoint(1 - curveAnswerAlpha) : curvePointFromAlpha(curveAnswerAlpha);
                const { sx, sy } = curveToScreen(ap.x, ap.y, w, h, curveZoom, vx, vy);
                const ansEl = curveContainer?.querySelector('.curve-pin--answer');
                if (ansEl) {
                    ansEl.style.left = sx + 'px';
                    ansEl.style.top = sy + 'px';
                    ansEl.style.display = '';
                }
            }
        }

        function resizeCurveCanvas() {
            if (!curveCanvas || !curveContainer) return;
            const rect = curveContainer.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            curveCanvas.width = rect.width * dpr;
            curveCanvas.height = rect.height * dpr;
            curveCanvas.style.width = rect.width + 'px';
            curveCanvas.style.height = rect.height + 'px';
            curveCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            drawCurve();
        }

        function ensurePinVisible() {
            if (curvePinAlpha == null || !curveCanvas) return;
            const dpr = window.devicePixelRatio || 1;
            const w = curveCanvas.width / dpr;
            const h = curveCanvas.height / dpr;
            if (w === 0 || h === 0) return;
            const { scale } = curveCanvasMetrics();
            const pp = curvePinPoint(curvePinAlpha);
            const { sx, sy } = curveToScreen(pp.x, pp.y, w, h, curveZoom, curveViewX, curveViewY);
            const mx = w * 0.15;
            if (sx < mx) {
                curveViewX = pp.x + (w / 2 - mx) / scale;
            } else if (sx > w - mx) {
                curveViewX = pp.x - (w / 2 - mx) / scale;
            }

            const fieldsH = h * 0.14;
            const cy = h * CURVE_Y_CENTER;
            if (sy > cy - fieldsH && sy < cy + fieldsH) {
                const shift = (fieldsH + h * 0.06) / scale;
                const nearCenter = Math.abs(sy - cy) < 2;
                if (nearCenter) {
                    curveViewY += (pp.y > 0 ? -1 : 1) * shift;
                } else if (sy < cy) {
                    curveViewY -= shift;
                } else {
                    curveViewY += shift;
                }
            }
            drawCurve();
        }

        function findNearestAlpha(screenX, screenY, w, h) {
            const vx = curveViewX, vy = curveViewY;
            let bestAlpha = 0, bestDist = Infinity;
            const coarse = 300;

            for (let i = 0; i <= coarse; i++) {
                const a = i / coarse;
                const pt = curvePointFromAlpha(a);
                const { sx, sy } = curveToScreen(pt.x, pt.y, w, h, curveZoom, vx, vy);
                const d = (sx - screenX) ** 2 + (sy - screenY) ** 2;
                if (d < bestDist) { bestDist = d; bestAlpha = a; }
            }
            for (let i = 0; i <= coarse; i++) {
                const u = i / coarse;
                const lp = leftLobePoint(u);
                const { sx, sy } = curveToScreen(lp.x, lp.y, w, h, curveZoom, vx, vy);
                const d = (sx - screenX) ** 2 + (sy - screenY) ** 2;
                if (d < bestDist) { bestDist = d; bestAlpha = 1 + u; }
            }

            let range = 3.0 / coarse;
            for (let iter = 0; iter < 10; iter++) {
                const lo = Math.max(0, bestAlpha - range);
                const hi = Math.min(2, bestAlpha + range);
                for (let i = 0; i <= 80; i++) {
                    const a = lo + (hi - lo) * i / 80;
                    const pt = curvePinPoint(a);
                    const { sx, sy } = curveToScreen(pt.x, pt.y, w, h, curveZoom, vx, vy);
                    const d = (sx - screenX) ** 2 + (sy - screenY) ** 2;
                    if (d < bestDist) { bestDist = d; bestAlpha = a; }
                }
                range /= 5;
            }

            if (bestAlpha < 0.005 || bestAlpha > 1.995) {
                bestAlpha = 1.0 - 1e-9;
            }
            return { alpha: bestAlpha, dist: Math.sqrt(bestDist) };
        }

        function findNearestAlphaLocal(screenX, screenY, w, h, currentAlpha) {
            const vx = curveViewX, vy = curveViewY;
            const searchRange = 0.3 / curveZoom;
            let bestAlpha = currentAlpha, bestDist = Infinity;
            const steps = 300;
            const lo = currentAlpha - searchRange;
            const hi = currentAlpha + searchRange;

            for (let i = 0; i <= steps; i++) {
                let a = lo + (hi - lo) * i / steps;
                a = ((a % 2) + 2) % 2;
                const pt = curvePinPoint(a);
                const { sx, sy } = curveToScreen(pt.x, pt.y, w, h, curveZoom, vx, vy);
                const d = (sx - screenX) ** 2 + (sy - screenY) ** 2;
                if (d < bestDist) { bestDist = d; bestAlpha = a; }
            }

            let range = (hi - lo) / steps * 3;
            for (let iter = 0; iter < 10; iter++) {
                const rlo = bestAlpha - range;
                const rhi = bestAlpha + range;
                for (let i = 0; i <= 80; i++) {
                    let a = rlo + (rhi - rlo) * i / 80;
                    a = ((a % 2) + 2) % 2;
                    const pt = curvePinPoint(a);
                    const { sx, sy } = curveToScreen(pt.x, pt.y, w, h, curveZoom, vx, vy);
                    const d = (sx - screenX) ** 2 + (sy - screenY) ** 2;
                    if (d < bestDist) { bestDist = d; bestAlpha = a; }
                }
                range /= 5;
            }
            return { alpha: bestAlpha, dist: Math.sqrt(bestDist) };
        }

        function updateTimeFields() {
            if (!curveFieldsEl || curvePinAlpha == null) return;
            const decYear = alphaToYear(curvePinAlpha);
            const t = decimalToTime(decYear);
            const display = formatTimeDisplay(t, curveDetailLevel);
            const yearEl = curveFieldsEl.querySelector('[data-field="year"]');
            const dateEl = curveFieldsEl.querySelector('[data-field="date"]');
            const timeEl = curveFieldsEl.querySelector('[data-field="time"]');
            if (yearEl && !yearEl.classList.contains('is-editing')) {
                yearEl.querySelector('.time-field__display').textContent = display.year;
            }
            if (dateEl) {
                if (!dateEl.classList.contains('is-editing')) {
                    dateEl.querySelector('.time-field__display').textContent = display.date;
                }
                dateEl.style.display = display.date ? '' : 'none';
            }
            if (timeEl) {
                if (!timeEl.classList.contains('is-editing')) {
                    timeEl.querySelector('.time-field__display').textContent = display.time;
                }
                timeEl.style.display = display.time ? '' : 'none';
            }
        }

        function showCurveTimeFields(t) {
            if (!curveFieldsEl) return;
            const display = formatTimeDisplay(t, curveDetailLevel);
            const yearEl = curveFieldsEl.querySelector('[data-field="year"]');
            const dateEl = curveFieldsEl.querySelector('[data-field="date"]');
            const timeEl = curveFieldsEl.querySelector('[data-field="time"]');
            if (yearEl) yearEl.querySelector('.time-field__display').textContent = display.year;
            if (dateEl) {
                dateEl.querySelector('.time-field__display').textContent = display.date;
                dateEl.style.display = display.date ? '' : 'none';
            }
            if (timeEl) {
                timeEl.querySelector('.time-field__display').textContent = display.time;
                timeEl.style.display = display.time ? '' : 'none';
            }
        }

        const RANGE_UNIT_TO_YEARS = { minute: 1/525960, hour: 1/8766, day: 1/365.25, month: 1/12, year: 1 };

        function effectiveTimeDiff(entry, answer) {
            let diff = timeYearsDiff(entry, answer, answer.detail_level);
            if (answer.range > 0 && answer.range_unit) {
                diff = Math.max(0, diff - answer.range * (RANGE_UNIT_TO_YEARS[answer.range_unit] || 1));
            }
            return diff;
        }

        function showCurveDistanceFields() {
            if (!curveFieldsEl || !curveResultEntry || !curveResultAnswer) return;
            const yearsDiff = effectiveTimeDiff(curveResultEntry, curveResultAnswer);
            const distText = formatTimeDifference(yearsDiff);
            const yearEl = curveFieldsEl.querySelector('[data-field="year"]');
            const dateEl = curveFieldsEl.querySelector('[data-field="date"]');
            const timeEl = curveFieldsEl.querySelector('[data-field="time"]');
            if (yearEl) yearEl.querySelector('.time-field__display').textContent = distText;
            if (dateEl) dateEl.style.display = 'none';
            if (timeEl) timeEl.style.display = 'none';
        }

        function fitCurveToBothPins() {
            if (curveAnswerAlpha == null || curvePinAlpha == null) return;
            const pinPt = curvePinPoint(curvePinAlpha);
            const onLeftLobe = curvePinAlpha > 1;
            const ansPt = onLeftLobe ? leftLobePoint(1 - curveAnswerAlpha) : curvePointFromAlpha(curveAnswerAlpha);
            const cx = (pinPt.x + ansPt.x) / 2;
            const cy = (pinPt.y + ansPt.y) / 2;
            curveViewX = cx;
            curveViewY = cy;
            const dx = Math.abs(pinPt.x - ansPt.x);
            const dy = Math.abs(pinPt.y - ansPt.y);
            const span = Math.max(dx, dy, 0.05);
            const { w, h } = curveCanvasMetrics();
            const pad = Math.min(w, h) * 0.08;
            const baseScale = Math.min((w - 2 * pad) / 2, (h - 2 * pad));
            const availW = w * 0.46;
            const availH = h * 0.37;
            const neededZoom = Math.min(availW / (dx * baseScale || 1), availH / (dy * baseScale || 1));
            curveZoom = Math.max(1.5, Math.min(curveMaxZoom, neededZoom));

            const fieldH = curveFieldsEl ? curveFieldsEl.offsetHeight : 0;
            const fieldCenterY = h * CURVE_Y_CENTER;
            const halfField = fieldH / 2 + 10;
            const pScreen = curveToScreen(pinPt.x, pinPt.y, w, h, curveZoom, curveViewX, curveViewY);
            const aScreen = curveToScreen(ansPt.x, ansPt.y, w, h, curveZoom, curveViewX, curveViewY);
            const topPin = Math.min(pScreen.sy, aScreen.sy);
            const botPin = Math.max(pScreen.sy, aScreen.sy);
            if (topPin > fieldCenterY - halfField && botPin < fieldCenterY + halfField) {
                curveViewY += (halfField + 20) / (baseScale * curveZoom);
            } else if (topPin < fieldCenterY + halfField && topPin > fieldCenterY - halfField) {
                curveViewY += (fieldCenterY + halfField - topPin + 15) / (baseScale * curveZoom);
            } else if (botPin > fieldCenterY - halfField && botPin < fieldCenterY + halfField) {
                curveViewY -= (botPin - (fieldCenterY - halfField) + 15) / (baseScale * curveZoom);
            }
        }


        function getEditValueForField(fieldType) {
            if (curvePinAlpha == null) return '';
            const t = decimalToTime(alphaToYear(curvePinAlpha));
            switch (fieldType) {
                case 'year': return String(t.bc ? -Math.abs(t.year) : t.year);
                case 'date':
                    if (curveDetailLevel === 'month') return String(t.month);
                    return `${t.month}/${t.day}`;
                case 'time': return `${String(t.hour).padStart(2,'0')}:${String(t.minute).padStart(2,'0')}`;
            }
            return '';
        }

        function sizeInputToContent(input) {
            const span = document.createElement('span');
            span.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font:inherit;text-transform:inherit;';
            input.parentNode.appendChild(span);
            span.textContent = input.value || ' ';
            input.style.width = span.offsetWidth + 'px';
            span.remove();
        }

        function startFieldEdit(fieldEl) {
            if (curvePinAlpha == null) return;
            const fieldType = fieldEl.dataset.field;
            const display = fieldEl.querySelector('.time-field__display');
            const input = fieldEl.querySelector('.time-field__input');
            const value = getEditValueForField(fieldType);
            fieldEl.classList.add('is-editing');
            display.style.display = 'none';
            input.value = value;
            input.style.display = '';
            sizeInputToContent(input);
            input.focus();
            input.select();
        }

        function cancelFieldEdit(fieldEl) {
            const display = fieldEl.querySelector('.time-field__display');
            const input = fieldEl.querySelector('.time-field__input');
            fieldEl.classList.remove('is-editing');
            input.style.display = 'none';
            display.style.display = '';
            updateTimeFields();
        }

        function commitFieldEdit(fieldEl) {
            const fieldType = fieldEl.dataset.field;
            const input = fieldEl.querySelector('.time-field__input');
            const value = input.value.trim();
            if (!value) { cancelFieldEdit(fieldEl); return; }

            const t = decimalToTime(alphaToYear(curvePinAlpha));
            const newTime = { year: t.year, month: t.month, day: t.day, hour: t.hour, minute: t.minute, bc: t.bc };

            try {
                switch (fieldType) {
                    case 'year': {
                        const y = Number(value);
                        if (isNaN(y) || !isFinite(y)) throw new Error('Invalid year');
                        newTime.bc = y < 0;
                        newTime.year = Math.abs(y);
                        break;
                    }
                    case 'date': {
                        if (curveDetailLevel === 'month') {
                            const m = Math.round(Number(value));
                            if (isNaN(m) || m < 1 || m > 12) throw new Error('Month must be 1–12');
                            newTime.month = m;
                        } else {
                            let m, d;
                            if (value.includes('/')) {
                                const parts = value.split('/');
                                m = Number(parts[0]); d = Number(parts[1]);
                            } else if (value.includes('.')) {
                                const parts = value.split('.');
                                d = Number(parts[0]); m = Number(parts[1]);
                            } else if (/^\d{3,4}$/.test(value)) {
                                const s = value.padStart(4, '0');
                                m = Number(s.slice(0, 2)); d = Number(s.slice(2));
                            } else {
                                throw new Error('Wrong date format');
                            }
                            m = Math.round(m); d = Math.round(d);
                            if (isNaN(m) || m < 1 || m > 12) throw new Error('Month must be 1–12');
                            if (isNaN(d) || d < 1 || d > 31) throw new Error('Day must be 1–31');
                            newTime.month = m;
                            newTime.day = d;
                        }
                        break;
                    }
                    case 'time': {
                        let h, m;
                        if (value.includes(':')) {
                            const parts = value.split(':');
                            h = Number(parts[0]); m = Number(parts[1]);
                        } else if (value.includes('.')) {
                            const parts = value.split('.');
                            h = Number(parts[0]); m = Number(parts[1]);
                        } else if (/^\d{3,4}$/.test(value)) {
                            const s = value.padStart(4, '0');
                            h = Number(s.slice(0, 2)); m = Number(s.slice(2));
                        } else {
                            throw new Error('Wrong time format');
                        }
                        h = Math.round(h); m = Math.round(m);
                        if (isNaN(h) || h < 0 || h > 23) throw new Error('Hours must be 0–23');
                        if (isNaN(m) || m < 0 || m > 59) throw new Error('Minutes must be 0–59');
                        newTime.hour = h;
                        newTime.minute = m;
                        break;
                    }
                }

                const dec = timeToDecimal(newTime);
                if (dec < curveTimeStart || dec > curveTimeEnd) {
                    throw new Error('Time outside range');
                }

                const wasOnLeftLobe = curvePinAlpha > 1;
                const rightAlpha = yearToAlpha(dec);
                curvePinAlpha = wasOnLeftLobe ? 2 - rightAlpha : rightAlpha;
                cancelFieldEdit(fieldEl);
                drawCurve();
                ensurePinVisible();
                curveUserInteracted = true;
                curveContainer?.dispatchEvent(new CustomEvent('curvepin'));
            } catch (err) {
                showToast(err.message, { type: 'error' });
                cancelFieldEdit(fieldEl);
            }
        }

        function screenDistToCurve(screenX, screenY, w, h) {
            const { scale } = curveCanvasMetrics();
            const cx = (screenX - w / 2) / scale + curveViewX;
            const cy = -(screenY - h * CURVE_Y_CENTER) / scale + curveViewY;
            let best = Infinity, bestA = 0, bestLobe = 0;
            const steps = 200;
            for (let i = 0; i <= steps; i++) {
                const a = i / steps;
                const pt = curvePointFromAlpha(a);
                const d = (pt.x - cx) ** 2 + (pt.y - cy) ** 2;
                if (d < best) { best = d; bestA = a; bestLobe = 0; }
            }
            for (let i = 0; i <= steps; i++) {
                const a = i / steps;
                const pt = leftLobePoint(a);
                const d = (pt.x - cx) ** 2 + (pt.y - cy) ** 2;
                if (d < best) { best = d; bestA = a; bestLobe = 1; }
            }
            let range = 3.0 / steps;
            for (let iter = 0; iter < 6; iter++) {
                const lo = Math.max(0, bestA - range);
                const hi = Math.min(1, bestA + range);
                for (let i = 0; i <= 40; i++) {
                    const a = lo + (hi - lo) * i / 40;
                    const pt = bestLobe === 0 ? curvePointFromAlpha(a) : leftLobePoint(a);
                    const d = (pt.x - cx) ** 2 + (pt.y - cy) ** 2;
                    if (d < best) { best = d; bestA = a; }
                }
                range /= 4;
            }
            return Math.sqrt(best) * scale;
        }

        function bindFieldEditing(fieldsEl) {
            fieldsEl.querySelectorAll('.time-field--editable').forEach(fieldEl => {
                fieldEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (fieldEl.classList.contains('is-editing')) return;
                    startFieldEdit(fieldEl);
                });

                const input = fieldEl.querySelector('.time-field__input');
                input.addEventListener('blur', () => {
                    if (!fieldEl.classList.contains('is-editing')) return;
                    commitFieldEdit(fieldEl);
                });
                input.addEventListener('keydown', (e) => {
                    e.stopPropagation();
                    if (e.key === 'Enter') { e.preventDefault(); commitFieldEdit(fieldEl); }
                    if (e.key === 'Escape') { e.preventDefault(); cancelFieldEdit(fieldEl); }
                });
                input.addEventListener('input', () => sizeInputToContent(input));
                input.addEventListener('pointerdown', (e) => e.stopPropagation());
            });
        }

        function getGuessTimeFromCurve() {
            if (curvePinAlpha == null) return null;
            const decYear = alphaToYear(curvePinAlpha);
            const t = decimalToTime(decYear);
            t.lobe = curvePinAlpha > 1 ? 1 : 0;
            return t;
        }

        function setCurvePinFromTime(timeObj) {
            const dec = timeToDecimal(timeObj);
            let alpha = yearToAlpha(dec);
            if (timeObj.lobe === 1) {
                alpha = 2 - alpha;
            } else if (timeObj.lobe == null) {
                const hash = Math.abs(Math.sin(dec * 127.1 + 311.7)) * 10000;
                if ((hash | 0) % 2 === 1) alpha = 2 - alpha;
            }
            curvePinAlpha = alpha;
            const pp = curvePinPoint(curvePinAlpha);
            curveViewX = pp.x;
            curveViewY = pp.y;
        }

        function initInfinityCurve(containerEl, opts = {}) {
            curveContainer = containerEl;
            curveDetailLevel = opts.detailLevel || 'year';
            curveReadonly = opts.readonly || false;
            curvePinAlpha = null;
            curveAnswerAlpha = null;
            curvePanning = false;
            curveDragging = false;
            curveUserInteracted = false;

            const nd = nowDecimal();
            let adminDefinedPeriod = false;
            if (opts.answer?.period_start && opts.answer?.period_end) {
                curveTimeStart = timeToDecimal(opts.answer.period_start);
                curveTimeEnd = timeToDecimal(opts.answer.period_end);
                adminDefinedPeriod = true;
            } else if (opts.answer) {
                const ansDec = timeToDecimal(opts.answer);
                const period = computeCurvePeriod(ansDec);
                curveTimeEnd = nd;
                curveTimeStart = Math.max(-13_800_000_000, nd - period);
            } else {
                curveTimeEnd = nd;
                curveTimeStart = nd - 100;
            }

            const period = curveTimeEnd - curveTimeStart;
            const minVisible = DETAIL_MIN_VISIBLE[curveDetailLevel] || 1;
            curveZoom = 1.5;
            curveMaxZoom = Math.max(10, period / minVisible);
            curveViewX = 0;
            curveViewY = 0;

            curveCanvas = document.createElement('canvas');
            curveCanvas.className = 'time-canvas';
            curveCtx = curveCanvas.getContext('2d');
            containerEl.appendChild(curveCanvas);

            const initial = esc(firstName(profile.name).charAt(0).toUpperCase());
            curvePinEl = document.createElement('div');
            curvePinEl.className = 'curve-pin';
            curvePinEl.innerHTML = `<div class="world-pin" style="background:#000;">${initial}</div>`;
            curvePinEl.style.display = 'none';
            containerEl.appendChild(curvePinEl);

            curveFieldsEl = document.createElement('div');
            curveFieldsEl.className = 'time-fields';
            const editableClass = curveReadonly ? '' : ' time-field--editable';
            curveFieldsEl.innerHTML = `
                <div class="time-field${editableClass}" data-field="date" style="display:none"><span class="time-field__display"></span><input class="time-field__input" style="display:none"></div>
                <div class="time-field${editableClass}" data-field="year"><span class="time-field__display">—</span><input class="time-field__input" style="display:none"></div>
                <div class="time-field${editableClass}" data-field="time" style="display:none"><span class="time-field__display"></span><input class="time-field__input" style="display:none"></div>
            `;
            containerEl.appendChild(curveFieldsEl);

            if (!curveReadonly) bindFieldEditing(curveFieldsEl);

            if (opts.pinTime) {
                setCurvePinFromTime(opts.pinTime);
                updateTimeFields();
            } else if (!curveReadonly && opts.savedAlpha != null) {
                curvePinAlpha = opts.savedAlpha;
                curveUserInteracted = true;
                updateTimeFields();
            } else if (!curveReadonly) {
                const lobeAlpha = Math.random() * 0.98 + 0.01;
                curvePinAlpha = Math.random() < 0.5 ? lobeAlpha : 2 - lobeAlpha;
                updateTimeFields();
            }
            if (opts.answerTime) {
                const dec = timeToDecimal(opts.answerTime);
                curveAnswerAlpha = yearToAlpha(dec);
                const ansPin = document.createElement('div');
                ansPin.className = 'curve-pin curve-pin--answer';
                ansPin.innerHTML = `<div class="world-pin world-pin--j" style="background:#BA0000;cursor:pointer;">J</div>`;
                ansPin.style.display = 'none';
                containerEl.appendChild(ansPin);

                if (curveReadonly && opts.pinTime) {
                    curveResultAnswer = opts.answerTime;
                    curveResultEntry = opts.pinTime;
                    curveResultMode = 'distance';

                    curvePinEl.style.cursor = 'pointer';
                    ansPin.style.pointerEvents = 'auto';
                    curvePinEl.style.pointerEvents = 'auto';

                    ansPin.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (curveResultTimer) clearTimeout(curveResultTimer);
                        curveResultMode = 'answer';
                        showCurveTimeFields(curveResultAnswer);
                        curveResultTimer = setTimeout(() => { curveResultMode = 'distance'; showCurveDistanceFields(); }, 2000);
                    });

                    curvePinEl.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (curveResultTimer) clearTimeout(curveResultTimer);
                        curveResultMode = 'guess';
                        showCurveTimeFields(curveResultEntry);
                        curveResultTimer = setTimeout(() => { curveResultMode = 'distance'; showCurveDistanceFields(); }, 2000);
                    });
                }
            }

            const zoomCtrl = document.createElement('div');
            zoomCtrl.className = 'map-zoom';
            zoomCtrl.innerHTML = `<button class="map-zoom__btn" data-dir="in">+</button><button class="map-zoom__btn" data-dir="out">&minus;</button>`;
            containerEl.appendChild(zoomCtrl);
            zoomCtrl.querySelectorAll('.map-zoom__btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const oldZoom = curveZoom;
                    if (btn.dataset.dir === 'in') curveZoom = Math.min(curveMaxZoom, curveZoom * 1.5);
                    else curveZoom = Math.max(1.5, curveZoom / 1.5);
                    if (curveZoom !== oldZoom) drawCurve();
                });
            });

            bindCurveInteraction(containerEl);

            curveResizeHandler = () => resizeCurveCanvas();
            window.addEventListener('resize', curveResizeHandler);

            containerEl.addEventListener('wheel', (e) => {
                if (!e.ctrlKey && !e.metaKey) return;
                e.preventDefault();
                const oldZoom = curveZoom;
                if (e.deltaY < 0) curveZoom = Math.min(curveMaxZoom, curveZoom * 1.08);
                else curveZoom = Math.max(1.5, curveZoom / 1.08);
                if (curveZoom !== oldZoom) drawCurve();
            }, { passive: false });

            const isResult = curveReadonly && opts.answerTime && opts.pinTime;
            setTimeout(() => {
                resizeCurveCanvas();
                if (isResult) {
                    fitCurveToBothPins();
                    showCurveDistanceFields();
                    drawCurve();
                } else {
                    ensurePinVisible();
                }
            }, 100);

            if (!adminDefinedPeriod) {
                curveNowInterval = setInterval(() => {
                    curveTimeEnd = nowDecimal();
                    drawCurve();
                }, 60000);
            }
        }

        function curveCanvasMetrics() {
            const dpr = window.devicePixelRatio || 1;
            const w = curveCanvas.width / dpr;
            const h = curveCanvas.height / dpr;
            const pad = Math.min(w, h) * 0.08;
            const scale = Math.min((w - 2 * pad) / 2, (h - 2 * pad)) * curveZoom;
            return { w, h, scale };
        }

        function stopCurveAutoPan() {
            if (curveAutoPanRAF) { cancelAnimationFrame(curveAutoPanRAF); curveAutoPanRAF = null; }
        }

        function curveAutoPan() {
            stopCurveAutoPan();
            const { w, h, scale } = curveCanvasMetrics();
            const margin = Math.min(w, h) * 0.12;
            const mx = curveDragScreenX, my = curveDragScreenY;
            let panX = 0, panY = 0;

            if (mx < margin) panX = -(1 - mx / margin);
            else if (mx > w - margin) panX = (1 - (w - mx) / margin);
            if (my < margin) panY = (1 - my / margin);
            else if (my > h - margin) panY = -(1 - (h - my) / margin);

            if (panX === 0 && panY === 0) return;
            const speed = 3 / scale;

            function step() {
                if (!curveDragging) return;
                curveViewX += panX * speed;
                curveViewY += panY * speed;
                const { w: cw, h: ch } = curveCanvasMetrics();
                const { alpha } = findNearestAlphaLocal(curveDragScreenX, curveDragScreenY, cw, ch, curvePinAlpha);
                curvePinAlpha = alpha;
                updateTimeFields();
                drawCurve();
                curveAutoPanRAF = requestAnimationFrame(step);
            }
            curveAutoPanRAF = requestAnimationFrame(step);
        }

        function bindCurveInteraction(containerEl) {
            containerEl.addEventListener('pointerdown', (e) => {
                if (e.target.closest('.map-zoom') || e.target.closest('.time-field') || e.target.closest('.curve-pin')) return;
                const rect = curveCanvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const { w, h } = curveCanvasMetrics();

                if (!curveReadonly) {
                    if (curvePinAlpha != null) {
                        const pp = curvePinPoint(curvePinAlpha);
                        const { sx, sy } = curveToScreen(pp.x, pp.y, w, h, curveZoom, curveViewX, curveViewY);
                        if (Math.sqrt((mx - sx) ** 2 + (my - sy) ** 2) < 30) {
                            curveDragging = true;
                            curveDragScreenX = mx;
                            curveDragScreenY = my;
                            containerEl.setPointerCapture(e.pointerId);
                            curveUserInteracted = true;
                            containerEl.dispatchEvent(new CustomEvent('curvepin'));
                            return;
                        }
                    }

                    const lineDist = screenDistToCurve(mx, my, w, h);
                    if (lineDist < 40) {
                        const { alpha } = findNearestAlpha(mx, my, w, h);
                        curvePinAlpha = alpha;
                        curveDragging = true;
                        curveDragScreenX = mx;
                        curveDragScreenY = my;
                        containerEl.setPointerCapture(e.pointerId);
                        curveUserInteracted = true;
                        updateTimeFields();
                        drawCurve();
                        containerEl.dispatchEvent(new CustomEvent('curvepin'));
                        return;
                    }
                }

                curvePanning = true;
                curvePanLastX = e.clientX;
                curvePanLastY = e.clientY;
                containerEl.classList.add('is-panning');
                containerEl.setPointerCapture(e.pointerId);
            });

            containerEl.addEventListener('pointermove', (e) => {
                if (!curveCanvas) return;
                if (curvePanning && curvePanLastX != null) {
                    const { scale } = curveCanvasMetrics();
                    const dx = e.clientX - curvePanLastX;
                    const dy = e.clientY - curvePanLastY;
                    curveViewX -= dx / scale;
                    curveViewY += dy / scale;
                    curvePanLastX = e.clientX;
                    curvePanLastY = e.clientY;
                    drawCurve();
                    return;
                }

                if (curveDragging) {
                    const rect = curveCanvas.getBoundingClientRect();
                    curveDragScreenX = e.clientX - rect.left;
                    curveDragScreenY = e.clientY - rect.top;
                    const { w, h } = curveCanvasMetrics();
                    const { alpha } = findNearestAlphaLocal(curveDragScreenX, curveDragScreenY, w, h, curvePinAlpha);
                    curvePinAlpha = alpha;
                    updateTimeFields();
                    drawCurve();
                    curveAutoPan();
                    return;
                }

                const rect = curveCanvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const { w, h } = curveCanvasMetrics();
                let cursor = 'grab';
                if (!curveReadonly) {
                    if (curvePinAlpha != null) {
                        const pp = curvePinPoint(curvePinAlpha);
                        const { sx, sy } = curveToScreen(pp.x, pp.y, w, h, curveZoom, curveViewX, curveViewY);
                        if (Math.sqrt((mx - sx) ** 2 + (my - sy) ** 2) < 30) cursor = 'move';
                    }
                    if (cursor === 'grab') {
                        if (screenDistToCurve(mx, my, w, h) < 40) cursor = 'crosshair';
                    }
                }
                containerEl.style.cursor = cursor;
            });

            function stopAll() {
                const wasDragging = curveDragging;
                curveDragging = false;
                curvePanning = false;
                curvePanLastX = null;
                curvePanLastY = null;
                containerEl.classList.remove('is-panning');
                stopCurveAutoPan();
                if (wasDragging && !curveReadonly) {
                    containerEl.dispatchEvent(new CustomEvent('curvepin'));
                }
            }
            containerEl.addEventListener('pointerup', stopAll);
            containerEl.addEventListener('pointercancel', stopAll);

            containerEl.addEventListener('dblclick', (e) => {
                if (e.target.closest('.map-zoom') || e.target.closest('.time-field')) return;
                e.preventDefault();
                const oldZoom = curveZoom;
                if (e.shiftKey) curveZoom = Math.max(1.5, curveZoom / 1.5);
                else curveZoom = Math.min(curveMaxZoom, curveZoom * 1.5);
                if (curveZoom !== oldZoom) drawCurve();
            });

            containerEl.setAttribute('tabindex', '0');
            containerEl.style.outline = 'none';
            containerEl.addEventListener('keydown', (e) => {
                if (e.target.closest('.time-field__input')) return;
                if (e.key === '+' || e.key === '=') {
                    e.preventDefault();
                    curveZoom = Math.min(curveMaxZoom, curveZoom * 1.5);
                    drawCurve();
                } else if (e.key === '-' || e.key === '_') {
                    e.preventDefault();
                    curveZoom = Math.max(1.5, curveZoom / 1.5);
                    drawCurve();
                }
            });
        }

        function cleanupCurve() {
            if (curveResizeHandler) { window.removeEventListener('resize', curveResizeHandler); curveResizeHandler = null; }
            if (curveNowInterval) { clearInterval(curveNowInterval); curveNowInterval = null; }
            if (curveResultTimer) { clearTimeout(curveResultTimer); curveResultTimer = null; }
            stopCurveAutoPan();
            curveCanvas = null; curveCtx = null;
            curvePinEl = null; curveFieldsEl = null;
            curveContainer = null;
            curvePinAlpha = null; curveAnswerAlpha = null;
            curveZoom = 1; curveDragging = false; curvePanning = false;
            curveViewX = 0; curveViewY = 0;
            curvePanLastX = null; curvePanLastY = null;
            curveTimeStart = -13_800_000_000;
            curveTimeEnd = 2026;
            curveMaxZoom = 5e10;
            curveResultMode = 'distance';
            curveResultEntry = null;
            curveResultAnswer = null;
        }

        // ── Navigation Model ──

        async function buildNavItems() {
            navItems = [];
            const gameEnded = season && !season.active;

            if (currentMystery) {
                navItems.push({ mystery: currentMystery, type: 'current' });
            } else if (revealedMysteries.length && !gameEnded) {
                navItems.push({ mystery: null, type: 'next' });
            }
            if (revealedMysteries.length) {
                revealedMysteries.forEach((m, i) => {
                    navItems.push({ mystery: m, type: (i === 0) ? 'latest' : 'past' });
                });
                if (currentMystery) {
                    navPos = 0;
                } else if (gameEnded) {
                    navPos = 0;
                } else {
                    const latestGuess = await getUserGuess(revealedMysteries[0].id, userId);
                    navPos = latestGuess ? 1 : 0;
                }
            } else if (!currentMystery) {
                navItems.push({ mystery: null, type: 'first' });
                navPos = 0;
            } else {
                navPos = 0;
            }
        }

        // ── Header Builder ──

        function shortenYear(absYear, bc) {
            if (absYear < 10000) return String(absYear) + (bc ? ' BC' : '');
            if (absYear < 1_000_000) return parseFloat((absYear / 1000).toFixed(1)) + 'K' + (bc ? ' BC' : '');
            if (absYear < 1_000_000_000) return parseFloat((absYear / 1_000_000).toFixed(1)) + 'M' + (bc ? ' BC' : '');
            return parseFloat((absYear / 1_000_000_000).toFixed(1)) + 'B' + (bc ? ' BC' : '');
        }

        function mysteryStripLabel(mystery) {
            const MAX_LEN = 25;
            if (mystery.type === 'time' && mystery.answer) {
                const a = mystery.answer;
                const dl = a.detail_level || 'year';
                const d = formatTimeDisplay(a, dl);
                const bc = a.bc || a.year < 0;
                const absYear = Math.abs(a.year);

                let parts = [];
                if (d.date) parts.push(d.date.replace(/^[A-Za-z]+,\s*/, ''));

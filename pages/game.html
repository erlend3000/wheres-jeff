                parts.push(d.year);
                if (d.time) parts.push(d.time);
                let text = parts.join(', ');

                if (text.length > MAX_LEN) {
                    parts = [];
                    if (d.date) parts.push(d.date.replace(/^[A-Za-z]+,\s*/, ''));
                    parts.push(shortenYear(absYear, bc));
                    if (d.time) parts.push(d.time);
                    text = parts.join(', ');
                }
                return text;
            }
            if (mystery.answer?.location) {
                const full = formatLocationLabel(mystery.answer.location);
                if (full.length <= MAX_LEN) return full;
                const levels = mystery.answer.location;
                return levels[levels.length - 1] || full.slice(0, MAX_LEN);
            }
            return formatMysteryDate(mystery.reveals_at || mystery.published_at);
        }

        function makeHeader(type, mystery, extraLabel) {
            const titles = { current: 'CURRENT MYSTERY', latest: 'LATEST MYSTERY', past: 'PAST MYSTERY', next: 'NEXT MYSTERY', first: 'FIRST MYSTERY' };
            const canGoOlder = navPos < navItems.length - 1;
            const canGoNewer = navPos > 0;

            let labelHTML;
            if (type === 'current') {
                labelHTML = `<span class="strip__text" id="countdown">${formatCountdown(mystery.reveals_at) || ''}</span>`;
            } else if (type === 'next' || type === 'first') {
                labelHTML = `<span class="strip__text" id="countdown">${extraLabel || ''}</span>`;
            } else {
                const stripLabel = mysteryStripLabel(mystery);
                labelHTML = `<span class="strip__text">${esc(stripLabel)}</span>`;
            }

            return `
                <div class="mystery-header">
                    <div class="banner banner--top banner--from-right">
                        <span class="banner__text">${titles[type]}</span>
                    </div>
                    <div class="mystery-header__card">
                        <div class="strip strip--from-right">
                            ${canGoOlder ? '<button class="strip__arrow strip__arrow--left" id="nav-prev"></button>' : ''}
                            ${labelHTML}
                            ${canGoNewer ? '<button class="strip__arrow strip__arrow--right" id="nav-next"></button>' : ''}
                        </div>
                    </div>
                </div>`;
        }

        function makeImageHTML(mystery, stripText, stripId) {
            if (!mystery.image_url) return '';
            const ar = (mystery.image_width && mystery.image_height)
                ? `style="aspect-ratio:${mystery.image_width}/${mystery.image_height}"`
                : '';
            const idAttr = stripId ? ` id="${stripId}"` : '';
            return `
                <div class="mystery__image" ${ar}>
                    <img src="${esc(mystery.image_url)}" alt="Mystery">
                    <div class="edge-wrapper edge-wrapper--strip edge-wrapper--from-left">
                        <div class="strip strip--from-left"><span class="strip__text"${idAttr}>${stripText}</span></div>
                    </div>
                </div>`;
        }

        // ── Render at Current Position ──

        async function renderMysteryAtPosition() {
            cleanupMystery();
            const container = document.getElementById('mystery-content');

            if (!navItems.length) {
                container.innerHTML = '';
                return;
            }

            const { mystery, type } = navItems[navPos];

            if (type === 'next' || type === 'first') {
                await renderNextView(container, type);
            } else if (type === 'current') {
                const userGuess = isAdminViewer ? null : await getUserGuess(mystery.id, userId);
                if (userGuess) {
                    await renderSubmittedView(container, mystery, userGuess);
                } else {
                    await renderLiveView(container, mystery);
                }
            } else {
                await renderRevealedView(container, mystery, type);
            }

            attachNavHandlers();
        }

        function attachNavHandlers() {
            const prevBtn = document.getElementById('nav-prev');
            const nextBtn = document.getElementById('nav-next');
            if (prevBtn) prevBtn.addEventListener('click', () => { navPos++; renderMysteryAtPosition(); });
            if (nextBtn) nextBtn.addEventListener('click', () => { navPos--; renderMysteryAtPosition(); });
        }

        // ── Live Mystery View ──

        async function renderLiveView(container, mystery) {
            const answer = mystery.answer;
            const guesses = await getGuesses(mystery.id);
            const isTime = mystery.type === 'time';

            container.innerHTML = `
                <div class="mystery">
                    ${makeHeader('current', mystery)}
                    ${makeImageHTML(mystery, 'Make a guess!')}
                    <div style="position:relative;">
                        <div class="${isTime ? 'time-curve-container' : 'mystery__map'}" id="guess-map-container"></div>
                        <div class="edge-wrapper edge-wrapper--banner edge-wrapper--from-right" style="top:auto;bottom:0;">
                            <div class="banner banner--from-right banner--action banner--disabled"
                                 id="submit-btn" role="button" tabindex="0">
                                <span class="banner__text">SUBMIT</span>
                            </div>
                        </div>
                    </div>
                    <div class="mystery__submitted" id="submitted-list">
                        <div class="mystery__submitted-header">Time</div>
                        ${guesses.length ? guesses.map(g => submittedRow(g, mystery.published_at, mystery.reveals_at)).join('') : waitingPlaceholderHTML()}
                    </div>
                </div>
            `;

            startCountdown(mystery, async () => {
                if (isAdminViewer) return;
                const existing = await getUserGuess(mystery.id, userId);
                if (!existing) {
                    if (isTime) {
                        const guessTime = getGuessTimeFromCurve();
                        if (!guessTime) return;
                        guessTime.detail_level = answer.detail_level;
                        const isAutoTime = !curveUserInteracted;
                        try { await submitTimeGuess(mystery.id, guessTime, answer, mystery.published_at, mystery.reveals_at, { autoGuess: isAutoTime, autoSubmit: !isAutoTime }); } catch {}
                    } else {
                        if (guessMarker) {
                            const ll = guessMarker.getLatLng();
                            try { await submitGuess(mystery.id, ll.lat, ll.lng, answer.lat, answer.lng, mystery.published_at, mystery.reveals_at, { autoSubmit: true }); } catch {}
                        } else {
                            const lat = (Math.random() * 180) - 90;
                            const lng = (Math.random() * 360) - 180;
                            try { await submitGuess(mystery.id, lat, lng, answer.lat, answer.lng, mystery.published_at, mystery.reveals_at, { autoGuess: true }); } catch {}
                        }
                    }
                }
                clearPinStorage(mystery.id);
            });

            if (isTime) {
                const mapEl = document.getElementById('guess-map-container');
                const savedTime = loadPinFromStorage(mystery.id);
                initInfinityCurve(mapEl, { detailLevel: answer.detail_level, answer, savedAlpha: savedTime?.alpha });
                mapEl.addEventListener('curvepin', () => {
                    const submitBtn = document.getElementById('submit-btn');
                    if (submitBtn) { submitBtn.classList.remove('banner--disabled'); submitBtn.classList.add('banner--pulse'); }
                    if (curvePinAlpha != null) {
                        savePinToStorage(mystery.id, { type: 'time', alpha: curvePinAlpha });
                    }
                });
                if (savedTime?.alpha != null) {
                    const submitBtn = document.getElementById('submit-btn');
                    if (submitBtn) { submitBtn.classList.remove('banner--disabled'); submitBtn.classList.add('banner--pulse'); }
                }
            } else {
                initGuessMap(mystery.id);
            }
            if (!guesses.length) startWaitingPlaceholder(mystery.published_at);

            const submitBanner = document.getElementById('submit-btn');
            if (submitBanner) {
                submitBanner.addEventListener('click', async () => {
                    if (submitBanner.classList.contains('banner--disabled')) return;
                    if (isAdminViewer) {
                        showToast('Admins cannot participate', { type: 'error' });
                        return;
                    }
                    if (isTime) {
                        const guessTime = getGuessTimeFromCurve();
                        if (!guessTime) return;
                        guessTime.detail_level = answer.detail_level;
                        setBannerLoading(submitBanner, true);
                        try {
                            await submitTimeGuess(mystery.id, guessTime, answer, mystery.published_at, mystery.reveals_at);
                            clearPinStorage(mystery.id);
                            await renderMysteryAtPosition();
                        } catch (e) {
                            showToast('Could not submit guess', { type: 'error' });
                            setBannerLoading(submitBanner, false);
                        }
                    } else {
                        if (!guessMarker) return;
                        const ll = guessMarker.getLatLng();
                        setBannerLoading(submitBanner, true);
                        try {
                            await submitGuess(mystery.id, ll.lat, ll.lng, answer.lat, answer.lng, mystery.published_at, mystery.reveals_at);
                            clearPinStorage(mystery.id);
                            await renderMysteryAtPosition();
                        } catch (e) {
                            showToast('Could not submit guess', { type: 'error' });
                            setBannerLoading(submitBanner, false);
                        }
                    }
                });
            }

            activeChannel = subscribeGuesses(mystery.id, (newGuess) => {
                removeWaitingPlaceholder();
                const list = document.getElementById('submitted-list');
                if (!list || list.querySelector(`[data-user="${newGuess.user_id}"]`)) return;
                const row = document.createElement('div');
                row.innerHTML = submittedRow(newGuess, mystery.published_at, mystery.reveals_at, true);
                list.appendChild(row.firstElementChild);
            });
        }

        function initGuessMap(mysteryId) {
            const mapEl = document.getElementById('guess-map-container');
            if (!mapEl) return;
            guessMap = L.map(mapEl, mapDefaults).setView([30, 0], 2);
            enablePinchZoom(guessMap);
            addTileLayer(guessMap);

            const gPinPx = Math.round(px(PIN_VW));
            const gPinHalf = gPinPx / 2;
            const initial = esc(firstName(profile.name).charAt(0).toUpperCase());
            const guessIcon = L.divIcon({ className: '', html: `<div class="world-pin" style="background:#000;">${initial}</div>`, iconSize: [gPinPx, gPinPx], iconAnchor: [gPinHalf, gPinHalf] });

            function saveGeoPin(latlng) {
                if (mysteryId) savePinToStorage(mysteryId, { type: 'geo', lat: latlng.lat, lng: latlng.lng });
            }

            function createGuessMarker(latlng) {
                guessMarker = L.marker(latlng, { icon: guessIcon, draggable: true }).addTo(guessMap);
                guessMarker.on('dragend', () => {
                    const pos = guessMarker.getLatLng();
                    showPinLabel(guessMap, pos);
                    saveGeoPin(pos);
                });
                guessMarker.on('click', () => {
                    showPinLabel(guessMap, guessMarker.getLatLng());
                });
            }

            function activateSubmitBtn() {
                const submitBtn = document.getElementById('submit-btn');
                if (submitBtn) { submitBtn.classList.remove('banner--disabled'); submitBtn.classList.add('banner--pulse'); }
            }

            guessMarker = null;

            const saved = mysteryId ? loadPinFromStorage(mysteryId) : null;
            if (saved && saved.type === 'geo' && saved.lat != null && saved.lng != null) {
                const ll = L.latLng(saved.lat, saved.lng);
                createGuessMarker(ll);
                guessMap.setView(ll, 4);
                activateSubmitBtn();
            }

            guessMap.on('click', (e) => {
                if (guessMarker) {
                    guessMarker.setLatLng(e.latlng);
                } else {
                    createGuessMarker(e.latlng);
                }
                showPinLabel(guessMap, e.latlng);
                saveGeoPin(e.latlng);
                activateSubmitBtn();
            });

            guessMap.on('zoomend', () => {
                if (guessMarker) guessMap.panTo(guessMarker.getLatLng());
            });

            addMapTint(mapEl);
            addZoomControls(guessMap, mapEl);
            setTimeout(() => { guessMap.invalidateSize(); enforceMinZoom(guessMap); }, 200);
        }

        // ── Next Mystery View ──

        async function renderNextView(container, type = 'next') {
            let nextInfo = null;
            try { nextInfo = await getNextMysteryInfo(season.id); } catch {}
            const nextStart = nextInfo?.published_at || null;
            const nextType = nextInfo?.type || 'location';

            const countdownText = nextStart ? (formatCountdownIn(nextStart) || '') : 'STARTING SOON!';
            const waitingImg = waitingImages[nextType] || waitingImages.location || null;

            container.innerHTML = `
                <div class="mystery">
                    ${makeHeader(type, null, countdownText)}
                    ${waitingImg ? `
                    <div class="mystery__image">
                        <img src="${esc(waitingImg)}" alt="Waiting">
                    </div>` : ''}
                </div>
            `;

            if (nextStart) {
                fixCountdownStripWidth();
                countdownInterval = setInterval(async () => {
                    const el = document.getElementById('countdown');
                    if (!el) { clearInterval(countdownInterval); countdownInterval = null; return; }
                    const text = formatCountdownIn(nextStart);
                    if (text) {
                        const prev = el.textContent;
                        el.textContent = text;
                        if (text.length !== prev.length) fixCountdownStripWidth();
                    } else {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                        showToast('New mystery available');
                        await reloadMysteries({ scrollToMystery: true });
                    }
                }, 1000);
            }
        }

        // ── Submitted (awaiting reveal) View ──

        async function renderSubmittedView(container, mystery, userGuess) {
            const guesses = await getGuesses(mystery.id);
            const isTime = mystery.type === 'time';

            container.innerHTML = `
                <div class="mystery">
                    ${makeHeader('current', mystery)}
                    ${makeImageHTML(mystery, 'Your guess')}
                    <div style="position:relative;">
                        <div class="${isTime ? 'time-curve-container' : 'mystery__map'}" id="guess-map-container"></div>
                        <div class="edge-wrapper edge-wrapper--strip edge-wrapper--from-right" style="top:auto;bottom:0;">
                            <div class="strip strip--from-right"><span class="strip__text">SUBMITTED</span></div>
                        </div>
                    </div>
                    <div class="mystery__submitted" id="submitted-list">
                        <div class="mystery__submitted-header">Time</div>
                        ${guesses.length ? guesses.map(g => submittedRow(g, mystery.published_at, mystery.reveals_at)).join('') : waitingPlaceholderHTML()}
                    </div>
                </div>
            `;

            startCountdown(mystery);
            if (isTime) {
                const guessTime = userGuess.guess;
                const mapEl = document.getElementById('guess-map-container');
                initInfinityCurve(mapEl, { detailLevel: mystery.answer?.detail_level, readonly: true, pinTime: guessTime, answer: mystery.answer });
            } else {
                initSubmittedMap(userGuess);
            }
            if (!guesses.length) startWaitingPlaceholder(mystery.published_at);

            activeChannel = subscribeGuesses(mystery.id, (newGuess) => {
                removeWaitingPlaceholder();
                const list = document.getElementById('submitted-list');
                if (!list || list.querySelector(`[data-user="${newGuess.user_id}"]`)) return;
                const row = document.createElement('div');
                row.innerHTML = submittedRow(newGuess, mystery.published_at, mystery.reveals_at, true);
                list.appendChild(row.firstElementChild);
            });
        }

        function initSubmittedMap(userGuess) {
            const mapEl = document.getElementById('guess-map-container');
            if (!mapEl) return;
            const lat = userGuess.guess_lat ?? userGuess.guess?.lat;
            const lng = userGuess.guess_lng ?? userGuess.guess?.lng;
            if (lat == null || lng == null) return;

            guessMap = L.map(mapEl, mapDefaults).setView([lat, lng], 8);
            enablePinchZoom(guessMap);
            addTileLayer(guessMap);

            const sPinPx = Math.round(px(PIN_VW));
            const sPinH = sPinPx / 2;
            const initial = esc(firstName(profile.name).charAt(0).toUpperCase());
            const icon = L.divIcon({ className: '', html: `<div class="world-pin" style="background:#000;cursor:pointer;">${initial}</div>`, iconSize: [sPinPx, sPinPx], iconAnchor: [sPinH, sPinH] });
            const submittedPin = L.marker([lat, lng], { icon }).addTo(guessMap);
            submittedPin.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                const guessLoc = userGuess.guess?.location;
                if (guessLoc && guessLoc.length) {
                    showPinLabelText(guessMap, L.latLng(lat, lng), formatLocationLabel(guessLoc));
                } else {
                    showPinLabel(guessMap, L.latLng(lat, lng));
                }
            });

            guessMap.on('zoomend', () => {
                guessMap.panTo(L.latLng(lat, lng));
            });

            addMapTint(mapEl);
            addZoomControls(guessMap, mapEl);
            setTimeout(() => { guessMap.invalidateSize(); enforceMinZoom(guessMap); }, 200);
        }

        // ── Revealed Mystery View ──

        async function renderRevealedView(container, mystery, type) {
            const answer = mystery.answer;
            const isTime = mystery.type === 'time';

            const savedPin = loadPinFromStorage(mystery.id);
            if (savedPin && !isAdminViewer) {
                const existingGuess = await getUserGuess(mystery.id, userId);
                if (existingGuess?.guess?.auto_guess === true) {
                    try {
                        if (savedPin.type === 'geo' && !isTime) {
                            await submitGuess(mystery.id, savedPin.lat, savedPin.lng, answer.lat, answer.lng, mystery.published_at, mystery.reveals_at, { autoSubmit: true });
                        } else if (savedPin.type === 'time' && isTime && savedPin.alpha != null) {
                            let tStart, tEnd;
                            if (answer.period_start && answer.period_end) {
                                tStart = timeToDecimal(answer.period_start);
                                tEnd = timeToDecimal(answer.period_end);
                            } else {
                                const ansDec = timeToDecimal(answer);
                                const period = computeCurvePeriod(ansDec);
                                tEnd = nowDecimal();
                                tStart = Math.max(-13_800_000_000, tEnd - period);
                            }
                            const ea = savedPin.alpha <= 1 ? savedPin.alpha : 2 - savedPin.alpha;
                            const dec = tStart + ea * (tEnd - tStart);
                            const guessTime = decimalToTime(dec);
                            guessTime.detail_level = answer.detail_level;
                            guessTime.lobe = savedPin.alpha > 1 ? 1 : 0;
                            await submitTimeGuess(mystery.id, guessTime, answer, mystery.published_at, mystery.reveals_at, { autoSubmit: true });
                        }
                    } catch {}
                }
                clearPinStorage(mystery.id);
            }

            const leaderboard = await getMysteryLeaderboard(mystery.id, mystery.published_at, mystery.reveals_at);
            const userEntry = isAdminViewer ? null : leaderboard.find(e => e.user_id === userId);
            let selectedEntry = userEntry || leaderboard[0] || null;

            const resultLabel = !userEntry
                ? (selectedEntry ? `${esc(firstName(selectedEntry.name))}'S RESULT` : 'NO RESULTS')
                : selectedEntry.user_id === userId ? 'YOUR RESULT' : `${esc(firstName(selectedEntry.name))}'S RESULT`;
            const scoreText = !selectedEntry ? 'SCORE: 0' : `SCORE: ${formatNumber(selectedEntry.score)}`;
            const distHeader = 'Distance';

            container.innerHTML = `
                <div class="mystery">
                    ${makeHeader(type, mystery)}
                    ${makeImageHTML(mystery, resultLabel, 'result-label')}
                    <div style="position:relative;">
                        <div class="${isTime ? 'time-curve-container' : 'mystery__map'}" id="result-map-container"></div>
                        <div class="edge-wrapper edge-wrapper--strip edge-wrapper--from-right" style="top:auto;bottom:0;">
                            <div class="strip strip--from-right"><span class="strip__text" id="score-banner-text">${scoreText}</span></div>
                        </div>
                    </div>
                    <div class="mystery__submitted mystery__submitted--revealed" id="results-table">
                        <div class="results-header">
                            <span class="results-header__col results-header__col--time">Time</span>
                            <span class="results-header__col results-header__col--distance">${distHeader}</span>
                            <span class="results-header__col results-header__col--score">Score</span>
                        </div>
                        ${leaderboard.map(e => resultRow(e, selectedEntry, isTime, isTime ? answer : null)).join('')}
                    </div>
                </div>
            `;

            if (isTime) {
                const mapEl = document.getElementById('result-map-container');
                const pinTime = selectedEntry?.guess?.year != null ? selectedEntry.guess : null;
                initInfinityCurve(mapEl, {
                    detailLevel: answer?.detail_level,
                    readonly: true,
                    pinTime,
                    answerTime: answer,
                    answer
                });
            } else if (answer?.lat != null) {
                initResultMap(answer, selectedEntry);
            }

            if (pendingRevealConfetti && type === 'latest') {
                pendingRevealConfetti = false;
                setTimeout(fireRevealConfetti, 600);
            }

            function bindResultRows() {
                document.querySelectorAll('.mystery__results-row').forEach(row => {
                    row.addEventListener('click', () => {
                        const entry = leaderboard.find(e => e.user_id === row.dataset.user);
                        if (!entry) return;
                        selectedEntry = entry;
                        if (isTime) {
                            updateTimeResultView(answer, entry);
                        } else {
                            updateResultView(answer, entry);
                        }
                        const label = document.getElementById('result-label');
                        if (label) label.scrollIntoView({ behavior: 'smooth' });
                    });
                });
            }
            bindResultRows();

            if (type === 'latest') {
                let refreshCount = 0;
                function scheduleRefresh() {
                    if (refreshCount >= 4) return;
                    revealRefreshTimer = setTimeout(async () => {
                        revealRefreshTimer = null;
                        const table = document.getElementById('results-table');
                        if (!table) return;
                        const fresh = await getMysteryLeaderboard(mystery.id, mystery.published_at, mystery.reveals_at);
                        if (fresh.length <= leaderboard.length) { refreshCount++; scheduleRefresh(); return; }
                        leaderboard.length = 0;
                        leaderboard.push(...fresh);
                        const newUserEntry = isAdminViewer ? null : leaderboard.find(e => e.user_id === userId);
                        if (!selectedEntry || (!newUserEntry && !isAdminViewer)) {
                            selectedEntry = newUserEntry || leaderboard[0] || null;
                        }
                        const headerHTML = table.querySelector('.results-header')?.outerHTML || '';
                        table.innerHTML = headerHTML + leaderboard.map(e => resultRow(e, selectedEntry, isTime, isTime ? answer : null)).join('');
                        bindResultRows();
                        const labelEl = document.getElementById('result-label');
                        if (labelEl && selectedEntry) {
                            labelEl.textContent = (!isAdminViewer && selectedEntry.user_id === userId) ? 'YOUR RESULT' : `${firstName(selectedEntry.name)}'S RESULT`;
                        }
                        const scoreEl = document.getElementById('score-banner-text');
                        if (scoreEl && selectedEntry) scoreEl.textContent = `SCORE: ${formatNumber(selectedEntry.score)}`;
                        if (selectedEntry && !isTime && answer?.lat != null) drawResultPins(answer, selectedEntry);
                        if (selectedEntry && isTime && selectedEntry.guess?.year != null) {
                            curveResultEntry = selectedEntry.guess;
                            setCurvePinFromTime(selectedEntry.guess);
                            fitCurveToBothPins();
                            showCurveDistanceFields();
                            drawCurve();
                        }
                        refreshCount++;
                        scheduleRefresh();
                    }, 10000);
                }
                scheduleRefresh();
            }
        }

        function updateTimeResultView(answer, entry) {
            const label = document.getElementById('result-label');
            if (label) label.textContent = (!isAdminViewer && entry.user_id === userId) ? 'YOUR RESULT' : `${firstName(entry.name)}'S RESULT`;
            const scoreEl = document.getElementById('score-banner-text');
            if (scoreEl) scoreEl.textContent = entry?.score != null ? `SCORE: ${formatNumber(entry.score)}` : '';
            document.querySelectorAll('.mystery__results-row').forEach(row => {
                row.classList.toggle('mystery__results-row--active', row.dataset.user === entry.user_id);
            });
            if (curveResultTimer) { clearTimeout(curveResultTimer); curveResultTimer = null; }
            curveResultMode = 'distance';
            if (entry?.guess?.year != null) {
                curveResultEntry = entry.guess;
                setCurvePinFromTime(entry.guess);
                fitCurveToBothPins();
                showCurveDistanceFields();
                drawCurve();
            }
        }

        // ── Countdown ──

        function fixCountdownStripWidth() {
            requestAnimationFrame(() => {
                const el = document.getElementById('countdown');
                if (!el) return;
                const strip = el.closest('.strip');
                if (strip) {
                    strip.style.width = '';
                    strip.style.justifyContent = '';
                    requestAnimationFrame(() => {
                        strip.style.width = (strip.offsetWidth / window.innerWidth * 100) + 'vw';
                        strip.style.justifyContent = 'flex-end';
                    });
                }
            });
        }

        function startCountdown(mystery, onExpire) {
            if (!mystery.reveals_at) return;
            fixCountdownStripWidth();
            countdownInterval = setInterval(async () => {
                const el = document.getElementById('countdown');
                if (!el) { clearInterval(countdownInterval); countdownInterval = null; return; }
                const text = formatCountdown(mystery.reveals_at);
                if (text) {
                    const prev = el.textContent;
                    el.textContent = text;
                    if (text.length !== prev.length) fixCountdownStripWidth();
                } else {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    if (onExpire) await onExpire();
                    pendingRevealConfetti = true;
                    showToast('Mystery revealed');
                    await reloadMysteries({ navigateTo: 'latest', scrollToMystery: true });
                }
            }, 1000);
        }

        // ── Result Map ──

        function initResultMap(answer, entry) {
            const mapEl = document.getElementById('result-map-container');
            if (!mapEl) return;
            resultMap = L.map(mapEl, mapDefaults).setView([answer.lat, answer.lng], 5);
            enablePinchZoom(resultMap);
            addTileLayer(resultMap);

            addMapTint(mapEl);
            addZoomControls(resultMap, mapEl);

            resultMap.on('click', () => {
                if (sabResetTimer) { clearTimeout(sabResetTimer); sabResetTimer = null; }
                if (sabMode !== 'distance' && lastResultData) resetSab(lastResultData.entry);
            });

            drawResultPins(answer, entry);
            setTimeout(() => { resultMap.invalidateSize(); enforceMinZoom(resultMap); }, 200);
        }

        function setSabContent(text) {
            if (!sabMarker) return;
            const label = sabMarker.getElement()?.querySelector('.mystery__distance-label');
            if (!label) return;
            const span = label.querySelector('span:not(.loader)');
            const loader = label.querySelector('.loader');
            if (loader) loader.remove();
            label.style.minWidth = '';
            label.style.minHeight = '';
            if (span) { span.style.display = ''; span.textContent = text; }
        }

        function setSabLoading() {
            if (!sabMarker) return;
            const label = sabMarker.getElement()?.querySelector('.mystery__distance-label');
            if (!label) return;
            label.style.minWidth = label.offsetWidth + 'px';
            label.style.minHeight = label.offsetHeight + 'px';
            const span = label.querySelector('span:not(.loader)');
            if (span) span.style.display = 'none';
            if (!label.querySelector('.loader')) {
                label.insertAdjacentHTML('beforeend', '<span class="loader loader--sab"></span>');
            }
        }

        function resetSab(entry) {
            sabMode = 'distance';
            if (!entry) return;
            setSabContent(formatDistance(entry.distance_m));
        }

        function removePinLabel() {
            if (pinLabelTimer) { clearTimeout(pinLabelTimer); pinLabelTimer = null; }
            if (pinLabelMarker) { pinLabelMarker.remove(); pinLabelMarker = null; }
        }

        let pinLabelRequestId = 0;

        function autoPanForLabel(map, latlng, pinPx) {
            requestAnimationFrame(() => {
                const labelEl = pinLabelMarker?.getElement()?.querySelector('.mystery__distance-label');
                if (!labelEl) return;
                const labelRect = labelEl.getBoundingClientRect();
                const mapContainer = map.getContainer();
                const mapRect = mapContainer.getBoundingClientRect();
                const pad = 60;
                let panX = 0, panY = 0;
                if (labelRect.right + pad > mapRect.right) panX = labelRect.right + pad - mapRect.right;
                else if (labelRect.left - pad < mapRect.left) panX = labelRect.left - pad - mapRect.left;
                const mapWrapper = mapContainer.parentElement;
                let safeTop = mapRect.top + pad;
                let safeBot = mapRect.bottom - pad;
                if (mapWrapper) {
                    for (const strip of mapWrapper.querySelectorAll('.edge-wrapper--strip, .mystery-header')) {
                        const sr = strip.getBoundingClientRect();
                        if (sr.bottom <= mapRect.top || sr.top >= mapRect.bottom) continue;
                        if (sr.top < mapRect.top + mapRect.height * 0.4)
                            safeTop = Math.max(safeTop, sr.bottom + pad);
                        else
                            safeBot = Math.min(safeBot, sr.top - pad);
                    }
                }
                if (labelRect.top < safeTop) panY = labelRect.top - safeTop;
                const pinPoint = map.latLngToContainerPoint(latlng);
                const pinBottomAbs = mapRect.top + pinPoint.y + pinPx / 2;
                if (panY === 0 && pinBottomAbs > safeBot) panY = pinBottomAbs - safeBot;
                if (panX !== 0 || panY !== 0) map.panBy([panX, panY], { animate: true, duration: 0.15 });
            });
        }

        function drawResultPins(answer, entry) {
            if (!resultMap) return;
            lastResultData = { answer, entry };
            sabMode = 'distance';
            resultMap.eachLayer(l => {
                if (l instanceof L.Marker || l instanceof L.Polyline || l instanceof L.CircleMarker) resultMap.removeLayer(l);
            });
            sabMarker = null;

            const pinPx = Math.round(px(PIN_VW));
            const pinH = pinPx / 2;
            const answerIcon = L.divIcon({ className: '', html: `<div class="world-pin world-pin--j" style="background:#BA0000;cursor:pointer;">J</div>`, iconSize: [pinPx, pinPx], iconAnchor: [pinH, pinH] });
            const answerLL = [answer.lat, answer.lng];
            const answerMarker = L.marker(answerLL, { icon: answerIcon, zIndexOffset: 500 }).addTo(resultMap);

            answerMarker.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                if (sabResetTimer) clearTimeout(sabResetTimer);
                const loc = formatLocationLabel(answer.location);
                sabMode = 'answer';
                setSabContent(loc);
                sabResetTimer = setTimeout(() => resetSab(entry), 2000);
            });

            const guessLL = [entry?.guess?.lat, entry?.guess?.lng];
            if (guessLL[0] == null) {
                resultMap.setView(answerLL, 5);
                return;
            }

            let gLng = guessLL[1];
            while (gLng - answer.lng > 180) gLng -= 360;
            while (gLng - answer.lng < -180) gLng += 360;
            guessLL[1] = gLng;

            const guessInitial = esc(firstName(entry.name).charAt(0).toUpperCase());
            const guessIcon = L.divIcon({ className: '', html: `<div class="world-pin" style="background:#000;cursor:pointer;">${guessInitial}</div>`, iconSize: [pinPx, pinPx], iconAnchor: [pinH, pinH] });
            const guessMarkerResult = L.marker(guessLL, { icon: guessIcon, zIndexOffset: 500 }).addTo(resultMap);

            guessMarkerResult.on('click', async (e) => {
                L.DomEvent.stopPropagation(e);
                if (sabResetTimer) clearTimeout(sabResetTimer);
                const guess = entry.guess;
                if (guess && (!guess.location || !guess.location.length) && guess.lat != null) {
                    sabMode = 'guess';
                    setSabLoading();
                    guess.location = await reverseGeocode(guess.lat, guess.lng);
                }
                sabMode = 'guess';
                setSabContent(formatLocationLabel(guess?.location));
                sabResetTimer = setTimeout(() => resetSab(entry), 2000);
            });

            const w = px(LINE_WEIGHT_VW);
            const d = `${px(LINE_DASH_VW)},${px(LINE_GAP_VW)}`;
            L.polyline([guessLL, answerLL], { color: '#fff', weight: w, dashArray: d, lineCap: 'butt' }).addTo(resultMap);

            const pA = L.CRS.EPSG3857.project(L.latLng(answerLL[0], answerLL[1]));
            const pG = L.CRS.EPSG3857.project(L.latLng(guessLL[0], guessLL[1]));
            const midProjected = L.point((pA.x + pG.x) / 2, (pA.y + pG.y) / 2);
            const midLL = L.CRS.EPSG3857.unproject(midProjected);
            sabMarker = L.marker([midLL.lat, midLL.lng], {
                icon: L.divIcon({
                    className: 'mystery__distance-wrapper',
                    html: `<div class="mystery__distance-label mystery__distance-label--interactive"><span>${formatDistance(entry.distance_m)}</span></div>`,
                    iconSize: [0, 0],
                    iconAnchor: [0, 0]
                }),
                zIndexOffset: 1000
            }).addTo(resultMap);

            sabMarker.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                if (sabResetTimer) { clearTimeout(sabResetTimer); sabResetTimer = null; }
                if (sabMode !== 'distance') resetSab(entry);
            });

            const metersPerPx = (z) => 156543.03 * Math.cos(midLL.lat * Math.PI / 180) / Math.pow(2, z);
            let idealZoom = 22;
            while (idealZoom > 2 && entry.distance_m / metersPerPx(idealZoom) < 140) idealZoom--;

            lastResultFit = { bounds: L.latLngBounds([answerLL, guessLL]), maxZoom: idealZoom };
            fitResultMap();
        }

        function fitResultMap() {
            if (!resultMap || !lastResultFit) return;
            const vw = window.innerWidth / 100;

            resultMap.fitBounds(lastResultFit.bounds, {

        async function reloadMysteries(opts = {}) {
            if (!season || isReloading) return;
            isReloading = true;
            try {
                const prevMysteryId = navItems[navPos]?.mystery?.id;
                const prevType = navItems[navPos]?.type;

                mysteries = await getSeasonMysteries(season.id);
                currentMystery = getCurrentMystery(mysteries);
                revealedMysteries = getRevealedMysteries(mysteries);

                const wasActive = season.active || season.ending;
                if (wasActive && !currentMystery && revealedMysteries.length) {
                    const ended = await checkSeasonAutoEnd(season.id);
                    if (ended) {
                        season.active = false;
                        season.ending = false;
                    }
                }

                preloadAllMysteryImages();
                await buildNavItems();

                if (opts.navigateTo) {
                    const idx = navItems.findIndex(n => n.type === opts.navigateTo);
                    if (idx >= 0) navPos = idx;
                } else if (opts.preserveNav) {
                    const newCurrentAppeared = currentMystery && prevType !== 'current';
                    if (!newCurrentAppeared) {
                        if (prevMysteryId) {
                            const idx = navItems.findIndex(n => n.mystery?.id === prevMysteryId);
                            if (idx >= 0) navPos = idx;
                        } else if (prevType === 'next') {
                            const idx = navItems.findIndex(n => n.type === 'next');
                            if (idx >= 0) navPos = idx;
                        }
                    }
                }

                await renderMysteryAtPosition();
                renderWinners();
                await renderLeaderboard();
                await renderPastMysteries();
                populateStats();
                updateBottomPadding();

                if (opts.scrollToMystery) {
                    requestAnimationFrame(() => {
                        const pad = Math.round(px(2));
                        let target = null;
                        if (opts.navigateTo === 'latest') {
                            const labelEl = document.getElementById('result-label');
                            target = labelEl?.closest('.edge-wrapper') || labelEl;
                        }
                        if (!target) {
                            target = document.querySelector('#mystery-content .banner--top');
                        }
                        if (target) {
                            const y = target.getBoundingClientRect().top + window.scrollY - pad;
                            window.scrollTo({ top: y, behavior: 'smooth' });
                        }
                    });
                }

                if (wasActive && !season.active && !currentMystery) {
                    showToast('Winners ready!');
                    requestAnimationFrame(() => {
                        const pad = Math.round(px(2));
                        const target = document.querySelector('#winners-section .banner--top');
                        if (target) {
                            const y = target.getBoundingClientRect().top + window.scrollY - pad;
                            window.scrollTo({ top: y, behavior: 'smooth' });
                        }
                    });
                }
            } finally {
                isReloading = false;
            }
        }

        let worldTimeMaxZoom = 5e10;

        let worldTimeLabelTimer = null;

        function removeWorldTimeLabel() {

        function updateWorldTimeLabelPos(container, sp) {

        function showWorldTimeLabel(container, x, y, answer, pinIdx) {
            removeWorldTimeLabel();
            const display = formatTimeDisplay(answer, answer.detail_level || 'year');
            let text = display.date ? display.date + ', ' : '';
            text += display.year;
            if (display.time) text += ', ' + display.time;
            const pinPx = Math.round(px(PIN_VW));

            const label = document.createElement('div');

            label.innerHTML = `<div class="mystery__distance-label"><span>${esc(text)}</span></div>`;
            container.appendChild(label);
            worldTimeLabelPinIdx = pinIdx;

            requestAnimationFrame(() => {
                const innerLabel = label.querySelector('.mystery__distance-label');
                if (!innerLabel) return;
                const labelRect = innerLabel.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                const pad = 60;
                let shiftPxX = 0, shiftPxY = 0;
                if (labelRect.right + pad > containerRect.right) shiftPxX = labelRect.right + pad - containerRect.right;
                else if (labelRect.left - pad < containerRect.left) shiftPxX = labelRect.left - pad - containerRect.left;
                const parentMystery = container.closest('.mystery');
                const topStrip = parentMystery?.querySelector('.mystery-header');
                const botStrip = parentMystery?.querySelector('.edge-wrapper--strip');
                const safeTop = topStrip ? topStrip.getBoundingClientRect().bottom + pad : containerRect.top + pad;
                const safeBot = botStrip ? botStrip.getBoundingClientRect().top - pad : containerRect.bottom - pad;
                if (labelRect.top < safeTop) shiftPxY = labelRect.top - safeTop;
                const pinBottomAbs = containerRect.top + y + pinPx / 2;
                if (shiftPxY === 0 && pinBottomAbs > safeBot) shiftPxY = pinBottomAbs - safeBot;
                if (shiftPxX !== 0 || shiftPxY !== 0) {
                    const dpr = window.devicePixelRatio || 1;
                    const w = worldTimeCanvas.width / dpr;
                    const h = worldTimeCanvas.height / dpr;
                    const bpad = Math.min(w, h) * 0.08;
                    const baseScale = Math.min((w - 2 * bpad) / 2, (h - 2 * bpad));
                    const scale = baseScale * worldTimeZoom;
                    const targetPanX = worldTimePanX + shiftPxX / scale;
                    const targetPanY = worldTimePanY - shiftPxY / scale;
                    const startPanX = worldTimePanX;
                    const startPanY = worldTimePanY;
                    const duration = 150;
                    const startTime = performance.now();
                    function animatePan(now) {
                        const t = Math.min(1, (now - startTime) / duration);
                        const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                        worldTimePanX = startPanX + (targetPanX - startPanX) * ease;
                        worldTimePanY = startPanY + (targetPanY - startPanY) * ease;
                        drawWorldTimeCurve();
                        if (t < 1) requestAnimationFrame(animatePan);
                    }
                    requestAnimationFrame(animatePan);
                }
            });

            worldTimeLabelTimer = setTimeout(removeWorldTimeLabel, 2000);
        }

        function drawWorldTimeCurve() {
            if (!worldTimeCanvas || !worldTimeCtx) return;
            const dpr = window.devicePixelRatio || 1;
            const container = worldTimeCanvas.parentElement;
            const rect = container.getBoundingClientRect();
            worldTimeCanvas.width = rect.width * dpr;
            worldTimeCanvas.height = rect.height * dpr;
            worldTimeCanvas.style.width = rect.width + 'px';
            worldTimeCanvas.style.height = rect.height + 'px';
            const ctx = worldTimeCtx;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, rect.width, rect.height);

            const w = rect.width, h = rect.height;
            const zoom = worldTimeZoom;
            const vx = worldTimePanX, vy = worldTimePanY;
            const maxZoom = worldTimeMaxZoom;

            const zoomFrac = Math.log(zoom) / Math.log(maxZoom);
            const vwScale = w / 800;
            const spreadPx = (14 + Math.pow(zoomFrac, 0.8) * 284) * vwScale;

            const pad = Math.min(w, h) * 0.08;
            const baseScale = Math.min((w - 2 * pad) / 2, (h - 2 * pad));
            if (baseScale <= 0 || !isFinite(zoom)) return;
            const scale = baseScale * zoom;
            const tileSize = 256 / scale;
            if (tileSize <= 0 || !isFinite(tileSize)) return;
            const tileStartX = Math.floor((vx - w / 2 / scale) / tileSize) * tileSize;
            const tileStartY = Math.floor((vy - h / 2 / scale) / tileSize) * tileSize;
            const tileEndX = Math.ceil((vx + w / 2 / scale) / tileSize) * tileSize;
            const tileEndY = Math.ceil((vy + h / 2 / scale) / tileSize) * tileSize;

            function tileHash(ix, iy) {
                let h = (ix * 374761393 + iy * 668265263) | 0;
                h = ((h ^ (h >> 13)) * 1274126177) | 0;
                return ((h ^ (h >> 16)) & 0x7fffffff) / 0x7fffffff;
            }

            for (let gx = tileStartX; gx <= tileEndX; gx += tileSize) {
                for (let gy = tileStartY; gy <= tileEndY; gy += tileSize) {
                    const sx = w / 2 + (gx - vx) * scale;
                    const sy = h * CURVE_Y_CENTER - (gy - vy) * scale;
                    const tw = tileSize * scale;
                    const th = tileSize * scale;
                    const v = tileHash(Math.round(gx / tileSize), Math.round(gy / tileSize));
                    const lum = (v - 0.5) * 0.02;
                    if (lum > 0) ctx.fillStyle = `rgba(120,180,230,${lum})`;
                    else ctx.fillStyle = `rgba(0,10,40,${-lum})`;
                    ctx.fillRect(sx, sy - th, tw, th);
                }
            }

            for (let gx = tileStartX; ; gx += tileSize) {
                const sx = w / 2 + (gx - vx) * scale;
                if (sx > w + 1) break;
                if (sx < -1) continue;
                const lineHash = tileHash(Math.round(gx / tileSize), 99999);
                ctx.strokeStyle = `rgba(80, 150, 210, ${0.13 + lineHash * 0.09})`;
                ctx.lineWidth = 0.6 + lineHash * 0.4;
                ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, h); ctx.stroke();
            }
            for (let gy = tileStartY; ; gy += tileSize) {
                const sy = h * CURVE_Y_CENTER - (gy - vy) * scale;
                if (sy < -1) break;
                if (sy > h + 1) continue;
                const lineHash = tileHash(99999, Math.round(gy / tileSize));
                ctx.strokeStyle = `rgba(80, 150, 210, ${0.13 + lineHash * 0.09})`;
                ctx.lineWidth = 0.6 + lineHash * 0.4;
                ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(w, sy); ctx.stroke();
            }

            const pinPosPx = pastTimeMysteries.map(pin => {
                const t = (3 * Math.PI / 2) + pin.fraction * 2 * Math.PI;
                const sin2 = Math.sin(t) ** 2;
                const px2 = Math.cos(t) / (1 + sin2);
                const py2 = Math.sin(t) * Math.cos(t) / (1 + sin2);
                return curveToScreen(px2, py2, w, h, zoom, vx, vy);
            });
            const pinPosArg = pinPosPx.length ? pinPosPx : null;

            if (zoom <= 2) {
                const fullPts = [];
                for (let i = 0; i <= CURVE_DRAW_PTS; i++) {
                    const frac = i / CURVE_DRAW_PTS;
                    const t = frac * 2 * Math.PI;
                    const sin2 = Math.sin(t) ** 2;
                    fullPts.push({ x: Math.cos(t) / (1 + sin2), y: Math.sin(t) * Math.cos(t) / (1 + sin2), t: frac });
                }
                for (let s = 0; s < NUM_STRANDS; s++) {
                    const seed = s * 137.5;
                    const screenPts = offsetCurveScreen(fullPts, seed, spreadPx, w, h, zoom, vx, vy, pinPosArg);
                    ctx.strokeStyle = STREAM_COLORS[s % STREAM_COLORS.length];
                    const thick = (0.15 + (Math.sin(seed * 1.13) * 0.5 + 0.5) * 1.6 + zoomFrac * 0.7) * vwScale;
                    ctx.lineWidth = thick;
                    drawScreenStroke(ctx, screenPts, w);
                }
            } else {
                const SCAN_PTS = 400;
                let viewA = 0, viewD = Infinity, viewOnLeft = false;
                for (let i = 0; i <= SCAN_PTS; i++) {
                    const a = i / SCAN_PTS;
                    const ptR = curvePointFromAlpha(a);
                    const dR = (ptR.x - vx) ** 2 + (ptR.y - vy) ** 2;
                    if (dR < viewD) { viewD = dR; viewA = a; viewOnLeft = false; }
                    const ptL = leftLobePoint(a);
                    const dL = (ptL.x - vx) ** 2 + (ptL.y - vy) ** 2;
                    if (dL < viewD) { viewD = dL; viewA = a; viewOnLeft = true; }
                }
                let refMin = Math.max(0, viewA - 1 / SCAN_PTS);
                let refMax = Math.min(1, viewA + 1 / SCAN_PTS);
                for (let r = 0; r < 4; r++) {
                    const step = (refMax - refMin) / 50;
                    let bestA = viewA, bestD = viewD, bestLeft = viewOnLeft;
                    for (let i = 0; i <= 50; i++) {
                        const a = refMin + step * i;
                        const ptR = curvePointFromAlpha(a);
                        const dR = (ptR.x - vx) ** 2 + (ptR.y - vy) ** 2;
                        if (dR < bestD) { bestD = dR; bestA = a; bestLeft = false; }
                        const ptL = leftLobePoint(a);
                        const dL = (ptL.x - vx) ** 2 + (ptL.y - vy) ** 2;
                        if (dL < bestD) { bestD = dL; bestA = a; bestLeft = true; }
                    }
                    viewA = bestA; viewD = bestD; viewOnLeft = bestLeft;
                    refMin = Math.max(0, viewA - step);
                    refMax = Math.min(1, viewA + step);
                }
                const visAlphaHalf = Math.min(1.0, 5 / zoom);
                const aMin = Math.max(0, viewA - visAlphaHalf);
                const aMax = Math.min(1, viewA + visAlphaHalf);
                const primaryFn = viewOnLeft ? leftLobePoint : curvePointFromAlpha;
                const mirrorFn = viewOnLeft ? curvePointFromAlpha : leftLobePoint;
                const primaryTBase = viewOnLeft ? 0.5 : 0;
                const mirrorTBase = viewOnLeft ? 0 : 0.5;
                const detailPrimary = [];
                for (let i = 0; i <= CURVE_DRAW_PTS; i++) {
                    const alpha = aMin + (aMax - aMin) * i / CURVE_DRAW_PTS;
                    const pt = primaryFn(alpha);
                    pt.t = primaryTBase + alpha * 0.5;
                    detailPrimary.push(pt);
                }
                const mMin = 1 - aMax, mMax = 1 - aMin;
                const detailMirror = [];
                for (let i = 0; i <= CURVE_DRAW_PTS; i++) {
                    const alpha = mMin + (mMax - mMin) * i / CURVE_DRAW_PTS;
                    const pt = mirrorFn(alpha);
                    pt.t = mirrorTBase + alpha * 0.5;
                    detailMirror.push(pt);
                }
                for (let s = 0; s < NUM_STRANDS; s++) {
                    const seed = s * 137.5;
                    ctx.strokeStyle = STREAM_COLORS[s % STREAM_COLORS.length];
                    const thick = (0.15 + (Math.sin(seed * 1.13) * 0.5 + 0.5) * 1.6 + zoomFrac * 0.7) * vwScale;
                    ctx.lineWidth = thick;
                    const sP = offsetCurveScreen(detailPrimary, seed, spreadPx, w, h, zoom, vx, vy, pinPosArg);
                    drawScreenStroke(ctx, sP, w);
                    const sM = offsetCurveScreen(detailMirror, seed, spreadPx, w, h, zoom, vx, vy, pinPosArg);
                    drawScreenStroke(ctx, sM, w);
                }
            }

            container.querySelectorAll('.world-time-pin').forEach(el => el.remove());
            pastTimeMysteries.forEach((pin, idx) => {
                const sp = pinPosPx[idx];
                const el = document.createElement('div');
                el.className = 'world-time-pin';
                el.style.cssText = `position:absolute;left:${sp.sx}px;top:${sp.sy}px;transform:translate(-50%,-50%);z-index:10;cursor:pointer;`;
                el.innerHTML = `<div class="world-pin">${pin.num}</div>`;
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showWorldTimeLabel(container, sp.sx, sp.sy, pin.answer, idx);
                });
                container.appendChild(el);
            });

            if (worldTimeLabelPinIdx >= 0 && worldTimeLabelPinIdx < pinPosPx.length) {

        async function renderPastMysteries() {

            const allRevealed = [...revealedMysteries].reverse();

            allRevealed.forEach((m, i) => {

                if (m.type === 'time') pastTimeMysteries.push({ ...m, num });
                else pastGeoMysteries.push({ ...m, num });
            });

            const hasGeo = pastGeoMysteries.length > 0;
            const hasTime = pastTimeMysteries.length > 0;


            pastViewTypes = [];
            const typeOrder = [];
            for (const m of allRevealed) {
                const t = m.type === 'time' ? 'time' : 'geo';
                if (!typeOrder.includes(t)) typeOrder.push(t);
            }
            pastViewTypes = typeOrder;
            pastViewPos = 0;

            if (hasTime) {
                const nd = nowDecimal();
                const answerDecimals = pastTimeMysteries.map(m => {
                    const dec = timeToDecimal(m.answer);
                    return { dec, num: m.num, mysteryId: m.id, answer: m.answer, distFromNow: Math.abs(dec - nd) };
                });
                answerDecimals.sort((a, b) => a.distFromNow - b.distFromNow);
                const maxDist = answerDecimals[answerDecimals.length - 1]?.distFromNow || 100;
                const period = Math.max(100, maxDist * 2);
                worldTimeMaxZoom = Math.max(10, period);
                const PIN_START = 0.035, PIN_END = 0.965;
                if (answerDecimals.length === 1) {
                    pastTimeMysteries = [{ fraction: PIN_START, num: answerDecimals[0].num, mysteryId: answerDecimals[0].mysteryId, answer: answerDecimals[0].answer }];
                } else {
                    const minD = answerDecimals[0].distFromNow;
                    const maxD = answerDecimals[answerDecimals.length - 1].distFromNow;
                    const range = maxD - minD;
                    pastTimeMysteries = answerDecimals.map(item => ({
                        fraction: range === 0 ? PIN_START : PIN_START + ((item.distFromNow - minD) / range) * (PIN_END - PIN_START),
                        num: item.num,
                        mysteryId: item.mysteryId,
                        answer: item.answer
                    }));
                }
            }

            container.innerHTML = `
                <div class="mystery" style="width: var(--card-width);">

            renderPastView();

        function initWorldTimeCurveView() {
            const containerEl = document.getElementById('world-time-container');
            if (!containerEl) return;
            worldTimeCanvas = containerEl.querySelector('.world-time-canvas');
            worldTimeCtx = worldTimeCanvas.getContext('2d');
            worldTimePanX = 0;
            worldTimePanY = 0;

            if (pastTimeMysteries.length <= 1) {
                worldTimeZoom = 2.5;
            } else {
                const pinCurveCoords = pastTimeMysteries.map(pin => {
                    const t = (3 * Math.PI / 2) + pin.fraction * 2 * Math.PI;
                    const sin2 = Math.sin(t) ** 2;
                    return { x: Math.cos(t) / (1 + sin2), y: Math.sin(t) * Math.cos(t) / (1 + sin2) };
                });
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                for (const p of pinCurveCoords) {
                    if (p.x < minX) minX = p.x;
                    if (p.x > maxX) maxX = p.x;
                    if (p.y < minY) minY = p.y;
                    if (p.y > maxY) maxY = p.y;
                }
                const rect = containerEl.getBoundingClientRect();
                const w = rect.width, h = rect.height;
                if (w <= 0 || h <= 0) {
                    worldTimeZoom = 1.5;
                } else {
                    const viewPad = Math.min(w, h) * 0.08;
                    const baseScale = Math.min((w - 2 * viewPad) / 2, (h - 2 * viewPad));
                    if (baseScale <= 0) {
                        worldTimeZoom = 1.5;
                    } else {
                        const fitPad = Math.min(w, h) * 0.2;
                        const spanX = (maxX - minX) || 0.1;
                        const spanY = (maxY - minY) || 0.1;
                        const zoomX = (w - 2 * fitPad) / (spanX * baseScale);
                        const zoomY = (h - 2 * fitPad) / (spanY * baseScale);
                        worldTimeZoom = Math.max(1.5, Math.min(Math.min(zoomX, zoomY), worldTimeMaxZoom));
                    }
                    worldTimePanX = (minX + maxX) / 2;
                    worldTimePanY = (minY + maxY) / 2;
                }
            }

            let wtDragged = false, wtStartX = 0, wtStartY = 0, wtPointerId = -1;
            containerEl.addEventListener('pointerdown', (e) => {
                worldTimePanning = true;
                wtDragged = false;
                wtPointerId = e.pointerId;
                wtStartX = e.clientX;
                wtStartY = e.clientY;
                worldTimePanLastX = e.clientX;
                worldTimePanLastY = e.clientY;
            });
            containerEl.addEventListener('pointermove', (e) => {
                if (!worldTimePanning) return;
                const movedX = e.clientX - wtStartX;
                const movedY = e.clientY - wtStartY;
                if (!wtDragged && movedX * movedX + movedY * movedY > 25) {
                    wtDragged = true;
                    containerEl.setPointerCapture(wtPointerId);
                    containerEl.style.cursor = 'grabbing';
                }
                if (!wtDragged) return;
                const dpr = window.devicePixelRatio || 1;
                const w = worldTimeCanvas.width / dpr;
                const h = worldTimeCanvas.height / dpr;
                const pad = Math.min(w, h) * 0.08;
                const baseScale = Math.min((w - 2 * pad) / 2, (h - 2 * pad));
                const scale = baseScale * worldTimeZoom;
                const dx = e.clientX - worldTimePanLastX;
                const dy = e.clientY - worldTimePanLastY;
                worldTimePanX -= dx / scale;
                worldTimePanY += dy / scale;
                worldTimePanLastX = e.clientX;
                worldTimePanLastY = e.clientY;
                drawWorldTimeCurve();
            });
            containerEl.addEventListener('pointerup', () => {
                worldTimePanning = false;
                containerEl.style.cursor = 'grab';
            });
            containerEl.addEventListener('pointercancel', () => {
                worldTimePanning = false;
                containerEl.style.cursor = 'grab';
            });
            containerEl.style.cursor = 'grab';
            containerEl.style.touchAction = 'none';

            containerEl.addEventListener('wheel', (e) => {
                if (!e.ctrlKey && !e.metaKey) return;
                e.preventDefault();
                const oldZ = worldTimeZoom;
                if (e.deltaY < 0) worldTimeZoom = Math.min(worldTimeMaxZoom, worldTimeZoom * 1.08);
                else worldTimeZoom = Math.max(1.5, worldTimeZoom / 1.08);
                if (worldTimeZoom !== oldZ) drawWorldTimeCurve();
            }, { passive: false });

            const ctrl = document.createElement('div');
            ctrl.className = 'map-zoom map-zoom--top-left';
            ctrl.innerHTML = `<button class="map-zoom__btn" data-dir="in">+</button><button class="map-zoom__btn" data-dir="out">&minus;</button>`;
            containerEl.appendChild(ctrl);
            ctrl.addEventListener('pointerdown', (e) => e.stopPropagation());
            ctrl.querySelectorAll('.map-zoom__btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const oldZ = worldTimeZoom;
                    if (btn.dataset.dir === 'in') worldTimeZoom = Math.min(worldTimeMaxZoom, worldTimeZoom * 1.5);
                    else worldTimeZoom = Math.max(1.5, worldTimeZoom / 1.5);
                    if (worldTimeZoom !== oldZ) drawWorldTimeCurve();
                });
            });

            drawWorldTimeCurve();
        }

        function initWorldGeoMap(geoMysteries) {
            const mapEl = document.getElementById('world-map-container');
            if (!mapEl) return;
            worldMap = L.map(mapEl, mapDefaults).setView([20, 0], 2);
            enablePinchZoom(worldMap);
            addTileLayer(worldMap);
            addMapTint(mapEl);

            const rawPoints = geoMysteries.map(m => [m.answer.lat, m.answer.lng]);
            const points = [rawPoints[0]];
            for (let i = 1; i < rawPoints.length; i++) {
                let lng = rawPoints[i][1];
                const prevLng = points[i - 1][1];
                while (lng - prevLng > 180) lng -= 360;
                while (lng - prevLng < -180) lng += 360;
                points.push([rawPoints[i][0], lng]);
            }

            let dataBounds = null;
            const wLnW = px(LINE_WEIGHT_VW);
            const wDash = `${px(LINE_DASH_VW)},${px(LINE_GAP_VW)}`;
            if (points.length > 1) {
                for (let i = 0; i < points.length - 1; i++) {
                    L.polyline([points[i], points[i + 1]], {
                        color: '#fff', weight: wLnW, dashArray: wDash, lineCap: 'butt', opacity: 1
                    }).addTo(worldMap);
                }
                dataBounds = L.latLngBounds(points);
            }

            const wPinPx = Math.round(px(PIN_VW));
            const wPinH = wPinPx / 2;
            geoMysteries.forEach((m, i) => {
                const pinIcon = L.divIcon({
                    className: '',
                    html: `<div class="world-pin">${m.num}</div>`,
                    iconSize: [wPinPx, wPinPx],
                    iconAnchor: [wPinH, wPinH]
                });
                const marker = L.marker(points[i], { icon: pinIcon, zIndexOffset: 500 }).addTo(worldMap);
                marker.on('click', () => {
                    const loc = m.answer?.location ? formatLocationLabel(m.answer.location) : 'Unknown';
                    showPinLabelText(worldMap, L.latLng(points[i][0], points[i][1]), loc);
                });
            });

            addWorldZoomControls(worldMap, mapEl);

            lastWorldFit = dataBounds;
            function fitWorldMap() {
                if (!worldMap || !lastWorldFit) return;
                const vw = window.innerWidth / 100;
                const headerOverlap = (8.2 / 2 + 6.5 * 0.84) * vw;
                const stripHeight = 6.5 * 0.84 * vw;
                worldMap.invalidateSize();
                worldMap.fitBounds(lastWorldFit, {
                    paddingTopLeft: [30, headerOverlap + 45],
                    paddingBottomRight: [30, stripHeight + 45]
                });
                const center = lastWorldFit.getCenter();
                worldMap.setMaxBounds([[-85, center.lng - 360], [85, center.lng + 360]]);
            }
            setTimeout(() => { fitWorldMap(); enforceMinZoom(worldMap); }, 100);
            setTimeout(() => { fitWorldMap(); enforceMinZoom(worldMap); }, 400);
        }

        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        function waitForVisible(el) {
            return new Promise(resolve => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        observer.disconnect();
                        resolve();
                    }
                }, { threshold: 0.3 });
                observer.observe(el);
            });
        }

        const CONFETTI_COLORS = ['#000000', '#FFFFFF', '#BA0000', '#000540', '#F4BD41', '#00478a', '#933000', '#6a1001'];

        function fireRevealConfetti() {
            const mapEl = document.getElementById('result-map-container');
            if (!mapEl || typeof confetti !== 'function') return;
            const jPin = mapEl.querySelector('.world-pin--j');
            if (!jPin) return;
            const pinRect = jPin.getBoundingClientRect();
            const cx = (pinRect.left + pinRect.right) / 2;
            const cy = (pinRect.top + pinRect.bottom) / 2;
            const originX = cx / window.innerWidth;
            const originY = cy / window.innerHeight;
            const toRight = cx < window.innerWidth / 2;
            const angle = toRight ? 0 : 180;
            const defaults = { origin: { x: originX, y: originY }, angle, colors: CONFETTI_COLORS, scalar: 1.4, drift: 0, ticks: 400 };
            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, { particleCount: Math.floor(200 * particleRatio) }));
            }
            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.95, scalar: 1.1 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.95, scalar: 1.7 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }

        function fireConfetti(bannerEl, fromLeft) {
            if (typeof confetti !== 'function') return;
            const rect = bannerEl.getBoundingClientRect();
            const originX = fromLeft ? 0 : 1;
            const originY = (rect.top + rect.height / 2) / window.innerHeight;
            const angle = fromLeft ? 45 : 135;
            const defaults = { origin: { x: originX, y: originY }, angle, colors: CONFETTI_COLORS, scalar: 1.4, drift: 0, ticks: 400 };

            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(200 * particleRatio),
                }));
            }
            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.95, scalar: 1.1 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.95, scalar: 1.7 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }

        function startConfettiLoop() {
            if (confettiInterval) clearInterval(confettiInterval);
            const banners = document.querySelectorAll('.winners-banner--name');
            if (!banners.length) return;
            confettiInterval = setInterval(() => {
                const idx = Math.floor(Math.random() * banners.length);
                const b = banners[idx];
                const fromLeft = b.closest('.winners-category')?.classList.contains('winners-category--right') === false;
                fireConfetti(b, fromLeft);
            }, 1500);
        }

        async function animateWinners() {
            const body = document.querySelector('.winners-body');
            if (!body) return;

            const categories = body.querySelectorAll('.winners-category');
            await wait(750);

            for (const cat of categories) {
                const fromLeft = !cat.classList.contains('winners-category--right');
                const anims = cat.querySelectorAll('.winners-anim');
                const stripWrap = anims[0];
                const bannerWrap = fromLeft ? anims[1] : anims[2];
                const valueWrap = fromLeft ? anims[2] : anims[1];

                if (stripWrap) stripWrap.classList.add('revealed');
                await wait(1500);

                if (bannerWrap) {
                    bannerWrap.classList.add('revealed');
                    const banner = cat.querySelector('.winners-banner--name');
                    if (banner) fireConfetti(banner, fromLeft);
                }
                await wait(500);

                if (valueWrap) valueWrap.classList.add('revealed');
                await wait(1750);
            }

            startConfettiLoop();
        }

        async function populateStats() {
            if (!season) return;
            const board = cachedLeaderboard || await getSeasonLeaderboard(season.id);
            const myEntry = board.find(e => e.user_id === userId);

            function setField(name, value) {
                const field = document.querySelector(`wheff-field[name="${name}"]`);
                if (!field) return;
                const waitForInput = () => {
                    const input = field.querySelector('.field__input');
                    if (!input) return setTimeout(waitForInput, 100);
                    input.value = value;
                };
                waitForInput();
            }

            setField('total_score', formatNumber(myEntry?.total_score ?? 0));
            setField('wins', myEntry?.wins ?? 0);
            const karma = myEntry?.jeff_karma ?? 0;
            setField('jeff_karma', (karma > 0 ? '+' : '') + formatNumber(karma));
        }

        // ── Map Tint ──

        function addMapTint(el) {
            const pane = el.querySelector('.leaflet-map-pane');
            if (!pane) return;
            const tint = document.createElement('div');
            tint.className = 'map-tint';
            pane.appendChild(tint);
        }

        function addWorldZoomControls(map, mapEl) {
            const ctrl = document.createElement('div');
            ctrl.className = 'map-zoom map-zoom--top-left';
            ctrl.innerHTML = `<button class="map-zoom__btn" data-dir="in">+</button><button class="map-zoom__btn" data-dir="out">&minus;</button>`;
            mapEl.appendChild(ctrl);
            L.DomEvent.disableClickPropagation(ctrl);
            L.DomEvent.disableScrollPropagation(ctrl);
            ctrl.querySelectorAll('.map-zoom__btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.dataset.dir === 'in') map.zoomIn();
                    else map.zoomOut();
                });
            });
        }

        function addZoomControls(map, mapEl) {
            const ctrl = document.createElement('div');
            ctrl.className = 'map-zoom';
            ctrl.innerHTML = `<button class="map-zoom__btn" data-dir="in">+</button><button class="map-zoom__btn" data-dir="out">&minus;</button>`;
            mapEl.appendChild(ctrl);
            L.DomEvent.disableClickPropagation(ctrl);
            L.DomEvent.disableScrollPropagation(ctrl);
            ctrl.querySelectorAll('.map-zoom__btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.dataset.dir === 'in') map.zoomIn();
                    else map.zoomOut();
                });
            });
        }

        // ── HTML Helpers ──

        function resultRow(entry, selectedEntry, isTime = false, answer = null) {
            const isActive = entry.user_id === selectedEntry?.user_id;
            let distText;
            if (isTime && answer && entry.guess?.year != null) {
                const yearsDiff = effectiveTimeDiff(entry.guess, answer);
                distText = formatTimeDifferenceShort(yearsDiff);
            } else {
                distText = isTime ? formatTimeDifferenceShort(entry.distance_m) : formatDistanceShort(entry.distance_m);
            }
            const diceIcon = entry.is_auto ? `<span class="dice-icon">${DICE_SVG}</span>` : '';
            return `
                <div class="mystery__submitted-row mystery__results-row ${isActive ? 'mystery__results-row--active' : ''}" data-user="${entry.user_id}">
                    <div class="results-strip">
                        <div class="submitted-strip__bg"></div>
                        <span class="results-strip__col results-strip__col--time">${entry.time}</span>
                        <span class="results-strip__col results-strip__col--distance">${distText}${diceIcon}</span>
                        <span class="results-strip__col results-strip__col--score">${formatNumber(entry.score)}</span>
                    </div>
                    <span class="mystery__submitted-name">${esc(firstName(entry.name))}</span>
                </div>`;
        }

        function startWaitingPlaceholder(publishedAt) {
            if (waitingInterval) clearInterval(waitingInterval);
            const el = document.getElementById('waiting-placeholder-time');
            if (!el) return;
            const update = () => { el.textContent = formatTimeAgo(new Date().toISOString(), publishedAt); };
            update();
            waitingInterval = setInterval(update, 1000);
        }

        function removeWaitingPlaceholder() {
            const ph = document.getElementById('waiting-placeholder');
            if (ph) ph.remove();
            if (waitingInterval) { clearInterval(waitingInterval); waitingInterval = null; }
        }

        function waitingPlaceholderHTML() {
            return `
                <div class="mystery__submitted-row" id="waiting-placeholder">
                    <div class="submitted-strip">
                        <div class="submitted-strip__bg"></div>
                        <span class="submitted-strip__time" id="waiting-placeholder-time"></span>
                    </div>
                    <span class="mystery__submitted-name">Waiting for first guess...</span>
                </div>`;
        }

        function submittedRow(guess, publishedAt, revealsAt, isNew = false) {
            const name = esc(firstName(guess.profiles?.name));
            const time = formatTimeAgo(guess.submitted_at, publishedAt);
            return `
                <div class="mystery__submitted-row ${isNew ? 'mystery__submitted-row--new' : ''}" data-user="${guess.user_id}">
                    <div class="submitted-strip">
                        <div class="submitted-strip__bg"></div>
                        <span class="submitted-strip__time">${time}</span>
                    </div>
                    <span class="mystery__submitted-name">${name}</span>
                </div>`;
        }
    </script>

</body>
</html>

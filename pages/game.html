<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where's Jeff?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script type="module" src="../app.js"></script>
</head>
<body>

    <div class="page-loader" id="page-loader"><span class="loader"></span></div>

    <!-- Game chooser (shown if user has multiple games) -->
    <section class="page-center" id="chooser-section" style="display:none;">
        <div class="chooser">
            <div class="banner banner--top banner--from-left">
                <span class="banner__text">Choose Game</span>
            </div>
            <div class="chooser__body">
                <div class="strip strip--from-right strip--chooser">
                    <button class="strip__arrow strip__arrow--left" id="chooser-prev"></button>
                    <span class="strip__text" id="chooser-name"></span>
                    <button class="strip__arrow strip__arrow--right" id="chooser-next"></button>
                </div>
            </div>
            <div class="banner banner--bottom banner--from-right banner--action banner--pulse" id="btn-go" role="button" tabindex="0">
                <span class="banner__text">GO!</span>
            </div>
        </div>
    </section>

    <!-- Game content (hidden until game is selected) -->
    <div id="game-content" style="display:none;">

        <!-- Hero: logo + Jeff (click for admin) + scroll arrow -->
        <section class="hero" id="hero">
            <img class="hero__logo" src="../assets/logo.png" alt="Where's Jeff?">
            <img class="hero__jeff" src="../assets/jeff.png" alt="Jeff the camel" id="jeff-img">
            <button class="hero__arrow" id="scroll-down" aria-label="Scroll down"></button>
        </section>

        <!-- Winners (shown when game is ended) -->
        <section class="page-section" id="winners-section" style="display:none">
            <div id="winners-content"></div>
        </section>

        <!-- Your Stats -->
        <section class="page-section" id="stats-section">
            <wheff-card aspect="2.77">
                <wheff-banner position="top" from="left">Your Stats</wheff-banner>
                <wheff-field label="Total Score" type="text" placeholder="0" name="total_score" variant="display"></wheff-field>
                <wheff-field label="Wins" type="text" placeholder="0" name="wins" variant="display"></wheff-field>
                <wheff-field label="Jeff Karma" type="text" placeholder="0" name="jeff_karma" variant="display"></wheff-field>
            </wheff-card>
        </section>

        <!-- Mystery section (current/latest/past — rendered by JS) -->
        <section class="page-section" id="mystery-section">
            <div id="mystery-content"></div>
        </section>

        <!-- Leaderboard -->
        <section class="page-section" id="leaderboard-section">
            <div id="leaderboard-content"></div>
        </section>

        <!-- Past Mysteries world map -->
        <section class="page-section" id="past-section">
            <div id="past-content"></div>
        </section>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { requireAuth, getProfile } from '../lib/auth.js';
        import {
            getUserSeasons, getSeasonMysteries, getCurrentMystery, getRevealedMysteries,
            getNextMysteryInfo, getAppSetting,
            getGuesses, getUserGuess, submitGuess, subscribeGuesses,
            getMysteryLeaderboard, getSeasonLeaderboard,
            checkSeasonAutoEnd, getSeasonWinners,
            formatTimeAgo, formatDistance, formatDistanceShort, formatCountdown, formatCountdownIn, formatMysteryDate,
            firstName, formatNumber, formatLocationLabel, reverseGeocode
        } from '../lib/game.js';
        import { showToast } from '../lib/toast.js';

        // ── Auth ──

        const session = await requireAuth();
        if (!session) throw new Error('Not authenticated');
        const userId = session.user.id;
        const profile = await getProfile();
        await Promise.all([
            document.fonts.load('700 1em Jost'),
            document.fonts.load('900 1em Jost'),
            document.fonts.load('italic 700 1em Jost'),
            document.fonts.load('italic 900 1em Jost'),
        ]);
        document.getElementById('page-loader')?.remove();

        document.getElementById('scroll-down').addEventListener('click', () => {
            const winnersEl = document.getElementById('winners-section');
            if (winnersEl && winnersEl.style.display !== 'none') {
                winnersEl.scrollIntoView({ behavior: 'smooth' });
            } else {
                document.getElementById('stats-section').scrollIntoView({ behavior: 'smooth' });
            }
        });

        function setBannerLoading(el, loading) {
            if (loading) {
                el.classList.add('banner--disabled', 'banner--loading');
                el.style.animationName = 'none';
                if (!el.querySelector('.loader')) {
                    el.insertAdjacentHTML('beforeend', '<span class="loader loader--btn"></span>');
                }
            } else {
                el.classList.remove('banner--disabled', 'banner--loading');
                el.style.animationName = '';
                el.querySelector('.loader')?.remove();
            }
        }

        function esc(s) { const el = document.createElement('span'); el.textContent = s ?? ''; return el.innerHTML; }
        function gameDisplayName(s) { return s.display_title || s.name; }
        function px(vwVal) { return vwVal * window.innerWidth / 100; }
        const PIN_VW = 3.3;
        const LINE_WEIGHT_VW = 0.39;
        const LINE_DASH_VW = 0.7;
        const LINE_GAP_VW = 0.63;
        let lastResultData = null;
        let cachedLeaderboard = null;
        let confettiInterval = null;

        function addTileLayer(map) {
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OSM', maxNativeZoom: 19, maxZoom: 22
            }).addTo(map);
        }

        function enforceMinZoom(map) {
            const h = map.getContainer().clientHeight;
            const minZ = Math.ceil(Math.log2(h / 256));
            map.setMinZoom(minZ);
            if (map.getZoom() < minZ) map.setZoom(minZ);
        }

        function rescaleMapLayers(map) {
            const p = Math.round(px(PIN_VW)), h = p / 2;
            const w = px(LINE_WEIGHT_VW);
            const dash = `${px(LINE_DASH_VW)},${px(LINE_GAP_VW)}`;
            map.eachLayer(l => {
                if (l instanceof L.Polyline && !(l instanceof L.Polygon)) l.setStyle({ weight: w, dashArray: dash });
                if (l instanceof L.Marker) {
                    try {
                        const icon = l.getIcon();
                        if (icon?.options?.className === '') l.setIcon(L.divIcon({ ...icon.options, iconSize: [p, p], iconAnchor: [h, h] }));
                    } catch {}
                }
            });
        }

        function refreshMapSizes() {
            if (guessMap) {
                guessMap.invalidateSize();
                enforceMinZoom(guessMap);
                rescaleMapLayers(guessMap);
            }

            if (resultMap) {
                rescaleMapLayers(resultMap);
                enforceMinZoom(resultMap);
                fitResultMap();
            }

            if (worldMap) {
                rescaleMapLayers(worldMap);
                worldMap.invalidateSize();
                enforceMinZoom(worldMap);
                if (lastWorldFit) {
                    const vwU = window.innerWidth / 100;
                    const headerOverlap = (8.2 / 2 + 6.5 * 0.84) * vwU;
                    const stripHeight = 6.5 * 0.84 * vwU;
                    worldMap.fitBounds(lastWorldFit, {
                        paddingTopLeft: [30, headerOverlap + 45],
                        paddingBottomRight: [30, stripHeight + 45]
                    });
                }
            }
        }

        window.addEventListener('resize', refreshMapSizes);

        if (profile?.is_admin) {
            const jeff = document.getElementById('jeff-img');
            jeff.style.cursor = 'pointer';
            jeff.addEventListener('click', () => { window.location.href = '/pages/admin.html'; });
        }

        // ── State ──

        let season = null;
        let mysteries = [];
        let currentMystery = null;
        let revealedMysteries = [];
        let navItems = [];
        let navPos = 0;
        let activeChannel = null;
        let countdownInterval = null;
        let guessMap = null;
        let resultMap = null;
        let worldMap = null;
        let guessMarker = null;
        let lastResultFit = null;
        let lastWorldFit = null;
        let waitingInterval = null;
        let sabMarker = null;
        let sabMode = 'distance';
        let waitingImages = {};
        const imageCache = new Map();

        function preloadImage(url) {
            if (!url) return;
            if (imageCache.has(url)) return;
            const img = new Image();
            img.src = url;
            imageCache.set(url, img);
        }

        function preloadAllMysteryImages() {
            mysteries.forEach(m => preloadImage(m.image_url));
            Object.values(waitingImages).forEach(url => preloadImage(url));
        }

        const mapDefaults = {
            zoomControl: false,
            attributionControl: false,
            scrollWheelZoom: false,
            maxZoom: 22,
            minZoom: 0,
            maxBounds: [[-85, -360], [85, 360]],
            maxBoundsViscosity: 1.0
        };

        // ── Init ──

        try {
            const types = ['location', 'time', 'film', 'cyber'];
            const imgs = await Promise.all(types.map(t => getAppSetting(`waiting_image_${t}`)));
            types.forEach((t, i) => { if (imgs[i]) waitingImages[t] = imgs[i]; });
        } catch {}
        const allSeasons = await getUserSeasons(userId);
        let chooserIdx = 0;
        const hasMultipleGames = allSeasons.length > 1;

        if (hasMultipleGames) {
            setupChooser(allSeasons);
            openChooser();
        } else {
            season = allSeasons[0] || null;
            await initGame();
        }

        function setupChooser(seasons) {
            function updateChooser() {
                document.getElementById('chooser-name').textContent = gameDisplayName(seasons[chooserIdx]);
                document.getElementById('chooser-prev').style.display = chooserIdx > 0 ? '' : 'none';
                document.getElementById('chooser-next').style.display = chooserIdx < seasons.length - 1 ? '' : 'none';
            }

            document.getElementById('chooser-prev').addEventListener('click', () => {
                if (chooserIdx > 0) { chooserIdx--; updateChooser(); }
            });

            document.getElementById('chooser-next').addEventListener('click', () => {
                if (chooserIdx < seasons.length - 1) { chooserIdx++; updateChooser(); }
            });

            document.getElementById('btn-go').addEventListener('click', async () => {
                const goBtn = document.getElementById('btn-go');
                setBannerLoading(goBtn, true);
                season = seasons[chooserIdx];
                await initGame();
            });

            document.querySelector('.hero__logo').style.cursor = 'pointer';
            document.querySelector('.hero__logo').addEventListener('click', openChooser);

            updateChooser();
        }

        function openChooser() {
            cleanupMystery();
            if (confettiInterval) { clearInterval(confettiInterval); confettiInterval = null; }
            if (worldMap) { worldMap.remove(); worldMap = null; }
            document.getElementById('game-content').style.display = 'none';
            document.getElementById('chooser-section').style.display = '';
            const goBtn = document.getElementById('btn-go');
            setBannerLoading(goBtn, false);
            window.scrollTo(0, 0);
        }

        function updateBottomPadding() {
            const dynamicSections = ['mystery-section', 'leaderboard-section', 'past-section'];
            const winnersEl = document.getElementById('winners-section');
            let lastVisible = winnersEl && winnersEl.style.display !== 'none' ? winnersEl : document.getElementById('stats-section');
            for (const id of dynamicSections) {
                const el = document.getElementById(id);
                const content = el.querySelector('div');
                const hasContent = content && content.innerHTML.trim();
                el.style.display = hasContent ? '' : 'none';
                el.style.paddingBottom = '';
                if (hasContent) lastVisible = el;
            }
            if (lastVisible) lastVisible.style.paddingBottom = 'var(--section-gap)';
        }

        async function initGame() {
            document.getElementById('chooser-section').style.display = 'none';
            document.getElementById('game-content').style.display = '';

            if (season) {
                mysteries = await getSeasonMysteries(season.id);
                currentMystery = getCurrentMystery(mysteries);
                revealedMysteries = getRevealedMysteries(mysteries);

                const shouldCheckEnd = (season.active || season.ending) && !currentMystery && revealedMysteries.length;
                if (shouldCheckEnd) {
                    const ended = await checkSeasonAutoEnd(season.id);
                    if (ended) {
                        season.active = false;
                        season.ending = false;
                    }
                }
            }

            checkReturnToasts();
            preloadAllMysteryImages();

            await buildNavItems();
            await renderMysteryAtPosition();
            renderWinners();
            await renderLeaderboard();
            await renderPastMysteries();
            populateStats();
            updateBottomPadding();
        }

        function checkReturnToasts() {
            const key = `wheff_last_visit_${season?.id || ''}`;
            const lastVisit = localStorage.getItem(key);
            const now = new Date().toISOString();
            localStorage.setItem(key, now);
            if (!lastVisit) return;

            const lastDate = new Date(lastVisit);

            if (season && !season.active) {
                if (!currentMystery) {
                    if (!season.ends_at || new Date(season.ends_at) > lastDate) {
                        showToast('Winners determined');
                    }
                }
                return;
            }

            if (currentMystery && new Date(currentMystery.published_at) > lastDate) {
                setTimeout(() => showToast('New mystery available'), 1500);
            }

            const newlyRevealed = revealedMysteries.filter(m =>
                new Date(m.reveals_at) > lastDate
            );
            if (newlyRevealed.length === 1) {
                setTimeout(() => showToast('Mystery revealed'), 1500);
            } else if (newlyRevealed.length > 1) {
                setTimeout(() => showToast(`${newlyRevealed.length} mysteries revealed`), 1500);
            }
        }

        function enablePinchZoom(map) {
            map.getContainer().addEventListener('wheel', function(e) {
                if (e.ctrlKey || e.metaKey) {
                    map.scrollWheelZoom.enable();
                } else {
                    map.scrollWheelZoom.disable();
                }
            }, true);
        }

        // ── Navigation Model ──

        async function buildNavItems() {
            navItems = [];
            const gameEnded = season && !season.active;

            if (currentMystery) {
                navItems.push({ mystery: currentMystery, type: 'current' });
            } else if (revealedMysteries.length && !gameEnded) {
                navItems.push({ mystery: null, type: 'next' });
            }
            if (revealedMysteries.length) {
                revealedMysteries.forEach((m, i) => {
                    navItems.push({ mystery: m, type: (i === 0) ? 'latest' : 'past' });
                });
                if (currentMystery) {
                    navPos = 0;
                } else if (gameEnded) {
                    navPos = 0;
                } else {
                    const latestGuess = await getUserGuess(revealedMysteries[0].id, userId);
                    navPos = latestGuess ? 1 : 0;
                }
            } else if (!currentMystery) {
                navItems.push({ mystery: null, type: 'first' });
                navPos = 0;
            } else {
                navPos = 0;
            }
        }

        // ── Header Builder ──

        function makeHeader(type, mystery, extraLabel) {
            const titles = { current: 'CURRENT MYSTERY', latest: 'LATEST MYSTERY', past: 'PAST MYSTERY', next: 'NEXT MYSTERY', first: 'FIRST MYSTERY' };
            const canGoOlder = navPos < navItems.length - 1;
            const canGoNewer = navPos > 0;

            let labelHTML;
            if (type === 'current') {
                labelHTML = `<span class="strip__text" id="countdown">${formatCountdown(mystery.reveals_at) || ''}</span>`;
            } else if (type === 'next' || type === 'first') {
                labelHTML = `<span class="strip__text" id="countdown">${extraLabel || ''}</span>`;
            } else {
                const dateStr = formatMysteryDate(mystery.reveals_at || mystery.published_at);
                labelHTML = `<span class="strip__text">${dateStr}</span>`;
            }

            return `
                <div class="mystery-header">
                    <div class="banner banner--top banner--from-right">
                        <span class="banner__text">${titles[type]}</span>
                    </div>
                    <div class="mystery-header__card">
                        <div class="strip strip--from-right">
                            ${canGoOlder ? '<button class="strip__arrow strip__arrow--left" id="nav-prev"></button>' : ''}
                            ${labelHTML}
                            ${canGoNewer ? '<button class="strip__arrow strip__arrow--right" id="nav-next"></button>' : ''}
                        </div>
                    </div>
                </div>`;
        }

        function makeImageHTML(mystery, stripText, stripId) {
            if (!mystery.image_url) return '';
            const ar = (mystery.image_width && mystery.image_height)
                ? `style="aspect-ratio:${mystery.image_width}/${mystery.image_height}"`
                : '';
            const idAttr = stripId ? ` id="${stripId}"` : '';
            return `
                <div class="mystery__image" ${ar}>
                    <img src="${esc(mystery.image_url)}" alt="Mystery">
                    <div class="edge-wrapper edge-wrapper--strip edge-wrapper--from-left">
                        <div class="strip strip--from-left"><span class="strip__text"${idAttr}>${stripText}</span></div>
                    </div>
                </div>`;
        }

        // ── Render at Current Position ──

        async function renderMysteryAtPosition() {
            cleanupMystery();
            const container = document.getElementById('mystery-content');

            if (!navItems.length) {
                container.innerHTML = '';
                return;
            }

            const { mystery, type } = navItems[navPos];

            if (type === 'next' || type === 'first') {
                await renderNextView(container, type);
            } else if (type === 'current') {
                const userGuess = await getUserGuess(mystery.id, userId);
                if (userGuess) {
                    await renderSubmittedView(container, mystery, userGuess);
                } else {
                    await renderLiveView(container, mystery);
                }
            } else {
                await renderRevealedView(container, mystery, type);
            }

            attachNavHandlers();
        }

        function attachNavHandlers() {
            const prevBtn = document.getElementById('nav-prev');
            const nextBtn = document.getElementById('nav-next');
            if (prevBtn) prevBtn.addEventListener('click', () => { navPos++; renderMysteryAtPosition(); });
            if (nextBtn) nextBtn.addEventListener('click', () => { navPos--; renderMysteryAtPosition(); });
        }

        // ── Live Mystery View ──

        async function renderLiveView(container, mystery) {
            const answer = mystery.answer;
            const guesses = await getGuesses(mystery.id);

            container.innerHTML = `
                <div class="mystery">
                    ${makeHeader('current', mystery)}
                    ${makeImageHTML(mystery, 'Make a guess!')}
                    <div style="position:relative;">
                        <div class="mystery__map" id="guess-map-container"></div>
                        <div class="edge-wrapper edge-wrapper--banner edge-wrapper--from-right" style="top:auto;bottom:0;">
                            <div class="banner banner--from-right banner--action banner--disabled"
                                 id="submit-btn" role="button" tabindex="0">
                                <span class="banner__text">SUBMIT</span>
                            </div>
                        </div>
                    </div>
                    <div class="mystery__submitted" id="submitted-list">
                        <div class="mystery__submitted-header">Time</div>
                        ${guesses.length ? guesses.map(g => submittedRow(g, mystery.published_at, mystery.reveals_at)).join('') : waitingPlaceholderHTML()}
                    </div>
                </div>
            `;

            startCountdown(mystery, async () => {
                const lat = (Math.random() * 180) - 90;
                const lng = (Math.random() * 360) - 180;
                try { await submitGuess(mystery.id, lat, lng, answer.lat, answer.lng, mystery.published_at, mystery.reveals_at); } catch { showToast('Auto-guess failed', { type: 'error' }); }
            });
            initGuessMap();
            if (!guesses.length) startWaitingPlaceholder(mystery.published_at);

            const submitBanner = document.getElementById('submit-btn');
            if (submitBanner) {
                submitBanner.addEventListener('click', async () => {
                    if (!guessMarker) return;
                    const ll = guessMarker.getLatLng();
                    setBannerLoading(submitBanner, true);
                    try {
                        await submitGuess(mystery.id, ll.lat, ll.lng, answer.lat, answer.lng, mystery.published_at, mystery.reveals_at);
                        await renderMysteryAtPosition();
                    } catch (e) {
                        showToast('Could not submit guess', { type: 'error' });
                        setBannerLoading(submitBanner, false);
                    }
                });
            }

            activeChannel = subscribeGuesses(mystery.id, (newGuess) => {
                removeWaitingPlaceholder();
                const list = document.getElementById('submitted-list');
                if (!list || list.querySelector(`[data-user="${newGuess.user_id}"]`)) return;
                const row = document.createElement('div');
                row.innerHTML = submittedRow(newGuess, mystery.published_at, mystery.reveals_at, true);
                list.appendChild(row.firstElementChild);
            });
        }

        function initGuessMap() {
            const mapEl = document.getElementById('guess-map-container');
            if (!mapEl) return;
            guessMap = L.map(mapEl, mapDefaults).setView([30, 0], 2);
            enablePinchZoom(guessMap);
            addTileLayer(guessMap);

            const gPinPx = Math.round(px(PIN_VW));
            const gPinHalf = gPinPx / 2;
            const initial = esc(firstName(profile.name).charAt(0).toUpperCase());
            const guessIcon = L.divIcon({ className: '', html: `<div class="world-pin" style="background:#000;">${initial}</div>`, iconSize: [gPinPx, gPinPx], iconAnchor: [gPinHalf, gPinHalf] });

            guessMarker = null;
            guessMap.on('click', (e) => {
                if (guessMarker) {
                    guessMarker.setLatLng(e.latlng);
                } else {
                    guessMarker = L.marker(e.latlng, { icon: guessIcon, draggable: true }).addTo(guessMap);
                }
                const submitBtn = document.getElementById('submit-btn');
                if (submitBtn) {
                    submitBtn.classList.remove('banner--disabled');
                    submitBtn.classList.add('banner--pulse');
                }
            });

            addMapTint(mapEl);
            setTimeout(() => { guessMap.invalidateSize(); enforceMinZoom(guessMap); }, 200);
        }

        // ── Next Mystery View ──

        async function renderNextView(container, type = 'next') {
            let nextInfo = null;
            try { nextInfo = await getNextMysteryInfo(season.id); } catch {}
            const nextStart = nextInfo?.published_at || null;
            const nextType = nextInfo?.type || 'location';

            const countdownText = nextStart ? (formatCountdownIn(nextStart) || '') : 'STARTING SOON!';
            const waitingImg = waitingImages[nextType] || waitingImages.location || null;

            container.innerHTML = `
                <div class="mystery">
                    ${makeHeader(type, null, countdownText)}
                    ${waitingImg ? `
                    <div class="mystery__image">
                        <img src="${esc(waitingImg)}" alt="Waiting">
                    </div>` : ''}
                </div>
            `;

            if (nextStart) {
                fixCountdownStripWidth();
                countdownInterval = setInterval(() => {
                    const el = document.getElementById('countdown');
                    if (!el) return;
                    const text = formatCountdownIn(nextStart);
                    if (text) { el.textContent = text; }
                    else {
                        clearInterval(countdownInterval);
                        showToast('New mystery available');
                        reloadMysteries();
                    }
                }, 1000);
            }
        }

        // ── Submitted (awaiting reveal) View ──

        async function renderSubmittedView(container, mystery, userGuess) {
            const guesses = await getGuesses(mystery.id);

            container.innerHTML = `
                <div class="mystery">
                    ${makeHeader('current', mystery)}
                    ${makeImageHTML(mystery, 'Your guess')}
                    <div style="position:relative;">
                        <div class="mystery__map" id="guess-map-container"></div>
                        <div class="edge-wrapper edge-wrapper--strip edge-wrapper--from-right" style="top:auto;bottom:0;">
                            <div class="strip strip--from-right"><span class="strip__text">SUBMITTED</span></div>
                        </div>
                    </div>
                    <div class="mystery__submitted" id="submitted-list">
                        <div class="mystery__submitted-header">Time</div>
                        ${guesses.length ? guesses.map(g => submittedRow(g, mystery.published_at, mystery.reveals_at)).join('') : waitingPlaceholderHTML()}
                    </div>
                </div>
            `;

            startCountdown(mystery);
            initSubmittedMap(userGuess);
            if (!guesses.length) startWaitingPlaceholder(mystery.published_at);

            activeChannel = subscribeGuesses(mystery.id, (newGuess) => {
                removeWaitingPlaceholder();
                const list = document.getElementById('submitted-list');
                if (!list || list.querySelector(`[data-user="${newGuess.user_id}"]`)) return;
                const row = document.createElement('div');
                row.innerHTML = submittedRow(newGuess, mystery.published_at, mystery.reveals_at, true);
                list.appendChild(row.firstElementChild);
            });
        }

        function initSubmittedMap(userGuess) {
            const mapEl = document.getElementById('guess-map-container');

        // ── Result Map ──

        function initResultMap(answer, entry) {
            const mapEl = document.getElementById('result-map-container');
            if (!mapEl) return;
            resultMap = L.map(mapEl, mapDefaults).setView([answer.lat, answer.lng], 5);
            enablePinchZoom(resultMap);
            addTileLayer(resultMap);

            addMapTint(mapEl);

            resultMap.on('click', () => {
                if (sabMode !== 'distance' && lastResultData) resetSab(lastResultData.entry);
            });

            drawResultPins(answer, entry);
            setTimeout(() => { resultMap.invalidateSize(); enforceMinZoom(resultMap); }, 200);
        }

        function setSabContent(text) {
            if (!sabMarker) return;
            const label = sabMarker.getElement()?.querySelector('.mystery__distance-label');
            if (!label) return;
            const span = label.querySelector('span:not(.loader)');
            const loader = label.querySelector('.loader');
            if (loader) loader.remove();
            label.style.minWidth = '';
            label.style.minHeight = '';
            if (span) { span.style.display = ''; span.textContent = text; }
        }

        function setSabLoading() {
            if (!sabMarker) return;
            const label = sabMarker.getElement()?.querySelector('.mystery__distance-label');
            if (!label) return;
            label.style.minWidth = label.offsetWidth + 'px';
            label.style.minHeight = label.offsetHeight + 'px';
            const span = label.querySelector('span:not(.loader)');
            if (span) span.style.display = 'none';
            if (!label.querySelector('.loader')) {
                label.insertAdjacentHTML('beforeend', '<span class="loader loader--sab"></span>');
            }
        }

        function resetSab(entry) {
            sabMode = 'distance';
            setSabContent(formatDistance(entry.distance_m));
        }

        function drawResultPins(answer, entry) {
            if (!resultMap) return;
            lastResultData = { answer, entry };
            sabMode = 'distance';
            resultMap.eachLayer(l => {
                if (l instanceof L.Marker || l instanceof L.Polyline || l instanceof L.CircleMarker) resultMap.removeLayer(l);
            });
            sabMarker = null;

            const pinPx = Math.round(px(PIN_VW));
            const pinH = pinPx / 2;
            const answerIcon = L.divIcon({ className: '', html: `<div class="world-pin world-pin--j" style="background:#BA0000;cursor:pointer;">J</div>`, iconSize: [pinPx, pinPx], iconAnchor: [pinH, pinH] });
            const answerLL = [answer.lat, answer.lng];
            const answerMarker = L.marker(answerLL, { icon: answerIcon, zIndexOffset: 500 }).addTo(resultMap);

            answerMarker.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                const loc = formatLocationLabel(answer.location);
                sabMode = 'answer';
                setSabContent(loc);
            });

            const guessLL = [entry?.guess?.lat, entry?.guess?.lng];
            if (guessLL[0] == null) {
                resultMap.setView(answerLL, 5);
                return;
            }

            let gLng = guessLL[1];
            while (gLng - answer.lng > 180) gLng -= 360;
            while (gLng - answer.lng < -180) gLng += 360;
            guessLL[1] = gLng;

            const guessInitial = esc(firstName(entry.name).charAt(0).toUpperCase());
            const guessIcon = L.divIcon({ className: '', html: `<div class="world-pin" style="background:#000;cursor:pointer;">${guessInitial}</div>`, iconSize: [pinPx, pinPx], iconAnchor: [pinH, pinH] });
            const guessMarkerResult = L.marker(guessLL, { icon: guessIcon, zIndexOffset: 500 }).addTo(resultMap);

            guessMarkerResult.on('click', async (e) => {
                L.DomEvent.stopPropagation(e);
                const guess = entry.guess;
                if (guess && (!guess.location || !guess.location.length) && guess.lat != null) {
                    sabMode = 'guess';
                    setSabLoading();
                    guess.location = await reverseGeocode(guess.lat, guess.lng);
                }
                sabMode = 'guess';
                setSabContent(formatLocationLabel(guess?.location));
            });

            const w = px(LINE_WEIGHT_VW);
            const d = `${px(LINE_DASH_VW)},${px(LINE_GAP_VW)}`;
            L.polyline([guessLL, answerLL], { color: '#fff', weight: w, dashArray: d, lineCap: 'butt' }).addTo(resultMap);

            const pA = L.CRS.EPSG3857.project(L.latLng(answerLL[0], answerLL[1]));
            const pG = L.CRS.EPSG3857.project(L.latLng(guessLL[0], guessLL[1]));
            const midProjected = L.point((pA.x + pG.x) / 2, (pA.y + pG.y) / 2);
            const midLL = L.CRS.EPSG3857.unproject(midProjected);
            sabMarker = L.marker([midLL.lat, midLL.lng], {
                icon: L.divIcon({
                    className: 'mystery__distance-wrapper',
                    html: `<div class="mystery__distance-label mystery__distance-label--interactive"><span>${formatDistance(entry.distance_m)}</span></div>`,
                    iconSize: [0, 0],
                    iconAnchor: [0, 0]
                }),
                zIndexOffset: 1000
            }).addTo(resultMap);

            sabMarker.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                if (sabMode !== 'distance') resetSab(entry);
            });

            const metersPerPx = (z) => 156543.03 * Math.cos(midLL.lat * Math.PI / 180) / Math.pow(2, z);
            let idealZoom = 22;
            while (idealZoom > 2 && entry.distance_m / metersPerPx(idealZoom) < 140) idealZoom--;

            lastResultFit = { bounds: L.latLngBounds([answerLL, guessLL]), maxZoom: idealZoom };
            fitResultMap();
        }

        function fitResultMap() {
            if (!resultMap || !lastResultFit) return;
            const vw = window.innerWidth / 100;
            const stripHalf = (6.5 * 0.84 / 2) * vw;
            resultMap.invalidateSize();
            resultMap.fitBounds(lastResultFit.bounds, {
                paddingTopLeft: [60, stripHalf + 45],
                paddingBottomRight: [60, stripHalf + 45],
                maxZoom: lastResultFit.maxZoom
            });
        }

        function updateResultView(answer, entry) {
            const label = document.getElementById('result-label');
            if (label) label.textContent = entry.user_id === userId ? 'YOUR RESULT' : `${firstName(entry.name)}'S RESULT`;

            const scoreEl = document.getElementById('score-banner-text');
            if (scoreEl) scoreEl.textContent = entry?.score != null ? `SCORE: ${formatNumber(entry.score)}` : '';

            document.querySelectorAll('.mystery__results-row').forEach(row => {
                row.classList.toggle('mystery__results-row--active', row.dataset.user === entry.user_id);
            });

            drawResultPins(answer, entry);
        }

                while (lng - prevLng < -180) lng += 360;

            let dataBounds = null;
            const wLnW = px(LINE_WEIGHT_VW);

                    }).addTo(worldMap);

                dataBounds = L.latLngBounds(points);

            lastWorldFit = dataBounds;
            function fitWorldMap() {
                if (!worldMap || !lastWorldFit) return;
                const vw = window.innerWidth / 100;
                const headerOverlap = (8.2 / 2 + 6.5 * 0.84) * vw;
                const stripHeight = 6.5 * 0.84 * vw;
                worldMap.invalidateSize();
                worldMap.fitBounds(lastWorldFit, {
                    paddingTopLeft: [30, headerOverlap + 45],
                    paddingBottomRight: [30, stripHeight + 45]
                });
                const center = lastWorldFit.getCenter();
                worldMap.setMaxBounds([[-85, center.lng - 360], [85, center.lng + 360]]);

            setTimeout(() => { fitWorldMap(); enforceMinZoom(worldMap); }, 100);

        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        function waitForVisible(el) {
            return new Promise(resolve => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        observer.disconnect();
                        resolve();
                    }
                }, { threshold: 0.3 });
                observer.observe(el);
            });
        }

        const CONFETTI_COLORS = ['#000000', '#FFFFFF', '#BA0000', '#000540', '#F4BD41', '#00478a', '#933000', '#6a1001'];

        function fireConfetti(bannerEl, fromLeft) {
            if (typeof confetti !== 'function') return;
            const rect = bannerEl.getBoundingClientRect();
            const originX = fromLeft ? 0 : 1;
            const originY = (rect.top + rect.height / 2) / window.innerHeight;
            const angle = fromLeft ? 45 : 135;
            const defaults = { origin: { x: originX, y: originY }, angle, colors: CONFETTI_COLORS, scalar: 1.4, drift: 0, ticks: 400 };

            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(200 * particleRatio),
                }));
            }
            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.95, scalar: 1.1 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.95, scalar: 1.7 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }

        function startConfettiLoop() {
            if (confettiInterval) clearInterval(confettiInterval);
            const banners = document.querySelectorAll('.winners-banner--name');
            if (!banners.length) return;
            confettiInterval = setInterval(() => {
                const idx = Math.floor(Math.random() * banners.length);
                const b = banners[idx];
                const fromLeft = b.closest('.winners-category')?.classList.contains('winners-category--right') === false;
                fireConfetti(b, fromLeft);
            }, 1500);
        }

        async function animateWinners() {
            const body = document.querySelector('.winners-body');
            if (!body) return;

            const categories = body.querySelectorAll('.winners-category');
            await wait(1500);

            for (const cat of categories) {
                const fromLeft = !cat.classList.contains('winners-category--right');
                const anims = cat.querySelectorAll('.winners-anim');
                const stripWrap = anims[0];
                const bannerWrap = fromLeft ? anims[1] : anims[2];
                const valueWrap = fromLeft ? anims[2] : anims[1];

                if (stripWrap) stripWrap.classList.add('revealed');
                await wait(3000);

                if (bannerWrap) {
                    bannerWrap.classList.add('revealed');
                    const banner = cat.querySelector('.winners-banner--name');
                    if (banner) fireConfetti(banner, fromLeft);
                }
                await wait(1000);

                if (valueWrap) valueWrap.classList.add('revealed');
                await wait(3500);
            }

            startConfettiLoop();
        }

                            <span class="mystery__submitted-name">${esc(firstName(entry.name))}</span>
                            <div class="results-strip results-strip--leaderboard">
                                <div class="submitted-strip__bg"></div>
                                <span class="results-strip__col results-strip__col--pos">${i + 1}</span>
                                <span class="results-strip__col results-strip__col--score">${formatNumber(entry.total_score)}</span>
                                <span class="results-strip__col results-strip__col--wins">${entry.wins}</span>
                                <span class="results-strip__col results-strip__col--trend">${entry.trend}</span>
                            </div>
                        </div>`).join('')}
                    </div>
                </div>
            `;
        }

        // ── Stats ──

        async function populateStats() {
            if (!season) return;
            const board = cachedLeaderboard || await getSeasonLeaderboard(season.id);
            const myEntry = board.find(e => e.user_id === userId);

            function setField(name, value) {
                const field = document.querySelector(`wheff-field[name="${name}"]`);
                if (!field) return;
                const waitForInput = () => {
                    const input = field.querySelector('.field__input');
                    if (!input) return setTimeout(waitForInput, 100);
                    input.value = value;
                };
                waitForInput();
            }

            setField('total_score', formatNumber(myEntry?.total_score ?? 0));
            setField('wins', myEntry?.wins ?? 0);
            const karma = myEntry?.jeff_karma ?? 0;
            setField('jeff_karma', (karma > 0 ? '+' : '') + formatNumber(karma));
        }

        // ── Map Tint ──

        function addMapTint(el) {
            const pane = el.querySelector('.leaflet-map-pane');
            if (!pane) return;
            const tint = document.createElement('div');
            tint.className = 'map-tint';
            pane.appendChild(tint);
        }

        // ── HTML Helpers ──

        function resultRow(entry, selectedEntry) {
            const isActive = entry.user_id === selectedEntry?.user_id;
            return `
                <div class="mystery__submitted-row mystery__results-row ${isActive ? 'mystery__results-row--active' : ''}" data-user="${entry.user_id}">
                    <div class="results-strip">
                        <div class="submitted-strip__bg"></div>
                        <span class="results-strip__col results-strip__col--time">${entry.time}</span>
                        <span class="results-strip__col results-strip__col--distance">${formatDistanceShort(entry.distance_m)}</span>
                        <span class="results-strip__col results-strip__col--score">${formatNumber(entry.score)}</span>
                    </div>
                    <span class="mystery__submitted-name">${esc(firstName(entry.name))}</span>
                </div>`;
        }

        function startWaitingPlaceholder(publishedAt) {
            if (waitingInterval) clearInterval(waitingInterval);
            const el = document.getElementById('waiting-placeholder-time');
            if (!el) return;
            const update = () => { el.textContent = formatTimeAgo(new Date().toISOString(), publishedAt); };
            update();
            waitingInterval = setInterval(update, 1000);
        }

        function removeWaitingPlaceholder() {
            const ph = document.getElementById('waiting-placeholder');
            if (ph) ph.remove();
            if (waitingInterval) { clearInterval(waitingInterval); waitingInterval = null; }
        }

        function waitingPlaceholderHTML() {
            return `
                <div class="mystery__submitted-row" id="waiting-placeholder">
                    <div class="submitted-strip">
                        <div class="submitted-strip__bg"></div>
                        <span class="submitted-strip__time" id="waiting-placeholder-time"></span>
                    </div>
                    <span class="mystery__submitted-name">Waiting for first guess...</span>
                </div>`;
        }

        function submittedRow(guess, publishedAt, revealsAt, isNew = false) {
            const name = esc(firstName(guess.profiles?.name));
            const isAuto = revealsAt && new Date(guess.submitted_at) >= new Date(revealsAt);
            const t = formatTimeAgo(guess.submitted_at, publishedAt);
            const time = isAuto ? `${t} (A)` : t;
            return `
                <div class="mystery__submitted-row ${isNew ? 'mystery__submitted-row--new' : ''}" data-user="${guess.user_id}">
                    <div class="submitted-strip">
                        <div class="submitted-strip__bg"></div>
                        <span class="submitted-strip__time">${time}</span>
                    </div>
                    <span class="mystery__submitted-name">${name}</span>
                </div>`;
        }
    </script>

</body>
</html>
